<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MK ESPORT - APP</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #06b6d4; --gold: #fbbf24; }
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: 'Rajdhani', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        
        .glass-panel {
            background: rgba(10, 10, 25, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        
        .btn-3d {
            transition: all 0.1s; position: relative; top: 0; cursor: pointer;
            text-transform: uppercase; font-family: 'Orbitron'; letter-spacing: 1px;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        .btn-3d:active { top: 3px; filter: brightness(0.8); }

        .input-tech {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px;
            width: 100%; outline: none; border-radius: 12px;
            font-family: 'Orbitron'; font-size: 14px; transition: 0.3s;
        }
        .input-tech:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .nav-btn { color: #4b5563; transition: all 0.3s; position: relative; }
        .nav-btn.active { color: var(--gold); transform: translateY(-5px); }
        .nav-btn.active::after { content: ''; position: absolute; bottom: -8px; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); }
        
        .app-container { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        .scroll-area::-webkit-scrollbar { display: none; }

        @keyframes incomingCall {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(6, 182, 212, 0.5); }
            100% { transform: scale(1); }
        }
        .call-pulse { animation: incomingCall 1.5s infinite ease-in-out; }

        .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 14px; margin-bottom: 4px; position: relative; }
        .msg-sent { background: var(--accent); color: #000; border-bottom-right-radius: 4px; align-self: flex-end; font-weight: 500; }
        .msg-received { background: #1f2937; color: #fff; border-bottom-left-radius: 4px; align-self: flex-start; }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 20px; border: 1px solid rgba(6, 182, 212, 0.3); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="canvas-container"></div>

    <script type="text/babel">
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBJWklGdsRM_XNo2_4AUceUZsiIyIjbUBA",
            authDomain: "mk-esports-60429.firebaseapp.com",
            projectId: "mk-esports-60429",
            storageBucket: "mk-esports-60429.firebasestorage.app",
            messagingSenderId: "663019221754",
            appId: "1:663019221754:web:d75e59277feb0ac12a8f43",
            measurementId: "G-QJHXYR70RG"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mksport';
        const ASSETS = {
            logo: "https://i.ibb.co/7dLY0XrF/logo.png",
            defaultAvatar: "https://i.pravatar.cc/150?u=mkesport",
            defaultQr: "https://i.ibb.co/qFVjTWLK/qr.png"
        };
        const WHATSAPP_NUMBER = "916394562344";

        const { useState, useEffect, useRef } = React;

        let app, auth, db;
        try {
            if (!firebase.apps.length) app = firebase.initializeApp(firebaseConfig);
            else app = firebase.app();
            auth = firebase.auth();
            db = firebase.firestore();
        } catch (e) { console.error("Firebase Init Error", e); }

        const Background3D = () => {
            useEffect(() => {
                const container = document.getElementById('canvas-container');
                if (!container || container.children.length > 0) return;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                camera.position.z = 100;
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);
                const geometry = new THREE.BufferGeometry();
                const vertices = [];
                for (let i = 0; i < 2000; i++) {
                    vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
                }
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                const material = new THREE.PointsMaterial({ color: 0x06b6d4, size: 2, transparent: true, opacity: 0.5 });
                const stars = new THREE.Points(geometry, material);
                scene.add(stars);
                const animate = () => {
                    requestAnimationFrame(animate);
                    stars.rotation.y += 0.0003;
                    renderer.render(scene, camera);
                };
                animate();
            }, []);
            return null;
        };

        const App = () => {
            const [view, setView] = useState('splash');
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            
            // Data
            const [matches, setMatches] = useState([]);
            const [globalChat, setGlobalChat] = useState([]);
            const [deposits, setDeposits] = useState([]);
            const [paymentConfig, setPaymentConfig] = useState({ upi: "mksport@upi", qr: ASSETS.defaultQr });
            
            // Social Features
            const [dmTarget, setDmTarget] = useState(null);
            const [privateMsgs, setPrivateMsgs] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [callState, setCallState] = useState(null);
            const [tapCount, setTapCount] = useState(0);

            const getPublicPath = (col) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col);
            const getUserDoc = (uid) => db.collection('artifacts').doc(appId).collection('users').doc(uid);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const doc = await getUserDoc(u.uid).get();
                        if (doc.exists) {
                            setUserData(doc.data());
                            await getPublicPath('users_public').doc(u.uid).set({
                                uid: u.uid, name: doc.data().name, phone: doc.data().phone, avatar: ASSETS.defaultAvatar
                            }, { merge: true });
                        }
                        setView('home');
                    } else { setView('auth'); }
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubMatches = getPublicPath('matches').onSnapshot(s => setMatches(s.docs.map(d => ({id:d.id, ...d.data()}))));
                const unsubGlobal = getPublicPath('chat').orderBy('time', 'desc').limit(50).onSnapshot(s => setGlobalChat(s.docs.map(d => d.data()).reverse()));
                const unsubConfig = getPublicPath('config').doc('payment').onSnapshot(s => s.exists && setPaymentConfig(s.data()));
                const unsubCalls = getPublicPath('calls').doc(user.uid).onSnapshot(s => {
                    if (s.exists() && s.data().status === 'ringing') setCallState({ type: 'incoming', target: s.data().caller });
                });
                if(userData?.role === 'admin') {
                    getPublicPath('transactions').where('status', '==', 'pending').onSnapshot(s => setDeposits(s.docs.map(d => ({id: d.id, ...d.data()}))));
                }
                return () => { unsubMatches(); unsubGlobal(); unsubConfig(); unsubCalls(); };
            }, [user, userData]);

            useEffect(() => {
                if (!user || !dmTarget) return;
                const chatId = [user.uid, dmTarget.uid].sort().join('_');
                return getPublicPath('conversations').doc(chatId).collection('messages')
                    .orderBy('time', 'asc').onSnapshot(s => setPrivateMsgs(s.docs.map(d => d.data())));
            }, [user, dmTarget]);

            const handleSearch = async () => {
                const snap = await getPublicPath('users_public').get();
                setSearchResults(snap.docs.map(d => d.data()).filter(u => u.uid.includes(searchQuery) || u.phone.includes(searchQuery)));
            };

            const sendGlobalMsg = async (txt) => {
                if(!txt) return;
                await getPublicPath('chat').add({ text: txt, name: userData.name, uid: user.uid, time: new Date().toISOString() });
            };

            const handleSecretTap = () => {
                setTapCount(prev => {
                    if(prev + 1 === 5) {
                        const c = prompt("ADMIN CODE:");
                        if(c === "admin123") { getUserDoc(user.uid).update({role: 'admin'}); alert("Admin Access Granted!"); window.location.reload(); }
                        return 0;
                    }
                    return prev + 1;
                });
            };

            if (view === 'splash') return <div className="h-screen bg-black flex items-center justify-center font-orbitron text-cyan-400 animate-pulse text-2xl tracking-[1rem]">MK APP</div>;

            return (
                <div className="app-container">
                    <Background3D />
                    
                    {/* Top Header */}
                    <header className="px-6 py-4 flex justify-between items-center bg-black/50 backdrop-blur-xl border-b border-white/5 pt-12">
                        <div className="flex items-center gap-3">
                            <img src={ASSETS.logo} className="w-8 h-8 rounded-full border border-cyan-500 shadow-[0_0_10px_cyan]" />
                            <h1 className="font-orbitron font-black text-lg">MK <span className="text-yellow-400">APP</span></h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('search')} className="text-gray-400"><i className="fa-solid fa-magnifying-glass"></i></button>
                            <div onClick={() => setView('wallet')} className="bg-cyan-500/10 px-3 py-1 rounded-full border border-cyan-500/30 text-xs font-bold font-orbitron text-cyan-400 cursor-pointer">
                                ₹{userData?.balance || 0}
                            </div>
                        </div>
                    </header>

                    <div className="scroll-area">
                        {view === 'home' && (
                            <div className="p-4 space-y-6">
                                <div className="video-wrapper">
                                    <iframe src="https://www.youtube.com/embed/9iW-sL7Upt0?autoplay=1&mute=1&loop=1&playlist=9iW-sL7Upt0&controls=0" allow="autoplay; encrypted-media"></iframe>
                                </div>
                                <div className="space-y-4">
                                    <h3 className="font-orbitron font-bold text-sm text-gray-400 px-2">AVAILABLE MATCHES</h3>
                                    {matches.map(m => (
                                        <div key={m.id} className="glass-panel p-4 rounded-3xl flex items-center justify-between border border-white/5">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-2xl bg-cyan-500/10 flex items-center justify-center border border-cyan-500/20">
                                                    <i className="fa-solid fa-fire text-cyan-400"></i>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-sm">{m.title}</h4>
                                                    <p className="text-[10px] text-gray-400">{m.mode} • Entry: ₹{m.entry}</p>
                                                </div>
                                            </div>
                                            <button className="bg-white/5 px-4 py-2 rounded-xl text-[10px] font-bold font-orbitron border border-white/10 hover:bg-cyan-500 hover:text-black transition-all">JOIN</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'search' && (
                            <div className="p-6 space-y-6">
                                <h2 className="font-orbitron font-bold text-xl text-cyan-400">FIND PLAYERS</h2>
                                <div className="relative">
                                    <input placeholder="Search UID or Mobile..." className="input-tech pr-12" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSearch()} />
                                    <button onClick={handleSearch} className="absolute right-4 top-4 text-cyan-400"><i className="fa-solid fa-search"></i></button>
                                </div>
                                <div className="space-y-3">
                                    {searchResults.map(u => (
                                        <div key={u.uid} className="glass-panel p-4 rounded-2xl flex items-center justify-between">
                                            <div className="flex items-center gap-4">
                                                <img src={u.avatar} className="w-10 h-10 rounded-full border border-cyan-500/20" />
                                                <div><p className="font-bold text-sm">{u.name}</p><p className="text-[10px] text-gray-500">UID: {u.uid}</p></div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setDmTarget(u); setView('chat_private'); }} className="w-9 h-9 rounded-xl bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 flex items-center justify-center"><i className="fa-solid fa-comment"></i></button>
                                                <button onClick={() => setCallState({type:'outgoing', target:u})} className="w-9 h-9 rounded-xl bg-green-500/10 text-green-400 border border-green-500/20 flex items-center justify-center"><i className="fa-solid fa-phone"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="p-6 space-y-6 animate-in fade-in duration-500">
                                <div onClick={handleSecretTap} className="glass-panel p-8 rounded-[40px] flex flex-col items-center text-center border-b-4 border-cyan-500">
                                    <div className="relative mb-4">
                                        <img src={ASSETS.logo} className="w-24 h-24 rounded-full border-4 border-cyan-500 p-1 shadow-[0_0_30px_rgba(6,182,212,0.4)]" />
                                        <div className="absolute bottom-0 right-0 w-6 h-6 bg-green-500 border-4 border-black rounded-full"></div>
                                    </div>
                                    <h2 className="text-2xl font-orbitron font-black text-white">{userData?.name || 'Loading...'}</h2>
                                    <p className="text-xs text-cyan-400 tracking-[0.3em] font-bold mt-1">PLAYER ID: {user?.uid.substring(0,8).toUpperCase()}</p>
                                    <div className="mt-4 flex gap-2">
                                        <span className="bg-yellow-500/10 text-yellow-500 px-3 py-1 rounded-full text-[10px] font-bold border border-yellow-500/20">PRO GAMER</span>
                                        <span className="bg-cyan-500/10 text-cyan-400 px-3 py-1 rounded-full text-[10px] font-bold border border-cyan-500/20 uppercase">{userData?.role}</span>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass-panel p-4 rounded-3xl text-center">
                                        <p className="text-[10px] text-gray-500 font-bold mb-1">TOTAL WINS</p>
                                        <p className="text-xl font-orbitron font-bold text-white">24</p>
                                    </div>
                                    <div className="glass-panel p-4 rounded-3xl text-center">
                                        <p className="text-[10px] text-gray-500 font-bold mb-1">SCRIMS PLAYED</p>
                                        <p className="text-xl font-orbitron font-bold text-white">{userData?.joinedMatches || 0}</p>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <button onClick={() => window.open(`https://wa.me/${WHATSAPP_NUMBER}`)} className="w-full glass-panel p-5 rounded-3xl flex items-center justify-between group">
                                        <div className="flex items-center gap-4">
                                            <i className="fa-solid fa-headset text-cyan-400 group-hover:scale-110 transition-transform"></i>
                                            <span className="text-sm font-bold">24/7 SUPPORT</span>
                                        </div>
                                        <i className="fa-solid fa-chevron-right text-gray-600"></i>
                                    </button>
                                    <button onClick={() => auth.signOut()} className="w-full bg-red-500/10 border border-red-500/20 text-red-500 p-5 rounded-3xl font-orbitron font-bold text-sm">LOGOUT SESSION</button>
                                </div>
                            </div>
                        )}

                        {view === 'chat' && (
                            <div className="h-full flex flex-col p-4">
                                <h2 className="font-orbitron font-bold text-xl mb-4 px-2 text-yellow-400">GLOBAL CHAT</h2>
                                <div className="flex-1 space-y-4 overflow-y-auto pr-2 pb-20">
                                    {globalChat.map((m, i) => (
                                        <div key={i} className={`flex flex-col ${m.uid === user.uid ? 'items-end' : 'items-start'}`}>
                                            <div className={`msg-bubble ${m.uid === user.uid ? 'msg-sent' : 'msg-received'}`}>
                                                <p className="text-[9px] font-black opacity-50 mb-1 uppercase">{m.name}</p>
                                                {m.text}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="fixed bottom-24 left-4 right-4 flex gap-2">
                                    <input id="globalInp" className="input-tech flex-1" placeholder="Type to everyone..." onKeyPress={e => e.key==='Enter' && (sendGlobalMsg(e.target.value), e.target.value='')} />
                                    <button onClick={() => {const i=document.getElementById('globalInp'); sendGlobalMsg(i.value); i.value='';}} className="bg-cyan-500 text-black w-14 h-14 rounded-2xl flex items-center justify-center text-xl shadow-lg shadow-cyan-500/20"><i className="fa-solid fa-paper-plane"></i></button>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && userData?.role === 'admin' && (
                            <div className="p-6 space-y-6">
                                <h2 className="font-orbitron font-bold text-xl text-red-500">ADMIN CONTROL</h2>
                                <div className="glass-panel p-6 rounded-3xl space-y-4">
                                    <h3 className="font-bold text-sm">PENDING DEPOSITS</h3>
                                    {deposits.map(d => (
                                        <div key={d.id} className="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/10">
                                            <div><p className="text-yellow-400 font-bold">₹{d.amount}</p><p className="text-[10px] text-gray-500">UTR: {d.utr}</p></div>
                                            <div className="flex gap-2">
                                                <button className="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-black"><i className="fa-solid fa-check"></i></button>
                                                <button className="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-white"><i className="fa-solid fa-xmark"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'wallet' && (
                            <div className="p-6 flex flex-col items-center justify-center space-y-12 py-20">
                                <div className="text-center">
                                    <h1 className="text-7xl font-orbitron font-black text-yellow-400">₹{userData?.balance || 0}</h1>
                                    <p className="text-cyan-400 font-bold tracking-[0.4em] text-[10px] mt-4">CURRENT BALANCE</p>
                                </div>
                                <div className="w-full space-y-4">
                                    <button className="w-full bg-cyan-500 text-black py-5 rounded-3xl font-black font-orbitron btn-3d text-lg shadow-lg shadow-cyan-500/20">ADD CASH</button>
                                    <button className="w-full bg-white/5 border border-white/10 py-5 rounded-3xl font-black font-orbitron btn-3d text-lg">WITHDRAW</button>
                                </div>
                                <div className="glass-panel p-6 rounded-3xl w-full">
                                    <h4 className="font-orbitron font-bold text-xs mb-4 text-gray-500">RECENT TRANSACTIONS</h4>
                                    <div className="text-center py-4 text-gray-600 text-xs italic">No recent activity</div>
                                </div>
                            </div>
                        )}

                        {view === 'chat_private' && dmTarget && (
                            <div className="h-full flex flex-col p-4 pb-24">
                                <div className="flex items-center gap-4 mb-6 pb-4 border-b border-white/5">
                                    <button onClick={() => setView('search')}><i className="fa-solid fa-chevron-left text-gray-400"></i></button>
                                    <img src={dmTarget.avatar} className="w-10 h-10 rounded-full border border-cyan-500/30" />
                                    <div className="flex-1"><p className="font-bold text-sm">{dmTarget.name}</p><p className="text-[10px] text-green-500">Live</p></div>
                                    <button onClick={() => setCallState({type:'outgoing', target:dmTarget})} className="text-cyan-400"><i className="fa-solid fa-video text-xl"></i></button>
                                </div>
                                <div className="flex-1 space-y-3 flex flex-col overflow-y-auto pr-2">
                                    {privateMsgs.map((m, i) => (
                                        <div key={i} className={`msg-bubble ${m.sender === user.uid ? 'msg-sent' : 'msg-received'}`}>{m.text}</div>
                                    ))}
                                </div>
                                <div className="mt-4 flex gap-2">
                                    <input id="dmInp" className="input-tech flex-1" placeholder="Type a message..." />
                                    <button onClick={() => {const i=document.getElementById('dmInp'); i.value && (getPublicPath('conversations').doc([user.uid, dmTarget.uid].sort().join('_')).collection('messages').add({text:i.value, sender:user.uid, time:new Date().toISOString()}), i.value='')}} className="bg-cyan-500 text-black w-14 h-14 rounded-2xl flex items-center justify-center"><i className="fa-solid fa-paper-plane"></i></button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Calling Overlay */}
                    {callState && (
                        <div className="fixed inset-0 z-[1000] bg-black/95 backdrop-blur-3xl flex flex-col items-center justify-center p-8">
                            <div className="w-32 h-32 rounded-full border-4 border-cyan-500 p-1 mb-8 call-pulse">
                                <img src={ASSETS.defaultAvatar} className="w-full h-full rounded-full" />
                            </div>
                            <h2 className="text-2xl font-orbitron font-bold mb-1">{callState.target?.name}</h2>
                            <p className="text-cyan-400 font-bold tracking-widest text-xs animate-pulse uppercase">{callState.type === 'incoming' ? 'INCOMING CALL...' : 'CALLING...'}</p>
                            <div className="mt-20 flex gap-12">
                                {callState.type === 'incoming' && (
                                    <button className="w-16 h-16 rounded-full bg-green-500 text-black flex items-center justify-center text-xl shadow-[0_0_30px_rgba(34,197,94,0.5)]"><i className="fa-solid fa-phone"></i></button>
                                )}
                                <button onClick={() => setCallState(null)} className="w-16 h-16 rounded-full bg-red-500 text-white flex items-center justify-center text-xl shadow-[0_0_30_rgba(239,68,68,0.5)]"><i className="fa-solid fa-phone-slash"></i></button>
                            </div>
                        </div>
                    )}

                    {/* Bottom Navbar */}
                    <nav className="fixed bottom-0 w-full bg-black/80 backdrop-blur-2xl border-t border-white/5 px-6 py-4 flex justify-between items-center z-50 rounded-t-[40px] pb-10">
                        <button onClick={() => setView('home')} className={`nav-btn ${view === 'home' ? 'active' : ''}`}><i className="fa-solid fa-house-chimney text-xl"></i></button>
                        <button onClick={() => setView('chat')} className={`nav-btn ${view === 'chat' ? 'active' : ''}`}><i className="fa-solid fa-comments text-xl"></i></button>
                        <div className="relative -top-10">
                            <button onClick={() => setView('wallet')} className="w-16 h-16 bg-cyan-500 rounded-3xl rotate-45 flex items-center justify-center shadow-[0_0_30px_rgba(6,182,212,0.4)] border-4 border-black active:scale-95 transition-all">
                                <i className="fa-solid fa-wallet -rotate-45 text-black text-xl"></i>
                            </button>
                        </div>
                        <button onClick={() => setView('admin')} className={`nav-btn ${view === 'admin' ? 'active' : ''} ${userData?.role !== 'admin' ? 'opacity-20 pointer-events-none' : ''}`}><i className="fa-solid fa-shield-halved text-xl"></i></button>
                        <button onClick={() => setView('profile')} className={`nav-btn ${view === 'profile' ? 'active' : ''}`}><i className="fa-solid fa-user-astronaut text-xl"></i></button>
                    </nav>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
