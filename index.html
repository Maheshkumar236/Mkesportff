<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MK ESPORT - PRO MAX APP</title>
    
    <!-- PWA & Mobile App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase Compat (Purane version ke hisab se) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; }
        * { -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
        
        #root { height: 100%; display: flex; flex-direction: column; }
        .scroll-view { flex: 1; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Trusted UI Elements */
        .app-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .btn-primary { background: var(--primary); color: white; border-radius: 14px; font-weight: 700; transition: 0.2s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-primary:active { transform: scale(0.96); }
        .input-app { background: #334155; border: 1px solid #475569; color: white; padding: 14px; border-radius: 14px; width: 100%; outline: none; font-size: 16px; transition: 0.3s; }
        .input-app:focus { border-color: var(--primary); background: #1e293b; }

        .nav-item { color: #64748b; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-3px); filter: drop-shadow(0 0 5px var(--primary)); }

        /* Splash Screen */
        .splash-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease; }
        .splash-hidden { opacity: 0; visibility: hidden; }

        /* Calling UI Animations */
        .call-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1e293b, #0f172a); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 60px 20px; }
        .call-avatar { width: 120px; height: 120px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        .call-avatar::after { content: ''; position: absolute; inset: -10px; border: 2px solid var(--primary); border-radius: 50%; animation: pulse 2s infinite; }

        /* Keyframes Moved to Head to fix Babel Error */
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes loading-bar { 0% { width: 0; } 100% { width: 100%; } }

        .safe-top { height: env(safe-area-inset-top, 20px); }
        .safe-bottom { height: env(safe-area-inset-bottom, 20px); }
        
        .loading-bar-inner { height: 100%; background: var(--primary); animation: loading-bar 2s ease-in-out forwards; }
    </style>
</head>
<body>
    <!-- Splash Screen Layout -->
    <div id="app-splash" class="splash-screen">
        <img src="https://i.ibb.co/7dLY0XrF/logo.png" class="w-24 h-24 animate-pulse mb-6">
        <h1 class="font-orbitron text-2xl font-black tracking-widest text-white">MK ESPORT</h1>
        <div class="w-48 h-1 bg-slate-800 mt-10 rounded-full overflow-hidden">
            <div class="loading-bar-inner"></div>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        // --- SARE ORIGINAL CONFIGS ---
        const firebaseConfig = {
            apiKey: "AIzaSyBJWklGdsRM_XNo2_4AUceUZsiIyIjbUBA",
            authDomain: "mk-esports-60429.firebaseapp.com",
            projectId: "mk-esports-60429",
            storageBucket: "mk-esports-60429.firebasestorage.app",
            messagingSenderId: "663019221754",
            appId: "1:663019221754:web:d75e59277feb0ac12a8f43",
        };
        const ASSETS = { logo: "https://i.ibb.co/7dLY0XrF/logo.png", qr: "https://i.ibb.co/qFVjTWLK/qr.png" };
        const WHATSAPP_NUMBER = "916394562344";

        const { useState, useEffect, useRef } = React;

        let app, auth, db;
        try {
            if (!firebase.apps.length) app = firebase.initializeApp(firebaseConfig);
            else app = firebase.app();
            auth = firebase.auth();
            db = firebase.firestore();
            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        } catch(e) { console.error("Firebase Galti:", e); }

        const App = () => {
            const [view, setView] = useState('loading');
            const [userData, setUserData] = useState(null);
            const [isRegister, setIsRegister] = useState(false);
            const [authForm, setAuthForm] = useState({ name: '', mobile: '', email: '', password: '', confirm: '', refer: '' });
            
            // Saare purane match aur wallet states
            const [matches, setMatches] = useState([]);
            const [preRegEvents, setPreRegEvents] = useState([]);
            const [chatMessages, setChatMessages] = useState([]);
            const [paymentConfig, setPaymentConfig] = useState({ upi: "mksport@upi", qr: ASSETS.qr });
            const [deposits, setDeposits] = useState([]);
            const [totalUsers, setTotalUsers] = useState(0);
            const [mySquad, setMySquad] = useState(null);
            const [joiningMatch, setJoiningMatch] = useState(null);
            const [joinFormData, setJoinFormData] = useState({});
            const [walletTab, setWalletTab] = useState('deposit');
            const [depositAmount, setDepositAmount] = useState('');
            const [depositStep, setDepositStep] = useState(1);
            const [tapCount, setTapCount] = useState(0);

            // Social/Discord style states
            const [friends, setFriends] = useState([]);
            const [friendRequests, setFriendRequests] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [searchUid, setSearchUid] = useState('');
            const [foundUser, setFoundUser] = useState(null);
            const [isCalling, setIsCalling] = useState(null);

            // Auth aur Realtime Listeners
            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        const doc = await db.collection('artifacts').doc('mksport').collection('users').doc(user.uid).get();
                        if (doc.exists) {
                            const uData = doc.data();
                            setUserData(uData);
                            setupListeners(user.uid, uData.role);
                        }
                        setView('home');
                    } else {
                        setView('auth');
                    }
                    setTimeout(() => document.getElementById('app-splash')?.classList.add('splash-hidden'), 1500);
                });
                return () => unsubAuth();
            }, []);

            const setupListeners = (uid, role) => {
                // Matches listener
                db.collection('artifacts').doc('mksport').collection('matches').orderBy('createdAt', 'desc').onSnapshot(s => {
                    const all = s.docs.map(d => ({id: d.id, ...d.data()}));
                    setMatches(all.filter(m => !m.isPreReg));
                    setPreRegEvents(all.filter(m => m.isPreReg));
                });
                // Global Chat listener
                db.collection('artifacts').doc('mksport').collection('chat').orderBy('time', 'desc').limit(50).onSnapshot(s => setChatMessages(s.docs.map(d => ({id: d.id, ...d.data()})).reverse()));
                // Payment listener
                db.collection('artifacts').doc('mksport').collection('config').doc('payment').onSnapshot(s => { if(s.exists) setPaymentConfig(s.data()); });
                // Friends listener
                db.collection('artifacts').doc('mksport').collection('friends').where('participants', 'array-contains', uid).onSnapshot(s => setFriends(s.docs.map(d => ({id: d.id, ...d.data()}))));
                // Requests listener
                db.collection('artifacts').doc('mksport').collection('requests').where('receiverId', '==', uid).where('status', '==', 'pending').onSnapshot(s => setFriendRequests(s.docs.map(d => ({id: d.id, ...d.data()}))));
                
                if(role === 'admin') {
                    db.collection('artifacts').doc('mksport').collection('transactions').where('status', '==', 'pending').onSnapshot(s => setDeposits(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    db.collection('artifacts').doc('mksport').collection('users').get().then(s => setTotalUsers(s.size));
                }
            };

            // Auth Logic (Pehle jaisa 100%)
            const handleAuth = async () => {
                const email = `${authForm.mobile}@mkesport.com`;
                try {
                    if (isRegister) {
                        if(authForm.password !== authForm.confirm) throw new Error("Passwords mismatch");
                        const r = await auth.createUserWithEmailAndPassword(email, authForm.password);
                        const newUser = { uid: r.user.uid, name: authForm.name, phone: authForm.mobile, email: authForm.email, balance: 0, role: 'user', referralCode: "MK"+Math.floor(1000+Math.random()*9000), createdAt: new Date().toISOString(), joinedMatches: 0, lossStreak: 0 };
                        await db.collection('artifacts').doc('mksport').collection('users').doc(r.user.uid).set(newUser);
                        setUserData(newUser);
                    } else {
                        await auth.signInWithEmailAndPassword(email, authForm.password);
                    }
                } catch(e) { alert(e.message); }
            };

            // Secret Tap for Admin/Staff (Profile logo par 5 baar tap karein)
            const handleSecretTap = () => {
                const n = tapCount + 1; setTapCount(n);
                if(n === 5) {
                    const c = prompt("ADMIN/STAFF CODE:");
                    if(c === "admin123") { db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid).update({role:'admin'}); alert("Admin Access Granted!"); window.location.reload(); }
                    else if(c === "staff123") { db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid).update({role:'staff'}); alert("Staff Access Granted!"); window.location.reload(); }
                    setTapCount(0);
                }
            };

            // Social search logic
            const searchPlayer = async () => {
                if(!searchUid) return;
                const snap = await db.collection('artifacts').doc('mksport').collection('users').doc(searchUid).get();
                if(snap.exists) setFoundUser(snap.data()); else alert("Player nahi mila!");
            };

            const sendRequest = async () => {
                await db.collection('artifacts').doc('mksport').collection('requests').add({
                    senderId: userData.uid, senderName: userData.name, receiverId: foundUser.uid, status: 'pending', time: new Date().toISOString()
                });
                alert("Request bhej di gayi hai!"); setFoundUser(null);
            };

            const acceptRequest = async (req) => {
                await db.collection('artifacts').doc('mksport').collection('friends').add({
                    participants: [userData.uid, req.senderId], names: [userData.name, req.senderName], status: 'accepted', time: new Date().toISOString()
                });
                await db.collection('artifacts').doc('mksport').collection('requests').doc(req.id).update({status: 'accepted'});
            };

            if (view === 'auth') return (
                <div className="h-full flex flex-col items-center justify-center p-8 bg-[#0f172a]">
                    <img src={ASSETS.logo} className="w-20 h-20 mb-10 drop-shadow-2xl animate-bounce"/>
                    <div className="w-full max-w-sm app-card p-8">
                        <div className="flex bg-slate-800 rounded-xl p-1 mb-8">
                            <button onClick={()=>setIsRegister(false)} className={`flex-1 py-3 text-xs font-bold rounded-lg transition-all ${!isRegister?'bg-blue-600 shadow-lg shadow-blue-500/20':'text-gray-500'}`}>LOGIN</button>
                            <button onClick={()=>setIsRegister(true)} className={`flex-1 py-3 text-xs font-bold rounded-lg transition-all ${isRegister?'bg-blue-600 shadow-lg shadow-blue-500/20':'text-gray-500'}`}>REGISTER</button>
                        </div>
                        <div className="space-y-4">
                            {isRegister && <input className="input-app" placeholder="Gamer Name" onChange={e=>setAuthForm({...authForm, name: e.target.value})}/>}
                            <input className="input-app" placeholder="Mobile" type="number" onChange={e=>setAuthForm({...authForm, mobile: e.target.value})}/>
                            <input className="input-app" placeholder="Password" type="password" onChange={e=>setAuthForm({...authForm, password: e.target.value})}/>
                            {isRegister && <input className="input-app" placeholder="Confirm Password" type="password" onChange={e=>setAuthForm({...authForm, confirm: e.target.value})}/>}
                            <button onClick={handleAuth} className="w-full btn-primary py-4 mt-4 uppercase text-sm tracking-widest">AAGE BADHEIN</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'loading') return null;

            return (
                <div id="root">
                    <div className="safe-top bg-slate-950"></div>
                    
                    {/* Voice Call Screen */}
                    {isCalling && (
                        <div className="call-screen">
                            <div className="flex flex-col items-center gap-6">
                                <div className="call-avatar"><i className="fa-solid fa-user-ninja text-5xl text-blue-500"></i></div>
                                <div className="text-center">
                                    <h2 className="text-3xl font-black">{isCalling.name}</h2>
                                    <p className="text-blue-400 font-bold tracking-widest animate-pulse mt-4 uppercase">Voice Calling...</p>
                                </div>
                            </div>
                            <div className="flex gap-10">
                                <button onClick={()=>setIsCalling(null)} className="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-2xl shadow-xl active:scale-90 transition-all"><i className="fa-solid fa-phone-slash"></i></button>
                                <button className="w-16 h-16 bg-slate-700 rounded-full flex items-center justify-center text-2xl shadow-xl"><i className="fa-solid fa-microphone-slash"></i></button>
                            </div>
                        </div>
                    )}

                    <header className="px-6 py-4 flex justify-between items-center bg-slate-900/80 backdrop-blur-xl border-b border-white/5 z-50">
                        <div className="flex items-center gap-3">
                            <img src={ASSETS.logo} className="w-8 h-8 rounded-full border border-blue-500 shadow-sm"/>
                            <span className="font-orbitron font-black text-sm uppercase tracking-tighter">MK <span className="text-blue-500">SPORT</span></span>
                        </div>
                        <div onClick={()=>setView('wallet')} className="bg-blue-500/10 px-4 py-1.5 rounded-full border border-blue-500/20 text-blue-400 font-bold text-xs active:scale-95 transition-all">
                            ₹{userData?.balance || 0}
                        </div>
                    </header>

                    <main className="scroll-view no-scrollbar">
                        {view === 'home' && (
                            <div className="p-6 space-y-8">
                                <div className="app-card overflow-hidden h-44 relative border-none shadow-2xl">
                                    <iframe className="w-full h-full" src="https://www.youtube.com/embed/9iW-sL7Upt0?autoplay=1&mute=1&loop=1&playlist=9iW-sL7Upt0&controls=0&modestbranding=1"></iframe>
                                </div>

                                <section className="space-y-4">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest border-l-2 border-blue-500 pl-2">Major Tournaments</h3>
                                    {preRegEvents.map(m => (
                                        <div key={m.id} className="app-card p-6 border-l-4 border-yellow-500 group active:scale-[0.98] transition-all">
                                            <h4 className="font-bold text-xl">{m.title}</h4>
                                            <div className="flex justify-between items-center mt-4">
                                                <div><p className="text-[10px] text-slate-500 uppercase font-bold">Inaam Rashi</p><p className="text-2xl font-black text-white">₹{m.pool}</p></div>
                                                <button onClick={()=>setJoiningMatch(m)} className="btn-primary px-6 py-3 text-xs">JOIN KARO</button>
                                            </div>
                                        </div>
                                    ))}
                                </section>

                                <section className="space-y-4">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest border-l-2 border-blue-500 pl-2">Rozana Scrims</h3>
                                    {matches.map(m => {
                                        const myRoom = (m.rooms || []).find(r => r.players.some(p => p.uid === userData.uid));
                                        return (
                                            <div key={m.id} className="app-card p-5 active:scale-[0.99] transition-all">
                                                <div className="flex justify-between items-start">
                                                    <div><h4 className="font-bold text-lg">{m.title}</h4><p className="text-[10px] text-slate-500 uppercase mt-1 tracking-wider">{m.mode} • {m.map}</p></div>
                                                    <span className="text-[10px] font-bold text-blue-400 bg-blue-500/10 px-2 py-1 rounded-lg border border-blue-500/20">LIVE</span>
                                                </div>
                                                <div className="grid grid-cols-3 gap-3 my-5 bg-slate-800/50 p-4 rounded-2xl text-center border border-white/5">
                                                    <div><p className="text-[9px] text-yellow-500 font-bold mb-1">1ST</p><p className="text-sm font-bold">₹{m.p1}</p></div>
                                                    <div><p className="text-[9px] text-slate-500 font-bold mb-1">2ND</p><p className="text-sm font-bold">₹{m.p2}</p></div>
                                                    <div><p className="text-[9px] text-slate-500 font-bold mb-1">3RD</p><p className="text-sm font-bold">₹{m.p3}</p></div>
                                                </div>
                                                {myRoom ? (
                                                    <div className="bg-green-500/10 border border-green-500/30 p-4 rounded-2xl text-center animate-pulse">
                                                        <p className="text-green-500 text-xs font-black">ROOM MEIN SHAMIL HAI (Room {myRoom.id})</p>
                                                        {myRoom.roomId ? <p className="text-white text-sm font-mono mt-2 select-all">{myRoom.roomId} / {myRoom.roomPass}</p> : <p className="text-[10px] text-slate-500 mt-1">ID/Pass ka intezar karein...</p>}
                                                    </div>
                                                ) : <button onClick={()=>setJoiningMatch(m)} className="w-full btn-primary py-4 text-xs uppercase font-black">JOIN (₹{m.entry})</button>}
                                            </div>
                                        );
                                    })}
                                    {matches.length === 0 && <p className="text-center py-10 text-slate-600 text-sm">Abhi koi match nahi hai.</p>}
                                </section>
                            </div>
                        )}

                        {view === 'social' && (
                            <div className="p-6 space-y-6">
                                <div className="space-y-4">
                                    <div className="flex gap-3">
                                        <input className="input-app flex-1" placeholder="UID se search karein" value={searchUid} onChange={e=>setSearchUid(e.target.value)}/>
                                        <button onClick={searchPlayer} className="btn-primary w-14 h-14 flex-shrink-0"><i className="fa-solid fa-magnifying-glass"></i></button>
                                    </div>
                                    {foundUser && (
                                        <div className="app-card p-5 flex justify-between items-center animate-pulse border-blue-500/30">
                                            <div className="flex items-center gap-4"><div className="w-12 h-12 bg-blue-600/20 rounded-full flex items-center justify-center font-black text-blue-500 text-xl">{foundUser.name[0]}</div><div><p className="font-bold text-base">{foundUser.name}</p><p className="text-[10px] text-slate-500">ID: {foundUser.uid}</p></div></div>
                                            <button onClick={sendRequest} className="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">DOST BANEIN</button>
                                        </div>
                                    )}
                                </div>

                                {friendRequests.length > 0 && (
                                    <div className="space-y-3">
                                        <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Friend Requests</h3>
                                        {friendRequests.map(req => (
                                            <div key={req.id} className="app-card p-4 flex justify-between items-center">
                                                <p className="text-sm font-bold">{req.senderName}</p>
                                                <button onClick={()=>acceptRequest(req)} className="bg-blue-600 px-5 py-2 rounded-xl text-[10px] font-black">ACCEPT</button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Dost List</h3>
                                    {friends.map(f => {
                                        const fid = f.participants.find(p => p !== userData.uid);
                                        const name = f.names[f.participants.indexOf(fid)];
                                        return (
                                            <div key={f.id} className="app-card p-5 flex justify-between items-center active:bg-slate-800/40 transition-all">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center font-black text-blue-500 text-lg border border-white/5">{name[0]}</div>
                                                    <div><p className="text-base font-bold text-white">{name}</p><p className="text-[9px] text-green-500 font-bold uppercase tracking-widest">Active Now</p></div>
                                                </div>
                                                <div className="flex gap-6 pr-2">
                                                    <button onClick={()=>{setActiveChat({fid, name}); setView('chat');}} className="text-blue-500 active:scale-90"><i className="fa-solid fa-comment-dots text-2xl"></i></button>
                                                    <button onClick={()=>setIsCalling({fid, name})} className="text-green-500 active:scale-90"><i className="fa-solid fa-phone text-2xl"></i></button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {friends.length === 0 && <p className="text-center py-20 text-slate-700 text-xs">UID search karke naye dost banayein!</p>}
                                </div>
                            </div>
                        )}

                        {view === 'chat' && activeChat && (
                            <div className="h-full flex flex-col bg-slate-950">
                                <div className="p-5 flex items-center gap-5 bg-slate-900/90 backdrop-blur-md border-b border-white/5 shadow-lg">
                                    <button onClick={()=>setView('social')} className="text-slate-400 p-2"><i className="fa-solid fa-arrow-left text-xl"></i></button>
                                    <div className="flex-1">
                                        <p className="font-bold text-base">{activeChat.name}</p>
                                        <p className="text-[10px] text-green-500 font-bold">Online</p>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 space-y-6 no-scrollbar flex flex-col justify-end">
                                    <p className="text-center text-[10px] text-slate-700 font-bold uppercase tracking-[3px] bg-slate-900/50 py-2 rounded-full mb-10">Surakshit Private Chat</p>
                                    <div className="text-center text-xs text-slate-500 italic pb-20">Baat shuru karein...</div>
                                </div>
                                <div className="p-5 flex gap-3 bg-slate-900/80 backdrop-blur-md">
                                    <input className="input-app flex-1 py-4 px-6" placeholder="Message likhein..."/>
                                    <button className="btn-primary w-14 h-14 flex items-center justify-center text-xl shadow-blue-500/20"><i className="fa-solid fa-paper-plane"></i></button>
                                </div>
                            </div>
                        )}

                        {view === 'wallet' && (
                            <div className="p-6 space-y-8">
                                <div className="app-card p-12 text-center bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800 border-none shadow-2xl relative overflow-hidden group">
                                    <div className="absolute -top-10 -right-10 w-40 h-40 bg-white/5 rounded-full blur-3xl group-hover:bg-white/10 transition-all"></div>
                                    <p className="text-blue-100 text-[10px] font-black uppercase tracking-[4px] mb-2 opacity-80">Kul Credits</p>
                                    <h2 className="text-6xl font-black text-white drop-shadow-lg">₹{userData.balance}</h2>
                                    <div className="flex gap-4 mt-10">
                                        <button onClick={()=>setWalletTab('deposit')} className={`flex-1 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest transition-all ${walletTab==='deposit'?'bg-white text-blue-800 shadow-xl':'bg-white/10 text-white border border-white/20'}`}>Jama Karein</button>
                                        <button onClick={()=>setWalletTab('withdraw')} className={`flex-1 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest transition-all ${walletTab==='withdraw'?'bg-white text-blue-800 shadow-xl':'bg-white/10 text-white border border-white/20'}`}>Nikalien</button>
                                    </div>
                                </div>

                                {walletTab === 'deposit' ? (
                                    <div className="space-y-6">
                                        {depositStep === 1 ? (
                                            <div className="space-y-6">
                                                <div className="grid grid-cols-4 gap-3">
                                                    {[50, 100, 300, 500].map(a => (
                                                        <button key={a} onClick={()=>setDepositAmount(a)} className={`py-4 rounded-2xl border-2 text-xs font-black transition-all ${depositAmount===a?'bg-blue-600 border-blue-500 text-white shadow-lg':'border-slate-800 text-slate-500 hover:border-slate-600'}`}>₹{a}</button>
                                                    ))}
                                                </div>
                                                <input className="input-app text-center py-5 font-black text-xl" placeholder="Custom Rashi" value={depositAmount} onChange={e=>setDepositAmount(e.target.value)}/>
                                                <button onClick={()=>setDepositStep(2)} className="w-full btn-primary py-5 font-black uppercase tracking-widest text-sm">AGAYE BADHEIN</button>
                                            </div>
                                        ) : (
                                            <div className="space-y-8 text-center animate-in fade-in zoom-in duration-300">
                                                <div className="bg-white p-4 w-52 h-52 mx-auto rounded-[32px] shadow-2xl border-4 border-blue-500/20"><img src={paymentConfig.qr} className="w-full h-full object-contain"/></div>
                                                <div className="space-y-2">
                                                    <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest">UPI ID (Tap to Copy)</p>
                                                    <p className="text-lg text-white font-bold select-all bg-slate-800/50 py-3 rounded-2xl border border-white/5">{paymentConfig.upi}</p>
                                                </div>
                                                <input className="input-app py-5 border-2 border-slate-700" id="utr_final" placeholder="Enter 12 Digit UTR Number"/>
                                                <button onClick={async ()=>{
                                                    const utr = document.getElementById('utr_final').value;
                                                    if(!utr || utr.length < 10) return alert("UTR sahi se bhariyein");
                                                    await db.collection('artifacts').doc('mksport').collection('transactions').add({ uid: userData.uid, amount: Number(depositAmount), utr, status: 'pending', type: 'deposit', time: new Date().toISOString() });
                                                    alert("Anurodh bhej diya gaya hai! 5-10 min intezar karein."); setDepositStep(1);
                                                }} className="w-full btn-primary py-5 font-black text-sm uppercase">SUBMIT TRANSACTION</button>
                                                <button onClick={()=>setDepositStep(1)} className="text-xs text-slate-500 hover:text-white transition-colors">Wapas Jayein</button>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <input className="input-app py-5" placeholder="Nikalne wali rashi (Min ₹100)"/>
                                        <input className="input-app py-5" placeholder="UPI ID ya Bank Jankari"/>
                                        <button className="w-full btn-primary py-5 bg-red-600 border-none shadow-red-500/20 font-black uppercase tracking-widest">WITHDRAW REQUEST</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="p-6 space-y-8">
                                <div className="app-card p-8 flex flex-col items-center relative overflow-hidden">
                                    <div onClick={handleSecretTap} className="w-24 h-24 rounded-full bg-slate-800 border-4 border-blue-500/30 p-1.5 mb-5 shadow-2xl active:scale-95 transition-all cursor-pointer">
                                        <img src={ASSETS.logo} className="w-full h-full rounded-full"/>
                                    </div>
                                    <h2 className="text-2xl font-black text-white">{userData.name}</h2>
                                    <p className="text-[10px] text-slate-500 mt-2 font-black uppercase tracking-[3px]">UID: {userData.uid}</p>
                                </div>

                                <div className="app-card p-6 border border-purple-500/10 bg-purple-500/5 shadow-inner">
                                    <div className="flex justify-between items-center mb-4"><span className="text-[11px] font-black text-purple-400 uppercase tracking-widest">Loser Bonus Streak</span><span className="text-sm font-black text-white bg-purple-500/20 px-3 py-1 rounded-full border border-purple-500/30">{userData.lossStreak || 0}/10</span></div>
                                    <div className="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden shadow-sm"><div className="bg-purple-500 h-full rounded-full transition-all duration-500" style={{width:`${Math.min((userData.lossStreak||0)*10, 100)}%`}}></div></div>
                                    <p className="text-[9px] text-slate-600 mt-3 italic text-center">Laga-tar 10 matches harne par 1 FREE entry milegi.</p>
                                </div>

                                <div className="app-card divide-y divide-white/5 overflow-hidden border border-white/5">
                                    <div className="p-5 flex items-center justify-between active:bg-white/5 transition-all" onClick={()=>{navigator.clipboard.writeText(userData.uid); alert("UID copy ho gayi!");}}>
                                        <div className="flex items-center gap-4"><i className="fa-solid fa-fingerprint text-blue-500 text-lg"></i><span className="text-sm font-bold">Meri UID Copy Karein</span></div>
                                        <i className="fa-solid fa-chevron-right text-slate-800 text-xs"></i>
                                    </div>
                                    <div className="p-5 flex items-center justify-between active:bg-white/5 transition-all" onClick={()=>window.open(`https://wa.me/${WHATSAPP_NUMBER}`)}>
                                        <div className="flex items-center gap-4"><i className="fa-solid fa-headset text-blue-500 text-lg"></i><span className="text-sm font-bold">Support Se Baat Karein</span></div>
                                        <i className="fa-solid fa-chevron-right text-slate-800 text-xs"></i>
                                    </div>
                                    <div className="p-5 flex items-center gap-4 text-red-500 active:bg-red-500/5 transition-all" onClick={()=>auth.signOut()}>
                                        <i className="fa-solid fa-power-off text-lg"></i><span className="text-sm font-black uppercase tracking-widest">Logout Karein</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ORIGINAL PANELS - Logo par 5 taps se milenge */}
                        {view === 'admin' && (
                            <div className="p-6 space-y-8 animate-in fade-in duration-500">
                                <div className="flex justify-between items-center"><h2 className="text-2xl font-black text-red-500 uppercase tracking-tighter">Admin Control</h2><button onClick={()=>setView('home')} className="text-xs font-bold text-slate-500 border border-slate-700 px-3 py-1 rounded-lg">EXIT</button></div>
                                <div className="app-card p-6 space-y-4 border-red-500/20">
                                    <h3 className="text-[10px] font-black text-red-400 uppercase tracking-widest">Match Naya Banayein</h3>
                                    <input id="m_title" placeholder="Match ka Naam" className="input-app"/>
                                    <div className="flex gap-3"><input id="m_entry" placeholder="Entry ₹" className="input-app" type="number"/><input id="m_kill" placeholder="Kill ₹" className="input-app" type="number"/></div>
                                    <input id="m_time" type="datetime-local" className="input-app"/>
                                    <button onClick={async ()=>{
                                        const t = document.getElementById('m_title').value;
                                        const e = document.getElementById('m_entry').value;
                                        const k = document.getElementById('m_kill').value;
                                        const tm = document.getElementById('m_time').value;
                                        if(!t || !e || !tm) return alert("Puri details bhariyein");
                                        await db.collection('artifacts').doc('mksport').collection('matches').add({
                                            title: t, entry: Number(e), kill: Number(k), time: tm, createdAt: new Date().toISOString(), rooms: [{id:1, players:[], roomId:'', roomPass:''}], isPreReg: false, p1: 100, p2: 50, p3: 20, map: 'BERMUDA', mode: 'SOLO'
                                        });
                                        alert("Match live ho gaya!");
                                    }} className="w-full btn-primary py-5 bg-red-600 border-none shadow-red-500/20 font-black uppercase">PUBLISH KARO</button>
                                </div>
                                <h3 className="text-xs font-bold text-slate-500 uppercase px-1">Jama requests</h3>
                                <div className="space-y-3">
                                    {deposits.map(d => (
                                        <div key={d.id} className="app-card p-5 flex justify-between items-center border-l-4 border-green-500">
                                            <div><p className="font-black text-lg">₹{d.amount}</p><p className="text-[10px] text-slate-500">UTR: {d.utr}</p></div>
                                            <button onClick={async ()=>{
                                                if(!confirm("Jama karein?")) return;
                                                const uRef = db.collection('artifacts').doc('mksport').collection('users').doc(d.uid);
                                                const uDoc = await uRef.get();
                                                await uRef.update({balance: (uDoc.data().balance||0) + Number(d.amount)});
                                                await db.collection('artifacts').doc('mksport').collection('transactions').doc(d.id).update({status:'approved'});
                                                alert("Paisa jama ho gaya!");
                                            }} className="bg-green-600 text-white px-5 py-2.5 rounded-xl text-xs font-black uppercase">APPROVE</button>
                                        </div>
                                    ))}
                                    {deposits.length === 0 && <p className="text-center text-slate-700 text-xs py-10">Koi pending request nahi hai.</p>}
                                </div>
                            </div>
                        )}
                        
                        {view === 'staff' && (
                            <div className="p-6 space-y-6">
                                <h2 className="text-xl font-bold text-blue-500">STAFF DASHBOARD</h2>
                                {matches.map(m => (
                                    <div key={m.id} className="app-card p-5 space-y-4">
                                        <p className="font-bold text-sm text-blue-400">{m.title}</p>
                                        {m.rooms.map((r, i) => (
                                            <div key={i} className="space-y-2 bg-slate-800/50 p-3 rounded-xl">
                                                <p className="text-[10px] font-bold text-slate-500">ROOM {i+1}</p>
                                                <input id={`rid_${m.id}_${i}`} placeholder="Room ID" defaultValue={r.roomId} className="input-app py-2 text-xs"/>
                                                <input id={`pass_${m.id}_${i}`} placeholder="Pass" defaultValue={r.roomPass} className="input-app py-2 text-xs"/>
                                                <button onClick={async ()=>{
                                                    const updated = [...m.rooms];
                                                    updated[i] = {...updated[i], roomId: document.getElementById(`rid_${m.id}_${i}`).value, roomPass: document.getElementById(`pass_${m.id}_${i}`).value};
                                                    await db.collection('artifacts').doc('mksport').collection('matches').doc(m.id).update({rooms: updated}); alert("ID/Pass update ho gaya!");
                                                }} className="w-full bg-blue-600 py-2 rounded-lg text-xs font-bold">SAVE</button>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* App Bottom Navigation Bar */}
                    <nav className="fixed bottom-0 w-full bg-slate-900 border-t border-white/5 px-8 pt-4 pb-12 flex justify-between items-center z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                        <button onClick={()=>setView('home')} className={`nav-item ${view==='home'?'active':''}`}><i className="fa-solid fa-gamepad text-xl"></i><span className="text-[10px] font-black uppercase tracking-tighter">Khele</span></button>
                        <button onClick={()=>setView('social')} className={`nav-item ${view==='social'?'active':''}`}><i className="fa-solid fa-users text-xl"></i><span className="text-[10px] font-black uppercase tracking-tighter">Dost</span></button>
                        <button onClick={()=>setView('wallet')} className={`nav-item ${view==='wallet'?'active':''}`}><i className="fa-solid fa-wallet text-xl"></i><span className="text-[10px] font-black uppercase tracking-tighter">Paisa</span></button>
                        <button onClick={()=>setView('profile')} className={`nav-item ${view==='profile'?'active':''}`}><i className="fa-solid fa-user-circle text-xl"></i><span className="text-[10px] font-black uppercase tracking-tighter">Profile</span></button>
                    </nav>

                    <div className="safe-bottom bg-slate-900"></div>

                    {/* Join Match Modal Pop-up */}
                    {joiningMatch && (
                        <div className="fixed inset-0 z-[100] flex items-end animate-in fade-in duration-300">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={()=>setJoiningMatch(null)}></div>
                            <div className="relative w-full app-card rounded-t-[48px] p-10 animate-[slideUp_0.4s_ease-out] shadow-[0_-10px_50px_rgba(59,130,246,0.2)] border-t-2 border-blue-500/20">
                                <div className="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-8"></div>
                                <h3 className="text-2xl font-black mb-8 text-center text-white tracking-tighter uppercase">Registration Pakka Karein</h3>
                                <div className="space-y-5 mb-8">
                                    <div className="flex justify-between items-center px-2"><span className="text-slate-500 font-bold text-sm">Match</span><span className="font-black text-blue-400">{joiningMatch.title}</span></div>
                                    <div className="flex justify-between items-center px-2"><span className="text-slate-500 font-bold text-sm">Entry Fees</span><span className="font-black text-green-500">₹{joiningMatch.entry}</span></div>
                                    <input className="input-app py-5 mt-4 border-2 border-slate-700 focus:border-blue-500 transition-all" placeholder="Gamer ID (IGN) Bhariyein" onChange={e=>setJoinFormData({ign: e.target.value})}/>
                                </div>
                                <button onClick={async ()=>{
                                    if(!joinFormData.ign) return alert("IGN bharna zaruri hai!");
                                    const m = joiningMatch;
                                    try {
                                        await db.runTransaction(async (t) => {
                                            const mRef = db.collection('artifacts').doc('mksport').collection('matches').doc(m.id);
                                            const uRef = db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid);
                                            const mDoc = await t.get(mRef);
                                            const uDoc = await t.get(uRef);
                                            if(uDoc.data().balance < m.entry) throw "Balance kam hai! Jama karein.";
                                            let rooms = mDoc.data().rooms || [{id:1, players:[]}];
                                            if(rooms[0].players.some(p => p.uid === userData.uid)) throw "Pehle se joined hain!";
                                            rooms[0].players.push({ uid: userData.uid, ign: joinFormData.ign, name: userData.name });
                                            t.update(uRef, { balance: uDoc.data().balance - m.entry, joinedMatches: (uDoc.data().joinedMatches || 0) + 1 });
                                            t.update(mRef, { rooms: rooms });
                                        });
                                        alert("Aap match mein shamil ho chuke hain!"); setJoiningMatch(null);
                                    } catch(e) { alert(e); }
                                }} className="w-full btn-primary py-5 uppercase text-sm font-black shadow-2xl tracking-[3px]">REGISTRATION KARO</button>
                                <div className="safe-bottom"></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
