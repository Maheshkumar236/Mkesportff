<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MK ESPORT - PRO MAX</title>
    
    <!-- PWA & App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; }
        * { -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
        
        #root { height: 100%; display: flex; flex-direction: column; }
        .main-content { flex: 1; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Trusted & Simple UI Components */
        .app-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        .btn-primary { background: var(--primary); color: white; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.96); }
        .input-app { background: #334155; border: 1px solid #475569; color: white; padding: 12px 16px; border-radius: 12px; width: 100%; outline: none; font-size: 16px; }

        .nav-item { color: #64748b; transition: 0.3s; font-size: 18px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active span { color: var(--primary); }

        /* Call UI Overlay */
        .call-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b, #0f172a); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 40px; }
        .calling-animation { width: 120px; height: 120px; background: var(--primary); border-radius: 50%; display: flex; items-center; justify-content: center; position: relative; }
        .calling-animation::after { content: ''; position: absolute; inset: -10px; border: 2px solid var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

        .video-container { border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); aspect-ratio: 16/9; background: #000; }
        .safe-top { height: env(safe-area-inset-top, 20px); }
        .safe-bottom { height: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIG & ASSETS ---
        const firebaseConfig = {
            apiKey: "AIzaSyBJWklGdsRM_XNo2_4AUceUZsiIyIjbUBA",
            authDomain: "mk-esports-60429.firebaseapp.com",
            projectId: "mk-esports-60429",
            storageBucket: "mk-esports-60429.firebasestorage.app",
            messagingSenderId: "663019221754",
            appId: "1:663019221754:web:d75e59277feb0ac12a8f43",
        };
        const ASSETS = { logo: "https://i.ibb.co/7dLY0XrF/logo.png", qr: "https://i.ibb.co/qFVjTWLK/qr.png" };
        const WHATSAPP_NUMBER = "916394562344";

        const { useState, useEffect, useRef } = React;

        // Firebase Init
        let app, auth, db;
        try {
            if (!firebase.apps.length) app = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch(e) { console.error(e); }

        const App = () => {
            const [view, setView] = useState('home'); 
            const [userData, setUserData] = useState(null);
            const [isRegister, setIsRegister] = useState(false);
            const [authForm, setAuthForm] = useState({ name: '', mobile: '', email: '', password: '', confirm: '', refer: '' });
            
            // Data States
            const [matches, setMatches] = useState([]);
            const [preRegEvents, setPreRegEvents] = useState([]);
            const [chatMessages, setChatMessages] = useState([]);
            const [friends, setFriends] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [privateMsgs, setPrivateMsgs] = useState([]);
            const [isCalling, setIsCalling] = useState(null);
            const [walletTab, setWalletTab] = useState('deposit');
            const [depositAmount, setDepositAmount] = useState('');
            const [joiningMatch, setJoiningMatch] = useState(null);
            const [joinFormData, setJoinFormData] = useState({});
            const [tapCount, setTapCount] = useState(0);

            // Auth Listener
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        const doc = await db.collection('artifacts').doc('mksport').collection('users').doc(u.uid).get();
                        if (doc.exists) {
                            setUserData(doc.data());
                            setupRealtime(u.uid);
                        }
                    } else { setView('auth'); }
                });
                return () => unsub();
            }, []);

            const setupRealtime = (uid) => {
                // Global Data
                db.collection('artifacts').doc('mksport').collection('matches').orderBy('createdAt', 'desc').onSnapshot(s => {
                    const all = s.docs.map(d => ({id: d.id, ...d.data()}));
                    setMatches(all.filter(m => !m.isPreReg));
                    setPreRegEvents(all.filter(m => m.isPreReg));
                });
                db.collection('artifacts').doc('mksport').collection('chat').orderBy('time', 'desc').limit(50).onSnapshot(s => setChatMessages(s.docs.map(d => ({id: d.id, ...d.data()})).reverse()));
                
                // Social Data
                db.collection('artifacts').doc('mksport').collection('friends').where('participants', 'array-contains', uid).onSnapshot(s => {
                    setFriends(s.docs.map(d => ({id: d.id, ...d.data()})));
                });
            };

            // Social Logic
            const sendFriendRequest = async () => {
                const uid = prompt("Enter Player UID:");
                if(!uid || uid === userData.uid) return;
                await db.collection('artifacts').doc('mksport').collection('friends').add({
                    participants: [userData.uid, uid],
                    status: 'accepted', // Auto-accepting for demo, original would be pending
                    names: [userData.name, `Player_${uid.slice(-4)}`],
                    time: new Date().toISOString()
                });
                alert("Friend Added!");
            };

            const sendPrivateMsg = async (text) => {
                if(!text || !activeChat) return;
                const chatId = [userData.uid, activeChat.friendId].sort().join('_');
                await db.collection('artifacts').doc('mksport').collection('private_chats').doc(chatId).collection('messages').add({
                    senderId: userData.uid, text, time: new Date().toISOString()
                });
                document.getElementById('pChatInp').value = '';
            };

            // Original Logic: Secret Tap for Admin/Staff
            const handleSecretTap = () => {
                const n = tapCount + 1; setTapCount(n);
                if(n === 5) {
                    const c = prompt("Enter Secret Code:");
                    if(c === "admin123") { setView('admin'); setTapCount(0); }
                    else if(c === "staff123") { setView('staff'); setTapCount(0); }
                    else { alert("Wrong Code"); setTapCount(0); }
                }
            };

            // Original Logic: Join Match
            const handleJoinMatch = async () => {
                if(!joiningMatch) return;
                const m = joiningMatch;
                if(userData.balance < m.entry) return alert("Low Balance!");
                
                try {
                    await db.runTransaction(async (t) => {
                        const mRef = db.collection('artifacts').doc('mksport').collection('matches').doc(m.id);
                        const uRef = db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid);
                        const mDoc = await t.get(mRef);
                        const uDoc = await t.get(uRef);
                        
                        let rooms = mDoc.data().rooms || [];
                        rooms[0].players.push({ uid: userData.uid, ign: joinFormData.ign, name: userData.name });
                        
                        t.update(uRef, { balance: uDoc.data().balance - m.entry });
                        t.update(mRef, { rooms: rooms });
                    });
                    alert("Joined successfully!");
                    setJoiningMatch(null);
                } catch(e) { alert(e); }
            };

            // Auth Handler
            const handleAuth = async () => {
                const email = `${authForm.mobile}@mkesport.com`;
                try {
                    if(isRegister) {
                        const r = await auth.createUserWithEmailAndPassword(email, authForm.password);
                        const uData = { uid: r.user.uid, name: authForm.name, phone: authForm.mobile, balance: 0, role: 'user', referralCode: "MK"+Math.floor(1000+Math.random()*9000) };
                        await db.collection('artifacts').doc('mksport').collection('users').doc(r.user.uid).set(uData);
                        setUserData(uData);
                    } else {
                        await auth.signInWithEmailAndPassword(email, authForm.password);
                    }
                } catch(e) { alert(e.message); }
            };

            if (view === 'auth') return (
                <div className="h-full flex flex-col items-center justify-center p-8 bg-[#0f172a]">
                    <img src={ASSETS.logo} className="w-20 h-20 mb-8 drop-shadow-lg"/>
                    <div className="w-full max-w-sm app-card p-8">
                        <div className="flex bg-slate-800 rounded-lg p-1 mb-6">
                            <button onClick={()=>setIsRegister(false)} className={`flex-1 py-2 text-xs font-bold rounded ${!isRegister?'bg-blue-600':'text-gray-500'}`}>LOGIN</button>
                            <button onClick={()=>setIsRegister(true)} className={`flex-1 py-2 text-xs font-bold rounded ${isRegister?'bg-blue-600':'text-gray-500'}`}>REGISTER</button>
                        </div>
                        <div className="space-y-4">
                            {isRegister && <input className="input-app" placeholder="Full Name" onChange={e=>setAuthForm({...authForm, name: e.target.value})}/>}
                            <input className="input-app" placeholder="Mobile Number" type="number" onChange={e=>setAuthForm({...authForm, mobile: e.target.value})}/>
                            <input className="input-app" placeholder="Password" type="password" onChange={e=>setAuthForm({...authForm, password: e.target.value})}/>
                            <button onClick={handleAuth} className="w-full btn-primary py-4 mt-2">CONTINUE</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="h-full flex flex-col">
                    <div className="safe-top bg-slate-950"></div>
                    
                    {/* Calling UI */}
                    {isCalling && (
                        <div className="call-overlay">
                            <div className="flex flex-col items-center gap-6">
                                <div className="calling-animation"><i className="fa-solid fa-user text-4xl"></i></div>
                                <h2 className="text-2xl font-black">{isCalling.name}</h2>
                                <p className="text-blue-400 font-bold tracking-widest animate-pulse">VOICE CALLING...</p>
                            </div>
                            <div className="flex gap-12">
                                <button onClick={()=>setIsCalling(null)} className="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-2xl shadow-xl active:scale-90"><i className="fa-solid fa-phone-slash"></i></button>
                                <button className="w-16 h-16 bg-slate-700 rounded-full flex items-center justify-center text-2xl shadow-xl"><i className="fa-solid fa-microphone-slash"></i></button>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="px-6 py-4 flex justify-between items-center bg-slate-900 border-b border-white/5 z-50">
                        <div className="flex items-center gap-2">
                            <img src={ASSETS.logo} className="w-8 h-8 rounded-full border border-blue-500"/>
                            <span className="font-orbitron font-black text-sm uppercase">MK <span className="text-blue-500">SPORT</span></span>
                        </div>
                        <div onClick={()=>setView('wallet')} className="bg-blue-500/10 px-4 py-1.5 rounded-full border border-blue-500/20 text-blue-400 font-bold text-xs">
                            ₹{userData?.balance}
                        </div>
                    </header>

                    {/* Views */}
                    <main className="main-content no-scrollbar">
                        {view === 'home' && (
                            <div className="p-6 space-y-6">
                                <div className="video-container">
                                    <iframe className="w-full h-full" src="https://www.youtube.com/embed/9iW-sL7Upt0?autoplay=1&mute=1&loop=1"></iframe>
                                </div>

                                <section className="space-y-4">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest border-l-2 border-blue-500 pl-2">Daily Matches</h3>
                                    {matches.map(m => (
                                        <div key={m.id} className="app-card p-5 flex items-center justify-between">
                                            <div>
                                                <h4 className="font-bold text-sm">{m.title}</h4>
                                                <p className="text-[10px] text-slate-500 mt-1 uppercase">{m.mode} • ENTRY ₹{m.entry} • {m.time}</p>
                                            </div>
                                            <button onClick={()=>setJoiningMatch(m)} className="btn-primary px-6 py-2 text-[10px]">JOIN</button>
                                        </div>
                                    ))}
                                </section>
                            </div>
                        )}

                        {view === 'social' && (
                            <div className="p-6 space-y-6">
                                <div className="flex gap-2">
                                    <button onClick={sendFriendRequest} className="flex-1 btn-primary py-3 text-xs"><i className="fa-solid fa-user-plus mr-2"></i>FIND BY UID</button>
                                </div>

                                <h3 className="text-xs font-bold text-slate-500 uppercase">My Friends</h3>
                                {friends.map(f => {
                                    const friendId = f.participants.find(p => p !== userData.uid);
                                    const name = f.names[f.participants.indexOf(friendId)];
                                    return (
                                        <div key={f.id} className="app-card p-4 flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center font-bold text-blue-500">{name[0]}</div>
                                                <div><p className="text-sm font-bold">{name}</p><p className="text-[9px] text-green-500">Active</p></div>
                                            </div>
                                            <div className="flex gap-4">
                                                <button onClick={()=>{ setActiveChat({friendId, name}); setView('pchat'); }} className="text-blue-500"><i className="fa-solid fa-comment-dots text-xl"></i></button>
                                                <button onClick={()=>setIsCalling({name, friendId})} className="text-green-500"><i className="fa-solid fa-phone text-xl"></i></button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {view === 'pchat' && activeChat && (
                            <div className="h-full flex flex-col bg-slate-950 p-4">
                                <div className="flex items-center gap-4 mb-4">
                                    <button onClick={()=>setView('social')}><i className="fa-solid fa-arrow-left"></i></button>
                                    <p className="font-bold text-sm">{activeChat.name}</p>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-3 no-scrollbar pb-4">
                                    {/* Private messages listener logic would go here */}
                                    <p className="text-center text-[10px] text-slate-700">Messages are encrypted</p>
                                </div>
                                <div className="flex gap-2">
                                    <input id="pChatInp" className="input-app flex-1" placeholder="Type message..."/>
                                    <button onClick={()=>sendPrivateMsg(document.getElementById('pChatInp').value)} className="btn-primary px-4"><i className="fa-solid fa-paper-plane"></i></button>
                                </div>
                            </div>
                        )}

                        {view === 'wallet' && (
                            <div className="p-6 space-y-6">
                                <div className="app-card p-10 text-center bg-gradient-to-br from-blue-600 to-blue-800 border-none shadow-xl">
                                    <p className="text-blue-100 text-[10px] font-bold uppercase tracking-widest mb-1">My Balance</p>
                                    <h2 className="text-5xl font-black">₹{userData.balance}</h2>
                                    <div className="flex gap-2 mt-8">
                                        <button onClick={()=>setWalletTab('deposit')} className={`flex-1 py-3 text-[10px] font-bold rounded-lg ${walletTab==='deposit'?'bg-white text-blue-800':'bg-white/10'}`}>ADD CASH</button>
                                        <button onClick={()=>setWalletTab('withdraw')} className={`flex-1 py-3 text-[10px] font-bold rounded-lg ${walletTab==='withdraw'?'bg-white text-blue-800':'bg-white/10'}`}>WITHDRAW</button>
                                    </div>
                                </div>

                                {walletTab === 'deposit' ? (
                                    <div className="space-y-4">
                                        <div className="grid grid-cols-4 gap-2">{[50, 100, 300, 500].map(a => <button onClick={()=>setDepositAmount(a)} className={`py-2 rounded-lg border text-xs font-bold ${depositAmount===a?'bg-blue-600 border-blue-600':'border-slate-700'}`}>₹{a}</button>)}</div>
                                        <img src={ASSETS.qr} className="w-48 h-48 mx-auto p-2 bg-white rounded-xl"/>
                                        <input className="input-app" id="utr_inp" placeholder="Enter 12 Digit UTR"/>
                                        <button onClick={()=>{
                                            const utr = document.getElementById('utr_inp').value;
                                            db.collection('artifacts').doc('mksport').collection('transactions').add({ uid: userData.uid, amount: Number(depositAmount), utr, status: 'pending', type: 'deposit' });
                                            alert("Request Submitted!");
                                        }} className="w-full btn-primary py-4">SUBMIT DEPOSIT</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <input className="input-app" placeholder="Enter Amount (Min ₹100)"/>
                                        <input className="input-app" placeholder="UPI ID / Number"/>
                                        <button className="w-full btn-primary py-4 bg-red-500">REQUEST WITHDRAW</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="p-6 space-y-6">
                                <div className="app-card p-6 flex flex-col items-center">
                                    <div onClick={handleSecretTap} className="w-20 h-20 rounded-full bg-slate-800 border-2 border-blue-500 p-1 mb-4">
                                        <img src={ASSETS.logo} className="w-full h-full rounded-full"/>
                                    </div>
                                    <h2 className="text-lg font-bold">{userData.name}</h2>
                                    <p className="text-[10px] text-slate-500">UID: {userData.uid}</p>
                                </div>
                                <div className="app-card divide-y divide-white/5 overflow-hidden">
                                    <div className="p-4 flex justify-between items-center active:bg-white/5" onClick={()=>navigator.clipboard.writeText(userData.uid)}>
                                        <div className="flex items-center gap-3"><i className="fa-solid fa-copy text-blue-500"></i><span className="text-sm">Copy My UID</span></div>
                                        <i className="fa-solid fa-chevron-right text-slate-700"></i>
                                    </div>
                                    <div className="p-4 flex justify-between items-center" onClick={()=>window.open(`https://wa.me/${WHATSAPP_NUMBER}`)}>
                                        <div className="flex items-center gap-3"><i className="fa-solid fa-headset text-blue-500"></i><span className="text-sm">Support</span></div>
                                        <i className="fa-solid fa-chevron-right text-slate-700"></i>
                                    </div>
                                    <div className="p-4 flex items-center gap-3 text-red-500" onClick={()=>auth.signOut()}>
                                        <i className="fa-solid fa-power-off"></i><span className="text-sm font-bold">Logout Session</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Panels Restored from Original */}
                        {view === 'admin' && (
                            <div className="p-6 space-y-4">
                                <button onClick={()=>setView('home')} className="text-xs mb-4"><i className="fa-solid fa-arrow-left mr-2"></i>EXIT ADMIN</button>
                                <h2 className="text-lg font-bold text-red-500">ADMIN CONTROL</h2>
                                <input id="m_title" placeholder="Match Title" className="input-app"/>
                                <input id="m_entry" placeholder="Entry Fee" className="input-app"/>
                                <input id="m_time" type="datetime-local" className="input-app"/>
                                <button onClick={async ()=>{
                                    const t = document.getElementById('m_title').value;
                                    const e = document.getElementById('m_entry').value;
                                    const tm = document.getElementById('m_time').value;
                                    await db.collection('artifacts').doc('mksport').collection('matches').add({
                                        title: t, entry: Number(e), time: tm, createdAt: new Date().toISOString(), rooms: [{id:1, players:[]}], isPreReg: false
                                    });
                                    alert("Match Created!");
                                }} className="w-full btn-primary py-3 bg-red-600">PUBLISH MATCH</button>
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 w-full bg-slate-900 border-t border-white/5 px-8 pt-4 pb-8 flex justify-between items-center z-50">
                        <button onClick={()=>setView('home')} className={`nav-item ${view==='home'?'active':''}`}><i className="fa-solid fa-gamepad"></i><span className="text-[10px] font-bold">PLAY</span></button>
                        <button onClick={()=>setView('social')} className={`nav-item ${view==='social'?'active':''}`}><i className="fa-solid fa-users"></i><span className="text-[10px] font-bold">SOCIAL</span></button>
                        <button onClick={()=>setView('wallet')} className={`nav-item ${view==='wallet'?'active':''}`}><i className="fa-solid fa-wallet"></i><span className="text-[10px] font-bold">CASH</span></button>
                        <button onClick={()=>setView('profile')} className={`nav-item ${view==='profile'?'active':''}`}><i className="fa-solid fa-user-circle"></i><span className="text-[10px] font-bold">ME</span></button>
                    </nav>

                    <div className="safe-bottom bg-slate-900"></div>

                    {/* Join Modal Overlay */}
                    {joiningMatch && (
                        <div className="fixed inset-0 z-[100] flex items-end">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={()=>setJoiningMatch(null)}></div>
                            <div className="relative w-full app-card rounded-t-[30px] p-8 animate-in slide-in-from-bottom-full">
                                <h3 className="font-bold text-xl mb-6 text-center">Confirm Registration</h3>
                                <input className="input-app mb-4" placeholder="Enter In-Game Name (IGN)" onChange={e=>setJoinFormData({ign: e.target.value})}/>
                                <button onClick={handleJoinMatch} className="w-full btn-primary py-4 uppercase text-xs tracking-widest">PAY ₹{joiningMatch.entry} & JOIN</button>
                                <div className="safe-bottom"></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
