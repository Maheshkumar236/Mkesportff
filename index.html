<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITESTAR - Complete Esports System</title>
    <!-- Frameworks & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        :root { --neon-orange: #FF6B00; --bg-black: #0A0A0A; }
        body { background-color: var(--bg-black); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .font-gaming { font-family: 'Orbitron', sans-serif; }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .neon-glow { box-shadow: 0 0 15px rgba(255, 107, 0, 0.3); }
        .neon-text { color: var(--neon-orange); text-shadow: 0 0 8px rgba(255, 107, 0, 0.6); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; }
        
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none !important; transition: 0.3s; }
        input:focus { border-color: var(--neon-orange) !important; box-shadow: 0 0 10px rgba(255,107,0,0.2); }

        .tab-active { background: var(--neon-orange); color: black; box-shadow: 0 0 15px rgba(255,107,0,0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- IMPORTANT: FILL YOUR FIREBASE KEYS HERE ---
        const firebaseConfig = {
  apiKey: "AIzaSyDPChNIAQz0gEmsuDFpACl0XvWm-DNcf2k",
  authDomain: "eliteweb-5b512.firebaseapp.com",
  projectId: "eliteweb-5b512",
  storageBucket: "eliteweb-5b512.firebasestorage.app",
  messagingSenderId: "474751993215",
  appId: "1:474751993215:web:88be5ffccdd88651cf464a",
  measurementId: "G-9HZY4280CY"
};

        // Firebase Initialization with Safety
        let isFirebaseConfigured = false;
        if (firebaseConfig.apiKey) {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            isFirebaseConfigured = true;
        }
        
        const auth = isFirebaseConfigured ? firebase.auth() : null;
        const db = isFirebaseConfigured ? firebase.firestore() : null;
        const appId = "elitestar-v1";

        // Icon Component
        const Icon = ({ name, size = 20, className = "" }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) setSvg(icon.toSvg({ width: size, height: size, class: className }));
                }
            }, [name, size, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('home'); 
            const [matches, setMatches] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isBotOpen, setIsBotOpen] = useState(false);

            useEffect(() => {
                if (!isFirebaseConfigured) {
                    // DEMO MODE DATA
                    setProfile({
                        username: "GUEST_ELITE",
                        elitestarId: "STAR-DEMO",
                        balance: 500,
                        role: 'admin',
                        ffName: 'DemoPlayer',
                        ffId: '12345678',
                        ffLevel: 65,
                        wins: 12,
                        matches: 45
                    });
                    setMatches([
                        { id: 'm1', title: 'Sunday Solo Rush', prize: 1000, entry: 50, joined: 48, maxPlayers: 48, mode: 'Solo', status: 'open', roomId: '71223', roomPass: '9988' },
                        { id: 'm2', title: 'Duo Night Battle', prize: 2000, entry: 100, joined: 12, maxPlayers: 24, mode: 'Duo', status: 'open' }
                    ]);
                    setLoading(false);
                    return;
                }

                const unsubAuth = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        await syncProfile(u.uid);
                    } else {
                        try { await auth.signInAnonymously(); } catch(e) { console.error(e); }
                    }
                });
                return () => unsubAuth();
            }, []);

            const syncProfile = async (uid) => {
                const ref = db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('profile').doc('data');
                const snap = await ref.get();
                if (snap.exists) {
                    setProfile(snap.data());
                } else {
                    const data = {
                        username: "STAR_" + Math.floor(1000 + Math.random()*9000),
                        uid: uid,
                        elitestarId: "STAR-" + Math.floor(1000 + Math.random()*9000),
                        balance: 0,
                        role: 'user', 
                        ffId: '', ffName: '', ffLevel: 1, wins: 0, matches: 0, joinedAt: Date.now()
                    };
                    await ref.set(data);
                    setProfile(data);
                }
                setLoading(false);
            };

            useEffect(() => {
                if (!isFirebaseConfigured || !user) return;
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches')
                    .onSnapshot(snap => setMatches(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                return () => unsub();
            }, [user]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-black">
                    <div className="bg-[#FF6B00] p-4 rounded-3xl neon-glow mb-6">
                        <Icon name="Trophy" size={48} className="text-black" />
                    </div>
                    <div className="text-[#FF6B00] font-gaming text-xl animate-pulse">ELITESTAR LOADING...</div>
                    {!isFirebaseConfigured && <div className="mt-4 text-xs text-red-500 font-bold uppercase">Firebase Config Missing - Running Demo Mode</div>}
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 relative">
                    <header className="p-4 flex justify-between items-center sticky top-0 z-50 bg-black/90 backdrop-blur-md border-b border-white/5">
                        <div className="flex items-center gap-2" onClick={() => setView('home')}>
                            <div className="bg-[#FF6B00] p-1.5 rounded-lg">
                                <Icon name="Zap" size={18} className="text-black" />
                            </div>
                            <h1 className="font-gaming font-black text-xl italic tracking-tighter">ELITE<span className="text-[#FF6B00]">STAR</span></h1>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="text-xs font-black text-[#FF6B00] bg-[#FF6B00]/10 px-2 py-1 rounded">₹{profile?.balance}</div>
                            <div className="w-9 h-9 glass p-[1px] cursor-pointer border-[#FF6B00]/30" onClick={() => setView('profile')}>
                                <div className="w-full h-full bg-black rounded-[18px] flex items-center justify-center font-bold text-[#FF6B00] text-xs">
                                    {profile?.username?.[0]}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="p-4 animate-slide-up">
                        {view === 'home' && <HomeView profile={profile} matches={matches} setView={setView} />}
                        {view === 'play' && <PlayView matches={matches} setView={setView} />}
                        {view === 'chat' && <ChatView profile={profile} db={db} appId={appId} isDemo={!isFirebaseConfigured} />}
                        {view === 'squad' && <SquadView profile={profile} />}
                        {view === 'wallet' && <WalletView profile={profile} />}
                        {view === 'admin' && <AdminView matches={matches} db={db} appId={appId} isDemo={!isFirebaseConfigured} />}
                        {view === 'staff' && <StaffView matches={matches} db={db} appId={appId} isDemo={!isFirebaseConfigured} />}
                        {view === 'profile' && <ProfileView profile={profile} />}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 z-50 bg-gradient-to-t from-black to-transparent">
                        <div className="glass p-2 flex justify-around items-center border-white/10 !bg-black/90 shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
                            <NavBtn active={view === 'home'} icon="Layout" onClick={() => setView('home')} />
                            <NavBtn active={view === 'play'} icon="Sword" onClick={() => setView('play')} />
                            <NavBtn active={view === 'chat'} icon="MessageSquare" onClick={() => setView('chat')} />
                            <NavBtn active={view === 'squad'} icon="Users" onClick={() => setView('squad')} />
                            <NavBtn active={view === 'wallet'} icon="Wallet" onClick={() => setView('wallet')} />
                            {profile?.role === 'admin' && <NavBtn active={view === 'admin'} icon="ShieldCheck" onClick={() => setView('admin')} />}
                            {profile?.role === 'staff' && <NavBtn active={view === 'staff'} icon="ShieldCheck" onClick={() => setView('staff')} />}
                        </div>
                    </nav>

                    <button 
                        onClick={() => setIsBotOpen(!isBotOpen)}
                        className="fixed bottom-24 right-4 w-12 h-12 bg-[#FF6B00] text-black rounded-full shadow-lg flex items-center justify-center hover:scale-110 transition-all z-[60]"
                    >
                        <Icon name="Bot" size={24} />
                    </button>
                    {isBotOpen && <EliteBot close={() => setIsBotOpen(false)} />}
                </div>
            );
        };

        const NavBtn = ({ active, icon, onClick }) => (
            <button onClick={onClick} className={`p-3 rounded-2xl transition-all ${active ? 'tab-active' : 'text-gray-500'}`}>
                <Icon name={icon} size={22} />
            </button>
        );

        // --- View: Home ---
        const HomeView = ({ profile, matches, setView }) => (
            <div className="space-y-6">
                <div className="glass p-6 border-l-4 border-[#FF6B00] relative overflow-hidden">
                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest">Player Status</p>
                    <h2 className="text-3xl font-black italic">{profile?.username}</h2>
                    <p className="text-[#FF6B00] text-xs font-bold uppercase">{profile?.elitestarId}</p>
                    <div className="mt-4 grid grid-cols-2 gap-3">
                        <div className="bg-white/5 p-3 rounded-xl">
                            <p className="text-[8px] text-gray-500 font-bold uppercase">Earnings</p>
                            <p className="text-xl font-black text-green-500">₹{profile?.balance}</p>
                        </div>
                        <div className="bg-white/5 p-3 rounded-xl">
                            <p className="text-[8px] text-gray-500 font-bold uppercase">Win Rate</p>
                            <p className="text-xl font-black">24%</p>
                        </div>
                    </div>
                </div>

                <div className="flex justify-between items-center">
                    <h3 className="font-gaming text-sm font-black italic text-[#FF6B00]">UPCOMING BATTLES</h3>
                    <button onClick={() => setView('play')} className="text-[10px] font-bold text-gray-500 uppercase">View All</button>
                </div>

                <div className="space-y-4">
                    {matches.map(m => <MatchCard key={m.id} match={m} />)}
                </div>
            </div>
        );

        const MatchCard = ({ match }) => {
            const isFull = match.joined >= match.maxPlayers;
            return (
                <div className="glass p-4 flex gap-4 items-center bg-gradient-to-r from-white/5 to-transparent">
                    <div className="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center font-gaming text-[#FF6B00] border border-white/10">FF</div>
                    <div className="flex-grow">
                        <h4 className="font-bold text-sm uppercase leading-tight">{match.title}</h4>
                        <div className="flex gap-2 mt-1 text-[9px] font-bold text-gray-400 uppercase">
                            <span className="bg-white/10 px-1.5 py-0.5 rounded text-white">{match.mode}</span>
                            <span className="bg-orange-500/10 px-1.5 py-0.5 rounded text-[#FF6B00]">₹{match.prize} POOL</span>
                        </div>
                        <div className="mt-3 w-full h-1 bg-white/10 rounded-full overflow-hidden">
                            <div className="h-full bg-[#FF6B00] neon-glow" style={{ width: `${(match.joined/match.maxPlayers)*100}%` }}></div>
                        </div>
                    </div>
                    <div className="text-right">
                        <p className="text-[9px] font-black text-gray-500 uppercase mb-1">{match.joined}/{match.maxPlayers}</p>
                        <button className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${isFull ? 'bg-red-500/20 text-red-500' : 'bg-[#FF6B00] text-black shadow-lg shadow-orange-500/20 active:scale-95'}`}>
                            {isFull ? 'FULL' : 'JOIN'}
                        </button>
                    </div>
                </div>
            );
        };

        const PlayView = ({ matches }) => (
            <div className="space-y-4">
                <h2 className="font-gaming text-lg font-black italic text-[#FF6B00] uppercase">Arena Tournaments</h2>
                <div className="space-y-4">{matches.map(m => <MatchCard key={m.id} match={m} />)}</div>
            </div>
        );

        // --- Chat System (Discord Style) ---
        const ChatView = ({ profile, db, appId, isDemo }) => {
            const [channel, setChannel] = useState('general');
            const [msgs, setMsgs] = useState([
                { sender: 'ELITE_BOT', text: 'Welcome to ELITESTAR Global Chat!', role: 'admin', timestamp: Date.now() }
            ]);
            const [input, setInput] = useState('');

            useEffect(() => {
                if (isDemo) return;
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(`chats_${channel}`)
                    .orderBy('timestamp', 'asc').limit(50)
                    .onSnapshot(snap => setMsgs(snap.docs.map(d => d.data())));
                return () => unsub();
            }, [channel]);

            const send = () => {
                if (!input.trim()) return;
                if (isDemo) {
                    setMsgs([...msgs, { sender: profile.username, text: input, uid: 'me', timestamp: Date.now() }]);
                } else {
                    db.collection('artifacts').doc(appId).collection('public').doc('data').collection(`chats_${channel}`).add({
                        sender: profile.username, text: input, timestamp: Date.now(), uid: profile.uid, role: profile.role
                    });
                }
                setInput('');
            };

            return (
                <div className="h-[75vh] flex flex-col glass overflow-hidden border-[#FF6B00]/20">
                    <div className="flex bg-black/40 border-b border-white/5 p-1">
                        {['general', 'squads', 'matches'].map(ch => (
                            <button key={ch} onClick={() => setChannel(ch)} className={`flex-1 p-2 rounded-xl text-[10px] font-black uppercase tracking-widest ${channel === ch ? 'bg-[#FF6B00] text-black' : 'text-gray-500'}`}>#{ch}</button>
                        ))}
                    </div>
                    <div className="flex-grow overflow-y-auto p-4 space-y-3">
                        {msgs.map((m, i) => (
                            <div key={i} className={`flex flex-col ${m.uid === 'me' || m.uid === profile?.uid ? 'items-end' : 'items-start'}`}>
                                <div className="flex items-center gap-1 mb-0.5">
                                    {m.role === 'admin' && <Icon name="Crown" size={10} className="text-yellow-500" />}
                                    <span className="text-[8px] text-gray-500 font-black uppercase">{m.sender}</span>
                                </div>
                                <div className={`px-4 py-2 rounded-2xl text-xs max-w-[85%] ${m.uid === 'me' || m.uid === profile?.uid ? 'bg-[#FF6B00] text-black font-bold' : 'bg-white/10 text-white'}`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-3 bg-black/50 border-t border-white/10 flex gap-2">
                        <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && send()} className="flex-grow p-3 rounded-xl text-xs" placeholder={`Message #${channel}...`} />
                        <button onClick={send} className="bg-[#FF6B00] p-3 rounded-xl text-black"><Icon name="Send" size={18} /></button>
                    </div>
                </div>
            );
        };

        const SquadView = ({ profile }) => (
            <div className="space-y-6">
                <div className="text-center py-6">
                    <Icon name="Users" size={48} className="mx-auto text-[#FF6B00] mb-2" />
                    <h2 className="font-gaming text-xl font-black uppercase italic">Squad System</h2>
                    <p className="text-gray-500 text-xs">Permanent team for tournaments</p>
                </div>
                <div className="glass p-8 text-center border-dashed border-2 border-white/10">
                    <h3 className="text-lg font-bold mb-2 uppercase">Create Your Squad</h3>
                    <p className="text-[10px] text-gray-500 uppercase mb-6">Join matches with 1-click squad auto-fill</p>
                    <button className="w-full bg-white text-black font-black p-4 rounded-2xl uppercase text-xs tracking-widest active:scale-95 transition-all">Create New Squad</button>
                    <button className="w-full glass mt-3 font-black p-4 rounded-2xl uppercase text-xs tracking-widest border-white/10">Join Existing</button>
                </div>
            </div>
        );

        const WalletView = ({ profile }) => (
            <div className="space-y-6">
                <div className="glass p-8 text-center relative overflow-hidden border-[#FF6B00]/30 border-2">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-[#FF6B00]/5 rounded-full blur-3xl"></div>
                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">Elite Wallet Balance</p>
                    <div className="text-6xl font-black italic neon-text">₹{profile?.balance}</div>
                </div>
                <div className="grid grid-cols-2 gap-4">
                    <button className="bg-[#FF6B00] text-black font-black p-5 rounded-3xl uppercase text-xs flex flex-col items-center gap-2"><Icon name="ArrowDownCircle" /> Deposit</button>
                    <button className="glass font-black p-5 rounded-3xl uppercase text-xs flex flex-col items-center gap-2 border-white/10"><Icon name="ArrowUpCircle" /> Withdraw</button>
                </div>
                <div className="space-y-3">
                    <h4 className="text-[10px] font-black text-gray-500 uppercase px-2">Recent Logs</h4>
                    <div className="glass rounded-2xl p-4 flex justify-between items-center bg-white/5">
                        <div className="flex items-center gap-3">
                            <div className="bg-green-500/20 p-2 rounded-lg text-green-500"><Icon name="Plus" size={16} /></div>
                            <div>
                                <p className="text-xs font-bold uppercase">Welcome Bonus</p>
                                <p className="text-[9px] text-gray-500 uppercase">March 12, 2024</p>
                            </div>
                        </div>
                        <span className="font-black text-green-500">+₹500</span>
                    </div>
                </div>
            </div>
        );

        const AdminView = ({ matches, db, appId, isDemo }) => {
            const [form, setForm] = useState({ title: '', prize: '', entry: '', mode: 'Solo', maxPlayers: 48 });
            
            const createMatch = async () => {
                if (isDemo) return alert("Demo Mode: Matches cannot be saved to Firebase.");
                if (!form.title) return alert("Title required");
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches').add({
                    ...form, joined: 0, status: 'open', createdAt: Date.now()
                });
                alert("Match Deployed!");
            };

            return (
                <div className="space-y-6">
                    <h2 className="font-gaming text-lg font-black text-[#FF6B00] uppercase">Admin Tournament Creator</h2>
                    <div className="glass p-5 space-y-4">
                        <div className="space-y-1">
                            <label className="text-[10px] font-black text-gray-500 uppercase">Tournament Title</label>
                            <input value={form.title} onChange={e => setForm({...form, title: e.target.value})} className="w-full p-3 rounded-xl text-sm" placeholder="e.g. MEGA RUSH 12" />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-gray-500 uppercase">Mode</label>
                                <select value={form.mode} onChange={e => setForm({...form, mode: e.target.value})} className="w-full p-3 rounded-xl text-sm">
                                    <option>Solo</option><option>Duo</option><option>Squad</option><option>Clash Squad</option>
                                </select>
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-gray-500 uppercase">Prize (₹)</label>
                                <input type="number" value={form.prize} onChange={e => setForm({...form, prize: Number(e.target.value)})} className="w-full p-3 rounded-xl text-sm" placeholder="1000" />
                            </div>
                        </div>
                        <button onClick={createMatch} className="w-full bg-[#FF6B00] text-black font-black p-4 rounded-xl uppercase tracking-widest text-sm neon-glow">Deploy to Live</button>
                    </div>
                </div>
            );
        };

        const StaffView = ({ matches, db, appId, isDemo }) => {
            const updateRoom = async (id, rid, pass) => {
                if (isDemo) return alert("Demo Mode Only");
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches').doc(id).update({ roomId: rid, roomPass: pass });
                alert("Room Updated");
            };

            const cancelMatch = async (id) => {
                if (!confirm("HACKER DETECTED? Match will be cancelled and players notified.")) return;
                if (isDemo) return alert("Demo Mode Only");
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches').doc(id).update({ status: 'cancelled' });
                alert("Match Cancelled - Players Notified");
            };

            return (
                <div className="space-y-6">
                    <h2 className="font-gaming text-lg font-black text-red-500 uppercase">Staff Monitor Panel</h2>
                    {matches.map(m => (
                        <div key={m.id} className="glass p-4 space-y-4 border-l-4 border-l-red-500">
                            <div className="flex justify-between items-start">
                                <h4 className="font-black text-sm uppercase">{m.title}</h4>
                                <span className="text-[8px] bg-red-500/20 text-red-500 px-2 py-0.5 rounded font-black uppercase">Monitoring</span>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <input id={`rid-${m.id}`} defaultValue={m.roomId} className="p-2 rounded-lg text-[10px]" placeholder="Room ID" />
                                <input id={`rpas-${m.id}`} defaultValue={m.roomPass} className="p-2 rounded-lg text-[10px]" placeholder="Password" />
                            </div>
                            <div className="flex gap-2">
                                <button 
                                    onClick={() => updateRoom(m.id, document.getElementById(`rid-${m.id}`).value, document.getElementById(`rpas-${m.id}`).value)}
                                    className="flex-grow bg-[#FF6B00] text-black text-[10px] font-black p-2 rounded-lg uppercase"
                                >Update Room</button>
                                <button onClick={() => cancelMatch(m.id)} className="bg-red-500/10 text-red-500 text-[10px] font-black px-4 rounded-lg uppercase">Cancel Match</button>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const ProfileView = ({ profile }) => (
            <div className="space-y-6 text-center pt-8">
                <div className="w-24 h-24 bg-[#FF6B00] rounded-[30px] mx-auto flex items-center justify-center rotate-12 neon-glow">
                    <Icon name="User" size={48} className="text-black -rotate-12" />
                </div>
                <div>
                    <h2 className="text-3xl font-black italic uppercase tracking-tighter">{profile?.username}</h2>
                    <p className="text-[#FF6B00] font-bold text-xs uppercase tracking-widest">{profile?.elitestarId}</p>
                </div>
                <div className="glass text-left overflow-hidden">
                    <ProfileItem label="FF Name" value={profile?.ffName} />
                    <ProfileItem label="FF UID" value={profile?.ffId} />
                    <ProfileItem label="FF Level" value={profile?.ffLevel} />
                    <ProfileItem label="Joined" value="12 March 2024" />
                    <ProfileItem label="Account Role" value={profile?.role} color="text-[#FF6B00]" />
                </div>
                <button className="w-full glass p-4 rounded-2xl text-red-500 font-black uppercase text-xs tracking-widest border-red-500/10">Sign Out</button>
            </div>
        );

        const ProfileItem = ({ label, value, color="text-white" }) => (
            <div className="p-4 border-b border-white/5 flex justify-between items-center last:border-0">
                <span className="text-[10px] font-black text-gray-500 uppercase tracking-widest">{label}</span>
                <span className={`font-bold text-sm uppercase ${color}`}>{value || "NOT SET"}</span>
            </div>
        );

        const EliteBot = ({ close }) => {
            const [messages, setMessages] = useState([{ type: 'bot', text: 'Namaste! ELITE BOT reporting. Tournament ya wallet ke baare mein kuch poochna hai?' }]);
            const [input, setInput] = useState('');
            
            const handleAsk = () => {
                if (!input) return;
                let reply = "Mujhe samajh nahi aaya, kripya Staff se contact karein.";
                const q = input.toLowerCase();
                if (q.includes('withdraw')) reply = "Aap Wallet section mein jaakar 'Withdraw' button se request daal sakte hain. 24 hours mein approval mil jayega.";
                if (q.includes('match')) reply = "Aap Arena tab mein jaakar matches join kar sakte hain. Entry fee wallet se deduct hogi.";
                if (q.includes('hacker')) reply = "Agar aapne hacker dekha hai, toh turant Staff ko report karein. Match cancel kar diya jayega.";
                
                setMessages([...messages, { type: 'user', text: input }, { type: 'bot', text: reply }]);
                setInput('');
            };

            return (
                <div className="fixed bottom-36 right-4 w-72 h-96 glass bg-black/95 border-[#FF6B00]/40 flex flex-col z-[70] shadow-2xl animate-slide-up">
                    <div className="p-4 bg-[#FF6B00] text-black font-black flex justify-between items-center">
                        <span className="text-[10px] uppercase tracking-widest">Elite Assistant</span>
                        <Icon name="X" size={16} className="cursor-pointer" onClick={close} />
                    </div>
                    <div className="flex-grow p-4 overflow-y-auto space-y-3">
                        {messages.map((m, i) => (
                            <div key={i} className={`p-2.5 rounded-xl text-[11px] leading-relaxed ${m.type === 'bot' ? 'bg-white/10 self-start mr-8' : 'bg-[#FF6B00] text-black font-bold self-end ml-8'}`}>
                                {m.text}
                            </div>
                        ))}
                    </div>
                    <div className="p-3 border-t border-white/10 flex gap-2">
                        <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleAsk()} className="flex-grow p-2 rounded-lg text-[10px]" placeholder="Type help..." />
                        <button onClick={handleAsk} className="bg-[#FF6B00] p-2 rounded-lg text-black"><Icon name="ArrowRight" size={14} /></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
