<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MK ESPORT - ULTIMATE APP</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #06b6d4; --gold: #fbbf24; --bg-dark: #050510; }
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: 'Rajdhani', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        
        .glass-panel {
            background: rgba(10, 10, 25, 0.85); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.6);
        }
        
        .btn-tech {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; cursor: pointer;
            text-transform: uppercase; font-family: 'Orbitron'; letter-spacing: 1px;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        .btn-tech:active { transform: scale(0.95) translateY(2px); }

        .input-tech {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px;
            width: 100%; outline: none; border-radius: 12px;
            font-family: 'Orbitron'; font-size: 13px; transition: 0.3s;
        }
        .input-tech:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        .nav-btn { color: #4b5563; transition: all 0.3s; position: relative; }
        .nav-btn.active { color: var(--accent); transform: translateY(-5px); }
        .nav-btn.active::after { content: ''; position: absolute; bottom: -12px; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); left: 50%; transform: translateX(-50%); }
        
        .scroll-area { height: 100vh; overflow-y: auto; padding-bottom: 150px; -webkit-overflow-scrolling: touch; }
        .scroll-area::-webkit-scrollbar { display: none; }

        @keyframes pulse-ring { 0% { transform: scale(.33); } 80%, 100% { opacity: 0; } }
        .call-pulse::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: var(--accent); animation: pulse-ring 1.2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; z-index: -1; }

        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; margin-bottom: 6px; line-height: 1.4; }
        .msg-sent { background: var(--accent); color: #000; border-bottom-right-radius: 4px; align-self: flex-end; font-weight: 600; }
        .msg-received { background: #1a1a2e; color: #fff; border-bottom-left-radius: 4px; align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }

        .modal-slide { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="canvas-container"></div>

    <script type="text/babel">
        // --- CONFIG ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBJWklGdsRM_XNo2_4AUceUZsiIyIjbUBA",
            authDomain: "mk-esports-60429.firebaseapp.com",
            projectId: "mk-esports-60429",
            storageBucket: "mk-esports-60429.firebasestorage.app",
            messagingSenderId: "663019221754",
            appId: "1:663019221754:web:d75e59277feb0ac12a8f43"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mksport';
        const ASSETS = {
            logo: "https://i.ibb.co/7dLY0XrF/logo.png",
            defaultAvatar: "https://i.pravatar.cc/150?u=gamer",
            defaultQr: "https://i.ibb.co/qFVjTWLK/qr.png"
        };
        const WHATSAPP_NUMBER = "916394562344";

        const { useState, useEffect, useRef } = React;

        // --- FIREBASE INIT ---
        let app, auth, db;
        try {
            if (!firebase.apps.length) app = firebase.initializeApp(firebaseConfig);
            else app = firebase.app();
            auth = firebase.auth();
            db = firebase.firestore();
        } catch (e) { console.error("Firebase Error", e); }

        // --- 3D BG ---
        const Background3D = () => {
            useEffect(() => {
                const container = document.getElementById('canvas-container');
                if (!container || container.children.length > 0) return;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                camera.position.z = 100;
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);
                const geo = new THREE.BufferGeometry();
                const verts = [];
                for (let i = 0; i < 3000; i++) { verts.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000)); }
                geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
                const stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x06b6d4, size: 2, transparent: true, opacity: 0.4 }));
                scene.add(stars);
                const animate = () => { requestAnimationFrame(animate); stars.rotation.y += 0.0002; renderer.render(scene, camera); };
                animate();
                window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
            }, []);
            return null;
        };

        const App = () => {
            const [view, setView] = useState('splash');
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            
            // Core Data
            const [matches, setMatches] = useState([]);
            const [preRegEvents, setPreRegEvents] = useState([]);
            const [globalChat, setGlobalChat] = useState([]);
            const [paymentConfig, setPaymentConfig] = useState({ upi: "mksport@upi", qr: ASSETS.defaultQr });
            const [mySquad, setMySquad] = useState(null);
            
            // Admin/Staff Data
            const [deposits, setDeposits] = useState([]);
            const [totalUsers, setTotalUsers] = useState(0);
            
            // UI State
            const [joiningMatch, setJoiningMatch] = useState(null);
            const [joinFormData, setJoinFormData] = useState({});
            const [walletTab, setWalletTab] = useState('deposit');
            const [depositStep, setDepositStep] = useState(1);
            const [depositAmount, setDepositAmount] = useState('');
            const [withdrawAmount, setWithdrawAmount] = useState('');
            const [withdrawUPI, setWithdrawUPI] = useState('');
            const [showTerms, setShowTerms] = useState(false);
            
            // Social UI
            const [dmTarget, setDmTarget] = useState(null);
            const [privateMsgs, setPrivateMsgs] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [callState, setCallState] = useState(null);
            const [tapCount, setTapCount] = useState(0);

            // Path Helpers
            const getPublicPath = (col) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col);
            const getUserDoc = (uid) => db.collection('artifacts').doc(appId).collection('users').doc(uid);

            // --- AUTH LOGIC ---
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const doc = await getUserDoc(u.uid).get();
                        if (doc.exists) {
                            setUserData(doc.data());
                            if(doc.data().squadId) {
                                const sq = await getPublicPath('squads').doc(doc.data().squadId).get();
                                if(sq.exists) setMySquad(sq.data());
                            }
                            // Update public searchable profile
                            await getPublicPath('users_public').doc(u.uid).set({
                                uid: u.uid, name: doc.data().name, phone: doc.data().phone, avatar: ASSETS.defaultAvatar
                            }, { merge: true });
                        }
                        setView('home');
                    } else { setView('auth'); }
                });
                return () => unsub();
            }, []);

            // --- DATA LISTENERS ---
            useEffect(() => {
                if (!user) return;
                const unsubM = getPublicPath('matches').orderBy('createdAt', 'desc').onSnapshot(s => {
                    const all = s.docs.map(d => ({id:d.id, ...d.data()}));
                    setMatches(all.filter(m => !m.isPreReg));
                    setPreRegEvents(all.filter(m => m.isPreReg));
                });
                const unsubC = getPublicPath('chat').orderBy('time', 'desc').limit(50).onSnapshot(s => setGlobalChat(s.docs.map(d => d.data()).reverse()));
                const unsubConfig = getPublicPath('config').doc('payment').onSnapshot(s => s.exists && setPaymentConfig(s.data()));
                
                // Call Listener
                const unsubCalls = getPublicPath('calls').doc(user.uid).onSnapshot(s => {
                    if (s.exists() && s.data().status === 'ringing') setCallState({ type: 'incoming', target: s.data().caller });
                });

                if (userData?.role === 'admin') {
                    getPublicPath('transactions').where('status', '==', 'pending').onSnapshot(s => setDeposits(s.docs.map(d => ({id: d.id, ...d.data()}))));
                }
                
                return () => { unsubM(); unsubC(); unsubConfig(); unsubCalls(); };
            }, [user, userData]);

            // Private Chat Listener
            useEffect(() => {
                if (!user || !dmTarget) return;
                const chatId = [user.uid, dmTarget.uid].sort().join('_');
                return getPublicPath('conversations').doc(chatId).collection('messages')
                    .orderBy('time', 'asc').onSnapshot(s => setPrivateMsgs(s.docs.map(d => d.data())));
            }, [user, dmTarget]);

            // --- FUNCTIONS ---
            const handleSearch = async () => {
                const snap = await getPublicPath('users_public').get();
                setSearchResults(snap.docs.map(d => d.data()).filter(u => u.uid.includes(searchQuery) || u.phone.includes(searchQuery)));
            };

            const joinMatch = (m) => {
                const isFree = (m.isPreReg && (userData?.joinedMatches || 0) >= 200) || userData?.freeEntry;
                if(!isFree && (userData?.balance || 0) < m.entry) { 
                    const goToWallet = confirm("Balance kam hai! Wallet mein jayein?");
                    if(goToWallet) setView('wallet');
                    return;
                }
                setJoiningMatch(m); setJoinFormData({});
            };

            const autoFillSquad = () => {
                if(!mySquad) return alert("Pehle Squad join karein!");
                setJoinFormData({
                    teamName: mySquad.name,
                    p1_ign: mySquad.members[0]?.ign || "", p1_uid: mySquad.members[0]?.uid || "",
                    p2_ign: mySquad.members[1]?.ign || "", p3_ign: mySquad.members[2]?.ign || "", p4_ign: mySquad.members[3]?.ign || ""
                });
            };

            const submitJoin = async () => {
                if(!joiningMatch) return;
                const m = joiningMatch;
                if(m.mode === 'SOLO' && (!joinFormData.ign || !joinFormData.uid)) return alert("Details bharein!");
                if(m.mode !== 'SOLO' && !joinFormData.teamName) return alert("Team Name bharein!");

                const isFree = (m.isPreReg && userData.joinedMatches >= 200) || userData.freeEntry;

                try {
                    await db.runTransaction(async (t) => {
                        const mRef = getPublicPath('matches').doc(m.id);
                        const uRef = getUserDoc(user.uid);
                        const mDoc = await t.get(mRef);
                        const uDoc = await t.get(uRef);

                        if(!isFree && uDoc.data().balance < m.entry) throw "Balance Low";
                        
                        let rooms = mDoc.data().rooms || Array.from({length:10}, (_,i)=>({id:i+1, players:[], roomId:'', roomPass:''}));
                        if(rooms.some(r => r.players.some(p => p.uid === user.uid))) throw "Pehle se joined hain";
                        
                        const rIdx = rooms.findIndex(r => r.players.length < 48);
                        if(rIdx === -1) throw "Slot Full";

                        rooms[rIdx].players.push({ uid: user.uid, ign: joinFormData.ign || joinFormData.teamName, details: joinFormData });
                        
                        if(!isFree) t.update(uRef, {balance: uDoc.data().balance - m.entry});
                        t.update(uRef, {joinedMatches: (uDoc.data().joinedMatches || 0) + 1});
                        t.update(mRef, {rooms, totalJoined: (mDoc.data().totalJoined || 0) + 1});
                    });
                    alert("Joined Successfully!"); setJoiningMatch(null);
                } catch(e) { alert(e); }
            };

            const handleSecretTap = () => {
                setTapCount(p => {
                    if(p + 1 === 5) {
                        const code = prompt("ADMIN CODE:");
                        if(code === "admin123") { getUserDoc(user.uid).update({role:'admin'}); alert("Admin Role Added!"); window.location.reload(); }
                        if(code === "staff123") { getUserDoc(user.uid).update({role:'staff'}); alert("Staff Role Added!"); window.location.reload(); }
                        return 0;
                    }
                    return p + 1;
                });
            };

            // --- VIEW RENDERERS ---
            if(view === 'splash') return <div className="h-screen bg-black flex items-center justify-center font-orbitron text-cyan-400 animate-pulse text-2xl tracking-[1rem]">MK APP</div>;

            if(view === 'auth') return (
                <div className="h-screen flex items-center justify-center p-6 bg-black">
                    <Background3D />
                    <div className="glass-panel p-8 w-full max-w-sm text-center rounded-[2.5rem] border border-white/5 shadow-2xl">
                        <img src={ASSETS.logo} className="w-20 h-20 mx-auto rounded-full border-2 border-cyan-500 p-1 mb-6 shadow-[0_0_20px_cyan]" />
                        <h1 className="text-3xl font-orbitron font-black mb-8">MK <span className="text-yellow-400">ESPORT</span></h1>
                        <input id="auth_mob" placeholder="Mobile Number" className="input-tech mb-4" />
                        <input id="auth_pass" type="password" placeholder="Password" className="input-tech mb-6" />
                        <button onClick={async () => {
                            const m = document.getElementById('auth_mob').value;
                            const p = document.getElementById('auth_pass').value;
                            if(m.length<10) return alert("Valid mobile daalein");
                            try { 
                                await auth.signInWithEmailAndPassword(`${m}@mkesport.com`, p); 
                            } catch(e) {
                                // Simple auto-register for demo
                                await auth.createUserWithEmailAndPassword(`${m}@mkesport.com`, p);
                                await getUserDoc(auth.currentUser.uid).set({ uid: auth.currentUser.uid, name: "Gamer", phone: m, balance: 0, role: 'user', joinedMatches: 0, lossStreak: 0 });
                            }
                        }} className="w-full bg-cyan-500 text-black py-4 rounded-2xl font-black font-orbitron btn-tech shadow-lg shadow-cyan-500/20">ENTER BATTLEFIELD</button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-black">
                    <Background3D />
                    
                    {/* Header */}
                    <header className="px-6 py-4 flex justify-between items-center bg-black/40 backdrop-blur-xl border-b border-white/5 pt-12 shrink-0">
                        <div className="flex items-center gap-3">
                            <img src={ASSETS.logo} className="w-8 h-8 rounded-full border border-cyan-500/50" />
                            <h1 className="font-orbitron font-black text-lg tracking-tight">MK <span className="text-yellow-400">APP</span></h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('search')} className="text-gray-400 active:text-cyan-400"><i className="fa-solid fa-magnifying-glass"></i></button>
                            <div onClick={() => setView('wallet')} className="bg-cyan-500/10 px-3 py-1.5 rounded-full border border-cyan-500/30 text-xs font-bold font-orbitron text-cyan-400 cursor-pointer">
                                ₹{userData?.balance || 0}
                            </div>
                        </div>
                    </header>

                    <div className="scroll-area flex-1">
                        {view === 'home' && (
                            <div className="p-4 space-y-6">
                                <div className="video-wrapper overflow-hidden rounded-[2rem] border border-white/10 shadow-2xl">
                                    <iframe src="https://www.youtube.com/embed/9iW-sL7Upt0?autoplay=1&mute=1&loop=1&playlist=9iW-sL7Upt0&controls=0" className="w-full h-full"></iframe>
                                </div>
                                
                                {preRegEvents.length > 0 && (
                                    <div className="space-y-4">
                                        <h3 className="font-orbitron font-bold text-xs text-yellow-500 tracking-widest px-2">🏆 MAJOR TOURNAMENTS</h3>
                                        {preRegEvents.map(m => (
                                            <div key={m.id} className="glass-panel p-5 rounded-[2rem] border-2 border-yellow-500/30 shadow-[0_0_30px_rgba(251,191,36,0.15)]">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div><h4 className="text-xl font-bold font-orbitron text-white">{m.title}</h4><p className="text-[10px] text-gray-500">POO: ₹{m.pool}</p></div>
                                                    <span className="bg-red-600 text-white text-[8px] font-black px-2 py-0.5 rounded-full animate-pulse">BIG EVENT</span>
                                                </div>
                                                <button onClick={() => joinMatch(m)} className="w-full bg-yellow-500 text-black py-3 rounded-xl font-black font-orbitron text-xs btn-tech">PRE-REGISTER (₹{m.entry})</button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="space-y-4">
                                    <h3 className="font-orbitron font-bold text-xs text-cyan-400 tracking-widest px-2">DAILY BATTLES</h3>
                                    {matches.map(m => {
                                        const myRoom = (m.rooms || []).find(r => r.players.some(p => p.uid === user.uid));
                                        return (
                                            <div key={m.id} className="glass-panel p-5 rounded-[2rem] border border-white/5 relative group transition-all hover:border-cyan-500/40">
                                                <div className="flex items-center gap-4 mb-4">
                                                    <div className="w-14 h-14 rounded-2xl bg-cyan-500/5 border border-cyan-500/20 flex items-center justify-center">
                                                        <i className="fa-solid fa-crosshairs text-cyan-400 text-xl"></i>
                                                    </div>
                                                    <div className="flex-1">
                                                        <h4 className="font-bold text-sm tracking-tight">{m.title}</h4>
                                                        <p className="text-[10px] text-gray-500 font-bold uppercase">{m.mode} • BERMUDA • ₹{m.kill} / KILL</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-[10px] text-yellow-500 font-bold">PRIZE</p>
                                                        <p className="text-lg font-black font-orbitron">₹{m.p1}</p>
                                                    </div>
                                                </div>
                                                {myRoom ? (
                                                    <div className="bg-green-500/10 p-4 rounded-2xl border border-green-500/30 text-center animate-in fade-in">
                                                        <p className="text-green-400 text-[10px] font-black mb-1">ROOM {myRoom.id} JOINED</p>
                                                        {myRoom.roomId ? <div className="flex justify-center gap-4 text-xs font-mono font-bold text-white"><span>ID: {myRoom.roomId}</span><span>PW: {myRoom.roomPass}</span></div> : <p className="text-[9px] text-gray-500">ID/PASS AANE TAK WAIT KAREIN...</p>}
                                                    </div>
                                                ) : (
                                                    <button onClick={() => joinMatch(m)} className="w-full bg-white/5 hover:bg-cyan-500 hover:text-black py-3 rounded-xl font-black font-orbitron text-xs border border-white/10 btn-tech transition-colors">JOIN FOR ₹{m.entry}</button>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="p-6 space-y-6">
                                <div onClick={handleSecretTap} className="glass-panel p-8 rounded-[3rem] text-center border-b-4 border-cyan-500 shadow-2xl">
                                    <div className="relative inline-block mb-4">
                                        <img src={ASSETS.defaultAvatar} className="w-24 h-24 rounded-full border-4 border-cyan-500 p-1" />
                                        <div className="absolute bottom-0 right-0 w-6 h-6 bg-green-500 border-4 border-black rounded-full shadow-[0_0_10px_green]"></div>
                                    </div>
                                    <h2 className="text-2xl font-orbitron font-black text-white">{userData?.name || 'Gamer'}</h2>
                                    <p className="text-[10px] text-cyan-400 font-bold tracking-[0.3em] mt-1">UID: {user?.uid.substring(0,8).toUpperCase()}</p>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass-panel p-5 rounded-[2rem] text-center">
                                        <p className="text-[10px] text-gray-500 font-bold mb-1">MATCHES</p>
                                        <p className="text-xl font-orbitron font-bold text-white">{userData?.joinedMatches || 0}</p>
                                    </div>
                                    <div className="glass-panel p-5 rounded-[2rem] text-center">
                                        <p className="text-[10px] text-gray-500 font-bold mb-1">STREAK</p>
                                        <p className="text-xl font-orbitron font-bold text-white">{userData?.lossStreak || 0}/10</p>
                                    </div>
                                </div>

                                <div className="glass-panel p-6 rounded-[2rem] space-y-4">
                                    <h3 className="font-orbitron font-bold text-xs text-purple-400">REFER & EARN ₹75</h3>
                                    <div className="bg-black/40 p-3 rounded-xl border border-dashed border-white/20 flex justify-between items-center">
                                        <span className="font-mono font-bold tracking-widest text-lg">MK-{user?.uid.substring(0,4).toUpperCase()}</span>
                                        <button className="text-cyan-400 text-xs font-bold">COPY</button>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    {userData?.role === 'staff' && <button onClick={() => setView('staff')} className="w-full glass-panel p-5 rounded-2xl flex justify-between items-center text-blue-400 font-bold">STAFF PANEL <i className="fa-solid fa-chevron-right"></i></button>}
                                    {userData?.role === 'admin' && <button onClick={() => setView('admin')} className="w-full glass-panel p-5 rounded-2xl flex justify-between items-center text-red-500 font-bold">ADMIN PANEL <i className="fa-solid fa-chevron-right"></i></button>}
                                    <button onClick={() => window.open(`https://wa.me/${WHATSAPP_NUMBER}`)} className="w-full glass-panel p-5 rounded-2xl flex justify-between items-center text-cyan-400 font-bold">WHATSAPP SUPPORT <i className="fa-solid fa-headset"></i></button>
                                    <button onClick={() => auth.signOut()} className="w-full bg-red-500/5 text-red-500 p-5 rounded-2xl font-bold border border-red-500/10">LOGOUT SESSION</button>
                                </div>
                            </div>
                        )}

                        {view === 'chat' && (
                            <div className="h-full flex flex-col p-4 relative">
                                <h2 className="font-orbitron font-bold text-lg mb-4 text-cyan-400">GLOBAL LOBBY</h2>
                                <div className="flex-1 space-y-4 overflow-y-auto pr-2 pb-24">
                                    {globalChat.map((m, i) => (
                                        <div key={i} className={`flex flex-col ${m.uid === user.uid ? 'items-end' : 'items-start'}`}>
                                            <div className={`msg-bubble ${m.uid === user.uid ? 'msg-sent' : 'msg-received'}`}>
                                                <p className="text-[8px] font-black opacity-40 mb-1 uppercase tracking-tighter">{m.name}</p>
                                                {m.text}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="fixed bottom-28 left-4 right-4 flex gap-2">
                                    <input id="glb_inp" className="input-tech flex-1" placeholder="Type a message..." onKeyPress={e => e.key==='Enter' && (getPublicPath('chat').add({text:e.target.value, name:userData.name, uid:user.uid, time:new Date().toISOString()}), e.target.value='')} />
                                    <button onClick={() => {const i=document.getElementById('glb_inp'); getPublicPath('chat').add({text:i.value, name:userData.name, uid:user.uid, time:new Date().toISOString()}); i.value='';}} className="bg-cyan-500 text-black w-14 h-14 rounded-2xl flex items-center justify-center text-xl shadow-lg shadow-cyan-500/20"><i className="fa-solid fa-paper-plane"></i></button>
                                </div>
                            </div>
                        )}

                        {view === 'search' && (
                            <div className="p-6 space-y-6">
                                <h2 className="font-orbitron font-bold text-xl">FIND PLAYERS</h2>
                                <div className="relative">
                                    <input placeholder="Search UID or Mobile..." className="input-tech pr-12" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} onKeyPress={e => e.key==='Enter' && handleSearch()} />
                                    <button onClick={handleSearch} className="absolute right-4 top-4 text-cyan-500"><i className="fa-solid fa-search"></i></button>
                                </div>
                                <div className="space-y-3">
                                    {searchResults.map(u => (
                                        <div key={u.uid} className="glass-panel p-4 rounded-2xl flex items-center justify-between border border-white/5">
                                            <div className="flex items-center gap-4">
                                                <img src={u.avatar} className="w-10 h-10 rounded-full border border-cyan-500/20" />
                                                <div><p className="font-bold text-sm">{u.name}</p><p className="text-[9px] text-gray-500 uppercase tracking-widest">UID: {u.uid.substring(0,8)}</p></div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setDmTarget(u); setView('chat_private'); }} className="w-10 h-10 rounded-xl bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 flex items-center justify-center"><i className="fa-solid fa-message"></i></button>
                                                <button onClick={() => setCallState({type:'outgoing', target:u})} className="w-10 h-10 rounded-xl bg-green-500/10 text-green-400 border border-green-500/20 flex items-center justify-center"><i className="fa-solid fa-phone"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'chat_private' && dmTarget && (
                            <div className="h-full flex flex-col p-4 pb-28">
                                <div className="flex items-center gap-4 mb-6 pb-4 border-b border-white/5 shrink-0">
                                    <button onClick={() => setView('search')} className="text-gray-400"><i className="fa-solid fa-chevron-left"></i></button>
                                    <img src={dmTarget.avatar} className="w-10 h-10 rounded-full" />
                                    <div className="flex-1"><p className="font-bold text-sm">{dmTarget.name}</p><p className="text-[10px] text-green-500 font-bold uppercase">Active Now</p></div>
                                    <button onClick={() => setCallState({type:'outgoing', target:dmTarget})} className="text-cyan-400 text-lg"><i className="fa-solid fa-video"></i></button>
                                </div>
                                <div className="flex-1 space-y-3 flex flex-col overflow-y-auto pr-2">
                                    {privateMsgs.map((m, i) => (
                                        <div key={i} className={`msg-bubble ${m.sender === user.uid ? 'msg-sent' : 'msg-received'}`}>{m.text}</div>
                                    ))}
                                </div>
                                <div className="mt-4 flex gap-2">
                                    <input id="p_inp" className="input-tech flex-1" placeholder="Type a message..." onKeyPress={e => e.key==='Enter' && (getPublicPath('conversations').doc([user.uid, dmTarget.uid].sort().join('_')).collection('messages').add({text:e.target.value, sender:user.uid, time:new Date().toISOString()}), e.target.value='')} />
                                    <button onClick={() => {const i=document.getElementById('p_inp'); getPublicPath('conversations').doc([user.uid, dmTarget.uid].sort().join('_')).collection('messages').add({text:i.value, sender:user.uid, time:new Date().toISOString()}); i.value='';}} className="bg-cyan-500 text-black w-14 h-14 rounded-2xl flex items-center justify-center"><i className="fa-solid fa-paper-plane"></i></button>
                                </div>
                            </div>
                        )}

                        {view === 'wallet' && (
                            <div className="p-6 flex flex-col items-center justify-center space-y-12 h-full">
                                <div className="text-center">
                                    <h1 className="text-7xl font-orbitron font-black text-yellow-400 drop-shadow-[0_0_20px_rgba(251,191,36,0.5)]">₹{userData?.balance || 0}</h1>
                                    <p className="text-cyan-400 font-bold tracking-[0.5em] text-[10px] mt-4 uppercase">AVAILABLE CREDITS</p>
                                </div>
                                <div className="w-full space-y-4">
                                    {walletTab === 'deposit' ? (
                                        <div className="space-y-6 animate-in slide-in-from-bottom">
                                            {depositStep === 1 ? (
                                                <div className="space-y-4">
                                                    <div className="grid grid-cols-2 gap-4">
                                                        {[50, 100, 300, 500].map(a => <button key={a} onClick={() => setDepositAmount(a)} className={`p-4 rounded-2xl border ${depositAmount === a ? 'border-cyan-500 bg-cyan-500/10 text-cyan-400' : 'border-white/10 bg-white/5'} font-bold transition-all`}>₹{a}</button>)}
                                                    </div>
                                                    <input type="number" placeholder="Enter custom amount" className="input-tech text-center text-xl font-bold" value={depositAmount} onChange={e => setDepositAmount(e.target.value)} />
                                                    <button onClick={() => depositAmount >= 10 ? setDepositStep(2) : alert("Min ₹10")} className="w-full bg-cyan-500 text-black py-5 rounded-[2rem] font-black font-orbitron btn-tech shadow-xl">PROCEED TO PAY</button>
                                                </div>
                                            ) : (
                                                <div className="glass-panel p-8 rounded-[3rem] text-center space-y-6">
                                                    <div className="bg-white p-3 rounded-3xl w-48 h-48 mx-auto"><img src={paymentConfig.qr} className="w-full h-full object-contain" /></div>
                                                    <p className="text-white font-mono text-sm tracking-widest">{paymentConfig.upi}</p>
                                                    <input id="utr_f" placeholder="Enter 12-Digit UTR Number" className="input-tech text-center" />
                                                    <div className="flex gap-3">
                                                        <button onClick={() => setDepositStep(1)} className="flex-1 bg-white/5 py-4 rounded-2xl font-bold">BACK</button>
                                                        <button onClick={async () => {
                                                            const utr = document.getElementById('utr_f').value;
                                                            if(utr.length < 5) return alert("Valid UTR daalein");
                                                            await getPublicPath('transactions').add({ uid: user.uid, phone: userData.phone, amount: Number(depositAmount), utr, type: 'deposit', status: 'pending', timestamp: new Date().toISOString() });
                                                            alert("Request Sent! Admin verify karega."); setDepositStep(1); setView('home');
                                                        }} className="flex-[2] bg-cyan-500 text-black py-4 rounded-2xl font-black font-orbitron btn-tech">DONE</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="space-y-6 animate-in slide-in-from-bottom">
                                            <input type="number" placeholder="Withdrawal Amount (Min ₹100)" className="input-tech text-center" onChange={e => setWithdrawAmount(e.target.value)} />
                                            <input placeholder="UPI ID (GPay/PhonePe)" className="input-tech text-center" onChange={e => setWithdrawUPI(e.target.value)} />
                                            <button onClick={async () => {
                                                if(userData.balance < Number(withdrawAmount)) return alert("Balance kam hai");
                                                await db.runTransaction(async t => {
                                                    const uRef = getUserDoc(user.uid);
                                                    const u = await t.get(uRef);
                                                    t.update(uRef, { balance: u.data().balance - Number(withdrawAmount) });
                                                    t.set(getPublicPath('transactions').doc(), { uid: user.uid, amount: Number(withdrawAmount), upi: withdrawUPI, type: 'withdraw', status: 'pending', timestamp: new Date().toISOString() });
                                                });
                                                alert("Withdrawal Requested!"); setView('home');
                                            }} className="w-full bg-red-600 text-white py-5 rounded-[2rem] font-black font-orbitron btn-tech">REQUEST WITHDRAWAL</button>
                                        </div>
                                    )}
                                </div>
                                <div className="flex bg-black/40 p-1 rounded-full border border-white/10 shrink-0 w-64">
                                    <button onClick={() => setWalletTab('deposit')} className={`flex-1 py-3 rounded-full text-xs font-black font-orbitron transition-all ${walletTab==='deposit'?'bg-cyan-500 text-black shadow-lg':'text-gray-500'}`}>DEPOSIT</button>
                                    <button onClick={() => setWalletTab('withdraw')} className={`flex-1 py-3 rounded-full text-xs font-black font-orbitron transition-all ${walletTab==='withdraw'?'bg-red-600 text-white shadow-lg':'text-gray-500'}`}>WITHDRAW</button>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && userData?.role === 'admin' && (
                            <div className="p-6 space-y-6 pb-40">
                                <h2 className="font-orbitron font-black text-2xl text-red-500 tracking-tighter">CONTROL HUB</h2>
                                <div className="glass-panel p-6 rounded-[2.5rem] space-y-4">
                                    <h3 className="font-orbitron font-bold text-xs text-gray-400 tracking-widest">PUBLISH MATCH</h3>
                                    <input id="m_t" placeholder="Match Title" className="input-tech" />
                                    <div className="grid grid-cols-2 gap-2">
                                        <select id="m_m" className="input-tech bg-black"><option value="SOLO">SOLO</option><option value="DUO">DUO</option><option value="SQUAD">SQUAD</option></select>
                                        <input id="m_e" type="number" placeholder="Entry" className="input-tech" />
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        <input id="m_p1" type="number" placeholder="1st" className="input-tech" /><input id="m_p2" type="number" placeholder="2nd" className="input-tech" /><input id="m_p3" type="number" placeholder="3rd" className="input-tech" />
                                    </div>
                                    <input id="m_tm" type="datetime-local" className="input-tech" />
                                    <button onClick={async () => {
                                        const d = { 
                                            title: document.getElementById('m_t').value, mode: document.getElementById('m_m').value, entry: Number(document.getElementById('m_e').value),
                                            p1: Number(document.getElementById('m_p1').value), p2: Number(document.getElementById('m_p2').value), p3: Number(document.getElementById('m_p3').value),
                                            time: document.getElementById('m_tm').value, createdAt: new Date().toISOString(), rooms: Array.from({length:10}, (_,i)=>({id:i+1, players:[], roomId:'', roomPass:''}))
                                        };
                                        await getPublicPath('matches').add(d); alert("Match Published!");
                                    }} className="w-full bg-red-600 text-white py-4 rounded-2xl font-black btn-tech">PUBLISH NOW</button>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="font-orbitron font-bold text-xs text-gray-400 px-2">PENDING TRANSACTIONS</h3>
                                    {deposits.map(d => (
                                        <div key={d.id} className="glass-panel p-5 rounded-3xl flex justify-between items-center text-xs">
                                            <div><p className="font-black text-yellow-400 uppercase tracking-tighter">₹{d.amount} {d.type}</p><p className="text-gray-500">UTR: {d.utr}</p></div>
                                            <div className="flex gap-2">
                                                <button onClick={async () => {
                                                    await db.runTransaction(async t => {
                                                        const uRef = getUserDoc(d.uid);
                                                        const u = await t.get(uRef);
                                                        if(d.type==='deposit') t.update(uRef, { balance: (u.data().balance||0) + d.amount });
                                                        t.update(getPublicPath('transactions').doc(d.id), { status: 'approved' });
                                                    }); alert("Approved!");
                                                }} className="w-10 h-10 rounded-full bg-green-500 text-black flex items-center justify-center"><i className="fa-solid fa-check"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'staff' && userData?.role === 'staff' && (
                            <div className="p-6 space-y-6">
                                <h2 className="font-orbitron font-bold text-xl text-blue-400">STAFF PANEL</h2>
                                {matches.map(m => (
                                    <div key={m.id} className="glass-panel p-5 rounded-3xl space-y-4">
                                        <h4 className="font-bold text-sm border-b border-white/5 pb-2">{m.title}</h4>
                                        {(m.rooms || []).map((r, i) => (
                                            <div key={i} className="flex gap-2 items-center">
                                                <span className="text-[10px] w-12 font-bold text-gray-500">RM {r.id}</span>
                                                <input id={`rid_${m.id}_${i}`} defaultValue={r.roomId} placeholder="ID" className="input-tech flex-1 p-2 text-xs" />
                                                <input id={`pass_${m.id}_${i}`} defaultValue={r.roomPass} placeholder="PW" className="input-tech flex-1 p-2 text-xs" />
                                                <button onClick={async () => {
                                                    const rid = document.getElementById(`rid_${m.id}_${i}`).value;
                                                    const pass = document.getElementById(`pass_${m.id}_${i}`).value;
                                                    const updatedRooms = [...m.rooms];
                                                    updatedRooms[i] = { ...updatedRooms[i], roomId: rid, roomPass: pass };
                                                    await getPublicPath('matches').doc(m.id).update({ rooms: updatedRooms });
                                                    alert("Updated!");
                                                }} className="bg-blue-600 text-[10px] p-2 rounded">SAVE</button>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Join Modal */}
                    {joiningMatch && (
                        <div className="fixed inset-0 z-[1000] bg-black/95 backdrop-blur-md flex items-end justify-center">
                            <div className="modal-slide glass-panel w-full max-w-lg rounded-t-[3rem] p-8 space-y-6 border-t border-cyan-500/30">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-orbitron font-black text-xl">JOIN <span className="text-cyan-400">{joiningMatch.mode}</span></h3>
                                    <button onClick={() => setJoiningMatch(null)} className="text-gray-500 text-2xl"><i className="fa-solid fa-circle-xmark"></i></button>
                                </div>
                                {joiningMatch.mode !== 'SOLO' && (
                                    <button onClick={autoFillSquad} className="w-full bg-purple-600/20 text-purple-400 py-3 rounded-xl border border-purple-500/30 text-xs font-black font-orbitron mb-2">LOAD MY SQUAD</button>
                                )}
                                <div className="space-y-4 max-h-[50vh] overflow-y-auto pr-2">
                                    {joiningMatch.mode === 'SOLO' ? (
                                        <>
                                            <input placeholder="Free Fire IGN" className="input-tech" value={joinFormData.ign||''} onChange={e=>setJoinFormData({...joinFormData, ign: e.target.value})} />
                                            <input placeholder="Free Fire UID" type="number" className="input-tech" value={joinFormData.uid||''} onChange={e=>setJoinFormData({...joinFormData, uid: e.target.value})} />
                                        </>
                                    ) : (
                                        <>
                                            <input placeholder="Team Name" className="input-tech" value={joinFormData.teamName||''} onChange={e=>setJoinFormData({...joinFormData, teamName: e.target.value})} />
                                            <input placeholder="Player 1 IGN (Leader)" className="input-tech" value={joinFormData.p1_ign||''} onChange={e=>setJoinFormData({...joinFormData, p1_ign: e.target.value})} />
                                            <input placeholder="Player 2 IGN" className="input-tech" value={joinFormData.p2_ign||''} onChange={e=>setJoinFormData({...joinFormData, p2_ign: e.target.value})} />
                                            <input placeholder="Player 3 IGN" className="input-tech" value={joinFormData.p3_ign||''} onChange={e=>setJoinFormData({...joinFormData, p3_ign: e.target.value})} />
                                            <input placeholder="Player 4 IGN" className="input-tech" value={joinFormData.p4_ign||''} onChange={e=>setJoinFormData({...joinFormData, p4_ign: e.target.value})} />
                                        </>
                                    )}
                                </div>
                                <div className="pt-4 border-t border-white/5 flex justify-between items-center">
                                    <div><p className="text-[10px] text-gray-500 font-bold">TOTAL PAYABLE</p><p className="text-2xl font-black text-white">₹{joiningMatch.entry}</p></div>
                                    <button onClick={submitJoin} className="bg-cyan-500 text-black px-10 py-4 rounded-2xl font-black font-orbitron btn-tech shadow-lg shadow-cyan-500/20">CONFIRM JOIN</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Calling UI */}
                    {callState && (
                        <div className="fixed inset-0 z-[2000] bg-black/95 backdrop-blur-2xl flex flex-col items-center justify-center p-8">
                            <div className="w-40 h-40 rounded-full border-4 border-cyan-500 p-1 mb-10 call-pulse relative">
                                <img src={ASSETS.defaultAvatar} className="w-full h-full rounded-full" />
                            </div>
                            <h2 className="text-3xl font-orbitron font-black mb-2">{callState.target?.name}</h2>
                            <p className="text-cyan-400 font-bold tracking-[0.5em] text-xs animate-pulse uppercase">{callState.type === 'incoming' ? 'INCOMING CALL...' : 'ESTABLISHING CALL...'}</p>
                            <div className="mt-20 flex gap-12">
                                {callState.type === 'incoming' && (
                                    <button className="w-20 h-20 rounded-full bg-green-500 text-black flex items-center justify-center text-2xl shadow-[0_0_40px_rgba(34,197,94,0.4)]"><i className="fa-solid fa-phone"></i></button>
                                )}
                                <button onClick={() => setCallState(null)} className="w-20 h-20 rounded-full bg-red-500 text-white flex items-center justify-center text-2xl shadow-[0_0_40px_rgba(239,68,68,0.4)]"><i className="fa-solid fa-phone-slash"></i></button>
                            </div>
                        </div>
                    )}

                    {/* Bottom Tabs */}
                    <nav className="fixed bottom-0 w-full bg-black/80 backdrop-blur-2xl border-t border-white/5 px-8 py-4 flex justify-between items-center z-[100] rounded-t-[3rem] pb-10">
                        <button onClick={() => setView('home')} className={`nav-btn ${view === 'home' ? 'active' : ''}`}><i className="fa-solid fa-house-user text-xl"></i></button>
                        <button onClick={() => setView('chat')} className={`nav-btn ${view === 'chat' ? 'active' : ''}`}><i className="fa-solid fa-comments text-xl"></i></button>
                        <div className="relative -top-10">
                            <button onClick={() => setView('wallet')} className="w-16 h-16 bg-cyan-500 rounded-[1.5rem] rotate-45 flex items-center justify-center shadow-[0_0_30px_rgba(6,182,212,0.5)] border-4 border-black active:scale-90 transition-all">
                                <i className="fa-solid fa-wallet -rotate-45 text-black text-xl"></i>
                            </button>
                        </div>
                        <button onClick={() => setView('search')} className={`nav-btn ${view === 'search' ? 'active' : ''}`}><i className="fa-solid fa-user-group text-xl"></i></button>
                        <button onClick={() => setView('profile')} className={`nav-btn ${view === 'profile' ? 'active' : ''}`}><i className="fa-solid fa-user-astronaut text-xl"></i></button>
                    </nav>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
