<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITESTAR - Complete Esports System</title>
    
    <!-- External Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        :root { --neon: #FF6B00; --bg: #050505; }
        body { background-color: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .font-gaming { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: -1px; }
        
        /* UI Enhancements */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(255, 107, 0, 0.3); }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(255, 107, 0, 0.5); }
        
        /* Preloader */
        #boot-loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 3px solid #111; border-top-color: var(--neon); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 0px; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none !important; }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body>

    <div id="boot-loader">
        <div class="spinner"></div>
        <div class="mt-6 font-gaming text-[#FF6B00] text-xl animate-pulse tracking-widest">ELITESTAR</div>
        <div class="mt-2 text-[10px] text-gray-600 uppercase font-bold tracking-[3px]">System Initializing...</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 1. USER PROVIDED CONFIGURATION ---
        const RAZORPAY_KEY = "rzp_test_SP3kbkcpNZf8Zl";
        const GEMINI_API_KEY = "AIzaSyDuO-mZyPg0wrOodjBrJRS7fqSDsvW4SUk";
        const firebaseConfig = {
            apiKey: "AIzaSyDPChNIAQz0gEmsuDFpACl0XvWm-DNcf2k",
            authDomain: "eliteweb-5b512.firebaseapp.com",
            projectId: "eliteweb-5b512",
            storageBucket: "eliteweb-5b512.firebasestorage.app",
            messagingSenderId: "474751993215",
            appId: "1:474751993215:web:88be5ffccdd88651cf464a",
            measurementId: "G-9HZY4280CY"
        };

        // Initialize Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "elitestar-master-v1";

        // --- 2. ICON COMPONENT ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const svg = window.lucide.icons[name].toSvg({ width: size, height: size, class: className });
                    if (iconRef.current) iconRef.current.innerHTML = svg;
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex"></span>;
        };

        // --- 3. MAIN APPLICATION ---
        const App = () => {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [matches, setMatches] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isBotOpen, setIsBotOpen] = useState(false);
            const [activeJoin, setActiveJoin] = useState(null);

            // Auth & Profile Listener
            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        syncProfile(u.uid);
                    } else {
                        await auth.signInAnonymously();
                    }
                });

                // Matches Listener
                const unsubMatches = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches')
                    .onSnapshot(snap => {
                        setMatches(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        setLoading(false);
                        document.getElementById('boot-loader').style.display = 'none';
                    });

                return () => { unsubAuth(); unsubMatches(); };
            }, []);

            const syncProfile = (uid) => {
                const ref = db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('profile').doc('data');
                ref.onSnapshot(snap => {
                    if (snap.exists) {
                        setProfile(snap.data());
                    } else {
                        const data = {
                            uid, username: "Player_" + Math.floor(Math.random()*9999), 
                            starId: "STAR-" + Math.floor(1000 + Math.random()*8000),
                            balance: 100, role: 'user', ffId: '', ffName: '', ffLevel: 1, wins: 0, matchesPlayed: 0
                        };
                        ref.set(data);
                    }
                });
            };

            // Razorpay Payment Flow
            const handlePayment = (amt) => {
                if (!amt || amt < 1) return;
                const options = {
                    key: RAZORPAY_KEY,
                    amount: amt * 100,
                    currency: "INR",
                    name: "ELITESTAR",
                    description: "Wallet Deposit",
                    handler: async function(res) {
                        const newBal = (profile.balance || 0) + parseInt(amt);
                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('profile').doc('data').update({ balance: newBal });
                        alert("Deposit Successful! ID: " + res.razorpay_payment_id);
                    },
                    prefill: { name: profile.username },
                    theme: { color: "#FF6B00" }
                };
                const rzp = new window.Razorpay(options);
                rzp.open();
            };

            // AI Bot Response with Gemini
            const getAIResponse = async (prompt) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "You are ELITE BOT, the assistant for ELITESTAR Free Fire tournament app. Answer questions about withdrawals (24h), deposits (instant), and matches (in Arena tab) briefly and helpfully in Hindi/English mixed." }] }
                        })
                    });
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (e) { return "Maaf kijiye, main abhi reply nahi kar sakta. Kripya Staff se sampark karein."; }
            };

            if (loading) return null;

            return (
                <div className="max-w-md mx-auto min-h-screen relative pb-28 selection:bg-[#FF6B00]/30">
                    {/* Header */}
                    <header className="p-4 flex justify-between items-center sticky top-0 z-[100] bg-black/90 backdrop-blur-md border-b border-white/5">
                        <div className="flex items-center gap-2" onClick={() => setView('home')}>
                            <div className="bg-[#FF6B00] p-1.5 rounded-xl shadow-[0_0_15px_rgba(255,107,0,0.3)]">
                                <Icon name="Trophy" size={18} className="text-black" />
                            </div>
                            <span className="font-gaming text-xl italic font-black">ELITE<span className="neon-text">STAR</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <p className="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Balance</p>
                                <p className="text-sm font-black text-[#FF6B00]">₹{profile?.balance || 0}</p>
                            </div>
                            <div className="w-10 h-10 glass border-[#FF6B00]/30 p-[1px] cursor-pointer" onClick={() => setView('profile')}>
                                <div className="w-full h-full bg-black rounded-[22px] flex items-center justify-center font-black text-[#FF6B00]">
                                    {profile?.username[0].toUpperCase()}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Views Container */}
                    <main className="p-4 space-y-6">
                        {view === 'home' && <HomeView profile={profile} matches={matches} setView={setView} />}
                        {view === 'play' && <PlayView matches={matches} onJoin={(m) => setActiveJoin(m)} />}
                        {view === 'chat' && <ChatView profile={profile} db={db} appId={appId} />}
                        {view === 'squad' && <SquadView profile={profile} db={db} appId={appId} />}
                        {view === 'wallet' && <WalletView profile={profile} deposit={handlePayment} />}
                        {view === 'admin' && <AdminPanel matches={matches} db={db} appId={appId} />}
                        {view === 'staff' && <StaffPanel matches={matches} db={db} appId={appId} />}
                        {view === 'profile' && <ProfileView profile={profile} db={db} appId={appId} />}
                    </main>

                    {/* Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 p-4 z-[200] max-w-md mx-auto safe-area-bottom">
                        <div className="glass p-2 flex justify-around items-center !bg-black/95 border-white/10 shadow-2xl">
                            <NavBtn active={view === 'home'} icon="Layout" onClick={() => setView('home')} />
                            <NavBtn active={view === 'play'} icon="Sword" onClick={() => setView('play')} />
                            <NavBtn active={view === 'chat'} icon="MessageSquare" onClick={() => setView('chat')} />
                            <NavBtn active={view === 'squad'} icon="Users" onClick={() => setView('squad')} />
                            <NavBtn active={view === 'wallet'} icon="Wallet" onClick={() => setView('wallet')} />
                            {(profile?.role === 'admin' || profile?.role === 'staff') && (
                                <NavBtn active={view === 'admin' || view === 'staff'} icon="ShieldCheck" onClick={() => setView(profile.role)} />
                            )}
                        </div>
                    </nav>

                    {/* Modals & AI Bot */}
                    {activeJoin && <JoinModal match={activeJoin} profile={profile} close={() => setActiveJoin(null)} db={db} appId={appId} />}
                    <div className="fixed bottom-24 right-4 z-[300]">
                        <button onClick={() => setIsBotOpen(!isBotOpen)} className="w-14 h-14 bg-[#FF6B00] rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(255,107,0,0.5)] btn-active">
                            <Icon name="Bot" size={28} className="text-black" />
                        </button>
                        {isBotOpen && <EliteBot close={() => setIsBotOpen(false)} getResponse={getAIResponse} />}
                    </div>
                </div>
            );
        };

        const NavBtn = ({ active, icon, onClick }) => (
            <button onClick={onClick} className={`p-3 rounded-2xl transition-all btn-active ${active ? 'bg-[#FF6B00] text-black shadow-[0_0_15px_rgba(255,107,0,0.4)]' : 'text-gray-500'}`}>
                <Icon name={icon} size={22} />
            </button>
        );

        // --- SUB-VIEWS ---

        const HomeView = ({ profile, matches, setView }) => (
            <div className="space-y-6">
                <div className="glass p-6 border-l-4 border-[#FF6B00] relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-[#FF6B00]/10 rounded-full blur-3xl"></div>
                    <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Player Profile</p>
                    <h2 className="text-3xl font-gaming italic text-white leading-tight">{profile?.username}</h2>
                    <p className="text-[#FF6B00] text-xs font-bold uppercase">{profile?.starId}</p>
                    <div className="mt-4 flex gap-4">
                        <div className="flex-1 bg-white/5 p-3 rounded-xl">
                            <span className="text-[9px] text-gray-500 uppercase font-bold">Wins</span>
                            <p className="text-lg font-black text-green-500">{profile?.wins}</p>
                        </div>
                        <div className="flex-1 bg-white/5 p-3 rounded-xl">
                            <span className="text-[9px] text-gray-500 uppercase font-bold">Role</span>
                            <p className="text-lg font-black text-[#FF6B00] uppercase text-[10px] tracking-widest mt-2">{profile?.role}</p>
                        </div>
                    </div>
                </div>

                <div className="relative h-44 rounded-[2.5rem] overflow-hidden glass border-white/5">
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800" className="w-full h-full object-cover opacity-60" />
                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent p-8 flex flex-col justify-end">
                        <h3 className="text-2xl font-gaming italic text-white leading-none">Global Championship</h3>
                        <button onClick={() => setView('play')} className="mt-4 bg-[#FF6B00] text-black px-6 py-2 rounded-xl font-black text-[11px] uppercase w-fit btn-active">View Arena</button>
                    </div>
                </div>

                <div className="flex justify-between items-center px-1">
                    <h4 className="font-gaming text-sm italic border-l-2 border-[#FF6B00] pl-3 uppercase">Live Matches</h4>
                    <span className="text-[10px] text-gray-500 font-bold" onClick={() => setView('play')}>SEE ALL</span>
                </div>

                <div className="space-y-4">
                    {matches.filter(m => m.status === 'open').slice(0, 3).map(m => <MatchCard key={m.id} match={m} onJoin={() => setView('play')} />)}
                </div>
            </div>
        );

        const MatchCard = ({ match, onJoin }) => (
            <div className="glass p-4 border border-white/5 flex gap-4 items-center active:scale-[0.98] transition-all">
                <div className="w-16 h-16 bg-[#111] rounded-2xl border border-white/10 flex items-center justify-center font-gaming text-[#FF6B00] text-xs">
                    {match.mode}
                </div>
                <div className="flex-grow">
                    <h5 className="font-black text-sm uppercase tracking-tight">{match.title}</h5>
                    <div className="flex gap-3 mt-1 text-[9px] font-bold text-gray-500 uppercase">
                        <span className="text-[#FF6B00]">₹{match.prize} Prize</span>
                        <span>•</span>
                        <span>Entry ₹{match.entry}</span>
                    </div>
                    <div className="mt-3 w-full h-1 bg-white/5 rounded-full overflow-hidden">
                        <div className="h-full bg-[#FF6B00] shadow-[0_0_10px_#FF6B00]" style={{ width: `${(match.joined/match.maxPlayers)*100}%` }}></div>
                    </div>
                </div>
                <div className="text-right">
                    <p className="text-[8px] font-bold text-gray-600 uppercase mb-1">{match.joined}/{match.maxPlayers}</p>
                    <button onClick={onJoin} className="bg-[#FF6B00] text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-orange-500/20 btn-active">JOIN</button>
                </div>
            </div>
        );

        const PlayView = ({ matches, onJoin }) => (
            <div className="space-y-4">
                <h2 className="text-lg font-gaming italic text-[#FF6B00] uppercase">Arena Tournaments</h2>
                {matches.map(m => <MatchCard key={m.id} match={m} onJoin={() => onJoin(m)} />)}
            </div>
        );

        const JoinModal = ({ match, profile, close, db, appId }) => {
            const [players, setPlayers] = useState([{ uid: '', name: '', lvl: '' }]);
            useEffect(() => {
                const count = match.mode === 'Solo' ? 1 : match.mode === 'Duo' ? 2 : 4;
                setPlayers(new Array(count).fill(null).map(() => ({ uid: '', name: '', lvl: '' })));
            }, [match]);

            const submitJoin = async () => {
                if (profile.balance < match.entry) return alert("Insufficient Balance!");
                // Real join logic here - deduct balance & add to match...
                alert("Joined Successfully! Room ID will be shared in Chat.");
                close();
            };

            return (
                <div className="fixed inset-0 z-[500] bg-black/90 backdrop-blur-md p-6 flex flex-col justify-center">
                    <div className="glass p-8 space-y-6 border-[#FF6B00]/40 border-2">
                        <div className="flex justify-between items-center">
                            <h3 className="text-xl font-gaming italic text-[#FF6B00]">Player Details</h3>
                            <Icon name="X" size={24} className="text-gray-500 cursor-pointer" onClick={close} />
                        </div>
                        <div className="space-y-4 max-h-[50vh] overflow-y-auto pr-2">
                            {players.map((p, i) => (
                                <div key={i} className="space-y-2 p-3 bg-white/5 rounded-xl">
                                    <p className="text-[9px] font-bold text-gray-500 uppercase">Player {i+1}</p>
                                    <input className="w-full text-xs p-2 rounded-lg" placeholder="Free Fire UID" onChange={e => { players[i].uid = e.target.value; setPlayers([...players]); }} />
                                    <div className="flex gap-2">
                                        <input className="w-full text-xs p-2 rounded-lg" placeholder="Name" onChange={e => { players[i].name = e.target.value; setPlayers([...players]); }} />
                                        <input className="w-20 text-xs p-2 rounded-lg" placeholder="Lvl" onChange={e => { players[i].lvl = e.target.value; setPlayers([...players]); }} />
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={submitJoin} className="w-full bg-[#FF6B00] text-black p-5 rounded-2xl font-black uppercase tracking-widest btn-active">Confirm Join (₹{match.entry})</button>
                    </div>
                </div>
            );
        };

        const ChatView = ({ profile, db, appId }) => {
            const [ch, setCh] = useState('general');
            const [msgs, setMsgs] = useState([]);
            const [input, setInput] = useState('');
            const chatEndRef = useRef(null);

            useEffect(() => {
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(`chats_${ch}`)
                    .orderBy('timestamp', 'desc').limit(50)
                    .onSnapshot(snap => {
                        setMsgs(snap.docs.map(d => d.data()).reverse());
                        setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    });
                return () => unsub();
            }, [ch]);

            const sendMsg = async () => {
                if (!input.trim()) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(`chats_${ch}`).add({
                    sender: profile.username, text: input, timestamp: Date.now(), uid: profile.uid, role: profile.role
                });
                setInput('');
            };

            return (
                <div className="h-[75vh] flex flex-col glass overflow-hidden">
                    <div className="flex border-b border-white/5 p-1 bg-black/40">
                        {['general', 'announcements', 'squad-talk'].map(c => (
                            <button key={c} onClick={() => setCh(c)} className={`flex-1 p-2 rounded-xl text-[9px] font-black uppercase tracking-widest ${ch === c ? 'bg-[#FF6B00] text-black shadow-lg' : 'text-gray-500'}`}>#{c}</button>
                        ))}
                    </div>
                    <div className="flex-1 p-4 overflow-y-auto space-y-4">
                        {msgs.map((m, i) => (
                            <div key={i} className={`flex flex-col ${m.uid === profile.uid ? 'items-end' : 'items-start'}`}>
                                <div className="flex items-center gap-1 mb-1">
                                    {m.role === 'admin' && <Icon name="Crown" size={10} className="text-yellow-500" />}
                                    <span className="text-[8px] text-gray-500 font-bold uppercase">{m.sender}</span>
                                </div>
                                <div className={`px-4 py-2 rounded-2xl text-xs max-w-[85%] ${m.uid === profile.uid ? 'bg-[#FF6B00] text-black font-bold' : 'bg-white/5 text-white border border-white/5'}`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                        <div ref={chatEndRef} />
                    </div>
                    <div className="p-3 bg-black/50 border-t border-white/5 flex gap-2">
                        <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendMsg()} className="flex-grow p-4 rounded-2xl text-xs" placeholder={`Message #${ch}...`} />
                        <button onClick={sendMsg} className="bg-[#FF6B00] p-4 rounded-2xl text-black btn-active"><Icon name="Send" size={20} /></button>
                    </div>
                </div>
            );
        };

        const SquadView = ({ profile }) => (
            <div className="space-y-6">
                <div className="glass p-10 text-center border-dashed border-2 border-white/10 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-48 h-48 bg-[#FF6B00]/5 rounded-full blur-3xl -mr-24 -mt-24"></div>
                    <Icon name="Users" size={64} className="text-[#FF6B00] mx-auto mb-4" />
                    <h3 className="text-xl font-gaming italic uppercase text-white tracking-tighter">Elite Squads</h3>
                    <p className="text-xs text-gray-500 font-bold mt-2 uppercase">Create permanent team for auto-fill entry</p>
                    <div className="mt-8 space-y-3">
                        <button className="w-full bg-[#FF6B00] text-black font-black p-5 rounded-2xl uppercase text-xs tracking-widest shadow-xl btn-active">Create My Squad</button>
                        <button className="w-full glass p-5 border-white/10 text-xs uppercase font-black btn-active">Join Existing</button>
                    </div>
                </div>
            </div>
        );

        const WalletView = ({ profile, deposit }) => {
            const [amt, setAmt] = useState('');
            return (
                <div className="space-y-6">
                    <div className="glass p-10 text-center border-[#FF6B00]/30 border-2 relative">
                        <div className="absolute top-0 left-0 w-full h-1 bg-[#FF6B00]"></div>
                        <p className="text-[10px] text-gray-500 font-black uppercase tracking-[0.4em] mb-2">Elite Wallet Balance</p>
                        <h2 className="text-6xl font-gaming italic text-[#FF6B00]">₹{profile?.balance || 0}</h2>
                    </div>
                    <div className="glass p-6 space-y-4">
                        <input value={amt} onChange={e => setAmt(e.target.value)} type="number" className="w-full bg-transparent border-b-2 border-white/10 text-center text-4xl font-black py-4 focus:border-[#FF6B00] outline-none" placeholder="₹ Enter Amount" />
                        <button onClick={() => deposit(amt)} className="w-full bg-[#FF6B00] text-black font-black p-5 rounded-2xl uppercase text-sm tracking-widest shadow-xl btn-active">Add Cash (Razorpay)</button>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <button className="glass p-5 border-white/10 text-xs uppercase font-black btn-active flex flex-col items-center gap-2"><Icon name="History" /> History</button>
                        <button className="glass p-5 border-white/10 text-xs uppercase font-black btn-active flex flex-col items-center gap-2"><Icon name="ArrowUpCircle" /> Withdraw</button>
                    </div>
                </div>
            );
        };

        const AdminPanel = ({ matches, db, appId }) => {
            const [form, setForm] = useState({ title: '', prize: 0, entry: 0, mode: 'Solo', maxPlayers: 48 });
            const deployMatch = async () => {
                if (!form.title) return alert("Title required!");
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches').add({
                    ...form, joined: 0, status: 'open', createdAt: Date.now(), roomId: '', roomPass: ''
                });
                alert("Match Deployed!");
            };
            return (
                <div className="space-y-6">
                    <h2 className="text-xl font-gaming italic text-[#FF6B00] uppercase">Admin Tournament Creator</h2>
                    <div className="glass p-6 space-y-4 border-[#FF6B00]/40 border">
                        <input className="w-full p-4 rounded-xl text-sm" placeholder="Match Title (e.g. Sunday Pro)" onChange={e => setForm({...form, title: e.target.value})} />
                        <div className="grid grid-cols-2 gap-3">
                            <select className="p-4 rounded-xl text-sm" onChange={e => setForm({...form, mode: e.target.value})}>
                                <option>Solo</option><option>Duo</option><option>Squad</option>
                            </select>
                            <input className="p-4 rounded-xl text-sm" placeholder="Prize Pool" type="number" onChange={e => setForm({...form, prize: Number(e.target.value)})} />
                        </div>
                        <input className="w-full p-4 rounded-xl text-sm" placeholder="Entry Fee" type="number" onChange={e => setForm({...form, entry: Number(e.target.value)})} />
                        <button onClick={deployMatch} className="w-full bg-[#FF6B00] text-black font-black p-5 rounded-2xl uppercase tracking-widest text-xs btn-active shadow-lg shadow-orange-500/30">Deploy Match</button>
                    </div>
                </div>
            );
        };

        const StaffPanel = ({ matches, db, appId }) => {
            const updateRoom = async (id, rid, pass) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches').doc(id).update({ roomId: rid, roomPass: pass });
                alert("Room Info Updated!");
            };
            const cancelMatch = async (id) => {
                if (!confirm("HACKER DETECTED? Match will be cancelled.")) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches').doc(id).update({ status: 'cancelled' });
                alert("Match Cancelled & Players Notified.");
            };
            return (
                <div className="space-y-6">
                    <h2 className="text-xl font-gaming italic text-red-500 uppercase">Staff Monitor Panel</h2>
                    {matches.filter(m => m.status === 'open').map(m => (
                        <div key={m.id} className="glass p-5 space-y-5 border-l-4 border-l-red-500">
                            <h4 className="font-black text-sm uppercase">{m.title}</h4>
                            <div className="grid grid-cols-2 gap-3">
                                <input id={`rid-${m.id}`} className="bg-white/5 border border-white/10 p-2 rounded text-xs" defaultValue={m.roomId} placeholder="Room ID" />
                                <input id={`rpas-${m.id}`} className="bg-white/5 border border-white/10 p-2 rounded text-xs" defaultValue={m.roomPass} placeholder="Password" />
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => updateRoom(m.id, document.getElementById(`rid-${m.id}`).value, document.getElementById(`rpas-${m.id}`).value)} className="flex-1 glass p-3 text-[9px] font-black uppercase btn-active">Update Room</button>
                                <button onClick={() => cancelMatch(m.id)} className="bg-red-500/20 text-red-500 p-3 rounded-xl text-[9px] font-black uppercase btn-active border border-red-500/20"><Icon name="ShieldAlert" size={14} className="mr-1 inline" /> Hacker Cancel</button>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const ProfileView = ({ profile, db, appId }) => (
            <div className="space-y-8 text-center pt-8">
                <div className="relative inline-block">
                    <div className="w-32 h-32 bg-[#FF6B00] rounded-[42px] p-1 rotate-12 shadow-[0_0_20px_rgba(255,107,0,0.4)] mx-auto">
                        <div className="w-full h-full bg-black rounded-[40px] flex items-center justify-center -rotate-12">
                            <Icon name="User" size={60} className="text-[#FF6B00]" />
                        </div>
                    </div>
                </div>
                <div>
                    <h2 className="text-4xl font-gaming italic tracking-tighter">{profile?.username}</h2>
                    <p className="text-[#FF6B00] font-black text-xs uppercase tracking-[0.3em] mt-1">{profile?.starId}</p>
                </div>
                <div className="glass text-left overflow-hidden divide-y divide-white/5">
                    <div className="p-5 flex justify-between items-center"><span className="text-[10px] text-gray-500 uppercase font-bold">FF UID</span><span className="font-black">{profile?.ffId || "Not Set"}</span></div>
                    <div className="p-5 flex justify-between items-center"><span className="text-[10px] text-gray-500 uppercase font-bold">Wins</span><span className="font-black text-green-500">{profile?.wins}</span></div>
                    <div className="p-5 flex justify-between items-center"><span className="text-[10px] text-gray-500 uppercase font-bold">Role</span><span className="font-black text-[#FF6B00] uppercase text-[10px] tracking-widest">{profile?.role}</span></div>
                </div>
                <button className="w-full glass p-5 text-red-500 font-black text-xs uppercase tracking-[0.3em] border-red-500/10 active:bg-red-500/5">Logout Session</button>
            </div>
        );

        const EliteBot = ({ close, getResponse }) => {
            const [msgs, setMsgs] = useState([{ bot: true, text: "Namaste! Main ELITE BOT hoon. Tournament ke baare mein kuch poochna hai?" }]);
            const [input, setInput] = useState('');
            const [load, setLoad] = useState(false);

            const ask = async () => {
                if (!input.trim() || load) return;
                const userText = input;
                setInput('');
                setMsgs(p => [...p, { bot: false, text: userText }]);
                setLoad(true);
                const res = await getResponse(userText);
                setMsgs(p => [...p, { bot: true, text: res }]);
                setLoad(false);
            };

            return (
                <div className="absolute bottom-16 right-0 w-80 h-[450px] glass bg-black/95 border-[#FF6B00]/40 border-2 flex flex-col z-[400] shadow-2xl animate-in slide-in-from-bottom-4 overflow-hidden">
                    <div className="p-4 bg-[#FF6B00] text-black font-black flex justify-between items-center">
                        <div className="flex items-center gap-2 text-[10px] uppercase tracking-widest"><Icon name="Bot" size={16} /> Elite Assistant</div>
                        <Icon name="X" size={18} className="cursor-pointer" onClick={close} />
                    </div>
                    <div className="flex-1 p-4 overflow-y-auto space-y-4 text-[11px] leading-relaxed">
                        {msgs.map((m, i) => (
                            <div key={i} className={`p-3 rounded-2xl ${m.bot ? 'bg-white/10 self-start mr-8' : 'bg-[#FF6B00] text-black font-bold self-end ml-8'}`}>
                                {m.text}
                            </div>
                        ))}
                        {load && <div className="text-[9px] text-gray-500 animate-pulse">Elite Bot Thinking...</div>}
                    </div>
                    <div className="p-3 bg-black border-t border-white/10 flex gap-2">
                        <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && ask()} className="flex-grow bg-white/5 p-3 rounded-xl text-[10px]" placeholder="Ask something..." />
                        <button onClick={ask} className="bg-[#FF6B00] p-3 rounded-xl text-black btn-active"><Icon name="ArrowRight" size={16} /></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
