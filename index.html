<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MK ESPORT - PRO MAX APP</title>
    
    <!-- PWA & Mobile App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase Compat (Original Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; }
        * { -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
        
        #root { height: 100%; display: flex; flex-direction: column; }
        .scroll-view { flex: 1; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Trusted UI Elements */
        .app-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .btn-primary { background: var(--primary); color: white; border-radius: 14px; font-weight: 700; transition: 0.2s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-primary:active { transform: scale(0.96); }
        .input-app { background: #334155; border: 1px solid #475569; color: white; padding: 14px; border-radius: 14px; width: 100%; outline: none; font-size: 16px; transition: 0.3s; }
        .input-app:focus { border-color: var(--primary); background: #1e293b; }

        .nav-item { color: #64748b; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-3px); filter: drop-shadow(0 0 5px var(--primary)); }

        /* Splash */
        .splash-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease; }
        .splash-hidden { opacity: 0; visibility: hidden; }

        /* Call Overlay */
        .call-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1e293b, #0f172a); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 60px 20px; }
        .call-avatar { width: 120px; height: 120px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        .call-avatar::after { content: ''; position: absolute; inset: -10px; border: 2px solid var(--primary); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

        .safe-top { height: env(safe-area-inset-top, 20px); }
        .safe-bottom { height: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body>
    <div id="app-splash" class="splash-screen">
        <img src="https://i.ibb.co/7dLY0XrF/logo.png" class="w-24 h-24 animate-pulse mb-6">
        <h1 class="font-orbitron text-2xl font-black tracking-widest">MK ESPORT</h1>
        <div class="mt-10 flex gap-2">
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        // --- ALL ORIGINAL CONFIG & LOGIC RESTORED ---
        const firebaseConfig = {
            apiKey: "AIzaSyBJWklGdsRM_XNo2_4AUceUZsiIyIjbUBA",
            authDomain: "mk-esports-60429.firebaseapp.com",
            projectId: "mk-esports-60429",
            storageBucket: "mk-esports-60429.firebasestorage.app",
            messagingSenderId: "663019221754",
            appId: "1:663019221754:web:d75e59277feb0ac12a8f43",
        };
        const ASSETS = { logo: "https://i.ibb.co/7dLY0XrF/logo.png", qr: "https://i.ibb.co/qFVjTWLK/qr.png" };
        const WHATSAPP_NUMBER = "916394562344";

        const { useState, useEffect, useRef } = React;

        let app, auth, db;
        try {
            if (!firebase.apps.length) app = firebase.initializeApp(firebaseConfig);
            else app = firebase.app();
            auth = firebase.auth();
            db = firebase.firestore();
            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        } catch(e) { console.error("Firebase Init Error", e); }

        const App = () => {
            const [view, setView] = useState('loading');
            const [userData, setUserData] = useState(null);
            const [isRegister, setIsRegister] = useState(false);
            const [authForm, setAuthForm] = useState({ name: '', mobile: '', email: '', password: '', confirm: '', refer: '' });
            
            // Original States
            const [matches, setMatches] = useState([]);
            const [preRegEvents, setPreRegEvents] = useState([]);
            const [chatMessages, setChatMessages] = useState([]);
            const [paymentConfig, setPaymentConfig] = useState({ upi: "mksport@upi", qr: ASSETS.qr });
            const [deposits, setDeposits] = useState([]);
            const [totalUsers, setTotalUsers] = useState(0);
            const [mySquad, setMySquad] = useState(null);
            const [joiningMatch, setJoiningMatch] = useState(null);
            const [joinFormData, setJoinFormData] = useState({});
            const [walletTab, setWalletTab] = useState('deposit');
            const [depositAmount, setDepositAmount] = useState('');
            const [depositStep, setDepositStep] = useState(1);
            const [tapCount, setTapCount] = useState(0);

            // Social States
            const [friends, setFriends] = useState([]);
            const [friendRequests, setFriendRequests] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [searchUid, setSearchUid] = useState('');
            const [foundUser, setFoundUser] = useState(null);
            const [isCalling, setIsCalling] = useState(null);

            // Initial Load & Listeners
            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        const doc = await db.collection('artifacts').doc('mksport').collection('users').doc(user.uid).get();
                        if (doc.exists) {
                            const uData = doc.data();
                            setUserData(uData);
                            setupListeners(user.uid, uData.role);
                        }
                        setView('home');
                    } else {
                        setView('auth');
                    }
                    setTimeout(() => document.getElementById('app-splash')?.classList.add('splash-hidden'), 1000);
                });
                return () => unsubAuth();
            }, []);

            const setupListeners = (uid, role) => {
                // Matches
                db.collection('artifacts').doc('mksport').collection('matches').orderBy('createdAt', 'desc').onSnapshot(s => {
                    const all = s.docs.map(d => ({id: d.id, ...d.data()}));
                    setMatches(all.filter(m => !m.isPreReg));
                    setPreRegEvents(all.filter(m => m.isPreReg));
                });
                // Global Chat
                db.collection('artifacts').doc('mksport').collection('chat').orderBy('time', 'desc').limit(50).onSnapshot(s => setChatMessages(s.docs.map(d => ({id: d.id, ...d.data()})).reverse()));
                // Payment Config
                db.collection('artifacts').doc('mksport').collection('config').doc('payment').onSnapshot(s => { if(s.exists) setPaymentConfig(s.data()); });
                // Friends
                db.collection('artifacts').doc('mksport').collection('friends').where('participants', 'array-contains', uid).onSnapshot(s => setFriends(s.docs.map(d => ({id: d.id, ...d.data()}))));
                // Requests
                db.collection('artifacts').doc('mksport').collection('requests').where('receiverId', '==', uid).where('status', '==', 'pending').onSnapshot(s => setFriendRequests(s.docs.map(d => ({id: d.id, ...d.data()}))));
                
                if(role === 'admin') {
                    db.collection('artifacts').doc('mksport').collection('transactions').where('status', '==', 'pending').onSnapshot(s => setDeposits(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    db.collection('artifacts').doc('mksport').collection('users').get().then(s => setTotalUsers(s.size));
                }
            };

            // Original Auth Logic
            const handleAuth = async () => {
                const email = `${authForm.mobile}@mkesport.com`;
                try {
                    if (isRegister) {
                        if(authForm.password !== authForm.confirm) throw new Error("Passwords mismatch");
                        const r = await auth.createUserWithEmailAndPassword(email, authForm.password);
                        const newUser = { uid: r.user.uid, name: authForm.name, phone: authForm.mobile, email: authForm.email, balance: 0, role: 'user', referralCode: "MK"+Math.floor(1000+Math.random()*9000), createdAt: new Date().toISOString(), joinedMatches: 0, lossStreak: 0 };
                        await db.collection('artifacts').doc('mksport').collection('users').doc(r.user.uid).set(newUser);
                        setUserData(newUser);
                    } else {
                        await auth.signInWithEmailAndPassword(email, authForm.password);
                    }
                } catch(e) { alert(e.message); }
            };

            // Original Secret Tap Logic
            const handleSecretTap = () => {
                const n = tapCount + 1; setTapCount(n);
                if(n === 5) {
                    const c = prompt("ADMIN CODE:");
                    if(c === "admin123") { db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid).update({role:'admin'}); alert("Admin Mode On!"); }
                    else if(c === "staff123") { db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid).update({role:'staff'}); alert("Staff Mode On!"); }
                    setTapCount(0);
                }
            };

            // Social Logic
            const searchPlayer = async () => {
                if(!searchUid) return;
                const snap = await db.collection('artifacts').doc('mksport').collection('users').doc(searchUid).get();
                if(snap.exists) setFoundUser(snap.data()); else alert("Player not found!");
            };

            const sendRequest = async () => {
                await db.collection('artifacts').doc('mksport').collection('requests').add({
                    senderId: userData.uid, senderName: userData.name, receiverId: foundUser.uid, status: 'pending', time: new Date().toISOString()
                });
                alert("Request Sent!"); setFoundUser(null);
            };

            const acceptRequest = async (req) => {
                await db.collection('artifacts').doc('mksport').collection('friends').add({
                    participants: [userData.uid, req.senderId], names: [userData.name, req.senderName], status: 'accepted', time: new Date().toISOString()
                });
                await db.collection('artifacts').doc('mksport').collection('requests').doc(req.id).update({status: 'accepted'});
            };

            // Views
            if (view === 'auth') return (
                <div className="h-full flex flex-col items-center justify-center p-8">
                    <img src={ASSETS.logo} className="w-20 h-20 mb-10 drop-shadow-xl"/>
                    <div className="w-full max-w-sm app-card p-8">
                        <div className="flex bg-slate-800 rounded-xl p-1 mb-8">
                            <button onClick={()=>setIsRegister(false)} className={`flex-1 py-3 text-xs font-bold rounded-lg ${!isRegister?'bg-blue-600':'text-gray-500'}`}>LOGIN</button>
                            <button onClick={()=>setIsRegister(true)} className={`flex-1 py-3 text-xs font-bold rounded-lg ${isRegister?'bg-blue-600':'text-gray-500'}`}>REGISTER</button>
                        </div>
                        <div className="space-y-4">
                            {isRegister && <input className="input-app" placeholder="Display Name" onChange={e=>setAuthForm({...authForm, name: e.target.value})}/>}
                            <input className="input-app" placeholder="Mobile Number" type="number" onChange={e=>setAuthForm({...authForm, mobile: e.target.value})}/>
                            <input className="input-app" placeholder="Password" type="password" onChange={e=>setAuthForm({...authForm, password: e.target.value})}/>
                            {isRegister && <input className="input-app" placeholder="Confirm Password" type="password" onChange={e=>setAuthForm({...authForm, confirm: e.target.value})}/>}
                            <button onClick={handleAuth} className="w-full btn-primary py-4 mt-4 uppercase text-sm tracking-widest">Continue</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div id="root">
                    <div className="safe-top bg-slate-950"></div>
                    
                    {/* Call Screen Overlay */}
                    {isCalling && (
                        <div className="call-screen">
                            <div className="flex flex-col items-center gap-6">
                                <div className="call-avatar"><i className="fa-solid fa-user text-5xl text-blue-500"></i></div>
                                <div className="text-center">
                                    <h2 className="text-2xl font-black">{isCalling.name}</h2>
                                    <p className="text-blue-400 font-bold tracking-widest animate-pulse mt-2">CALLING...</p>
                                </div>
                            </div>
                            <button onClick={()=>setIsCalling(null)} className="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-2xl shadow-xl active:scale-90"><i className="fa-solid fa-phone-slash"></i></button>
                        </div>
                    )}

                    <header className="px-6 py-4 flex justify-between items-center bg-slate-900/50 backdrop-blur-md border-b border-white/5 z-50">
                        <div className="flex items-center gap-3">
                            <img src={ASSETS.logo} className="w-8 h-8 rounded-full border border-blue-500"/>
                            <span className="font-orbitron font-black text-sm uppercase tracking-tighter">MK <span className="text-blue-500">SPORT</span></span>
                        </div>
                        <div onClick={()=>setView('wallet')} className="bg-blue-500/10 px-4 py-1.5 rounded-full border border-blue-500/20 text-blue-400 font-bold text-xs active:scale-95 transition">
                            ₹{userData?.balance || 0}
                        </div>
                    </header>

                    <main className="scroll-view no-scrollbar">
                        {view === 'home' && (
                            <div className="p-6 space-y-8">
                                <div className="app-card overflow-hidden h-44 relative border-none">
                                    <iframe className="w-full h-full" src="https://www.youtube.com/embed/9iW-sL7Upt0?autoplay=1&mute=1&loop=1&playlist=9iW-sL7Upt0&controls=0"></iframe>
                                </div>

                                <section className="space-y-4">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest border-l-2 border-blue-500 pl-2">Major Events</h3>
                                    {preRegEvents.map(m => (
                                        <div key={m.id} className="app-card p-5 border-l-4 border-yellow-500">
                                            <h4 className="font-bold text-lg">{m.title}</h4>
                                            <div className="flex justify-between items-center mt-3">
                                                <div><p className="text-[10px] text-slate-500 uppercase font-bold">Prize Pool</p><p className="text-xl font-black text-white">₹{m.pool}</p></div>
                                                <button onClick={()=>setJoiningMatch(m)} className="btn-primary px-6 py-2.5 text-xs">PRE-REGISTOR</button>
                                            </div>
                                        </div>
                                    ))}
                                </section>

                                <section className="space-y-4">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest border-l-2 border-blue-500 pl-2">Daily Scrims</h3>
                                    {matches.map(m => {
                                        const myRoom = (m.rooms || []).find(r => r.players.some(p => p.uid === userData.uid));
                                        return (
                                            <div key={m.id} className="app-card p-5">
                                                <div className="flex justify-between items-start">
                                                    <div><h4 className="font-bold">{m.title}</h4><p className="text-[10px] text-slate-500 uppercase mt-1">{m.mode} • {m.map}</p></div>
                                                    <span className="text-[10px] font-bold text-blue-400 bg-blue-500/10 px-2 py-1 rounded">LIVE</span>
                                                </div>
                                                <div className="grid grid-cols-3 gap-2 my-4 bg-slate-800/50 p-3 rounded-2xl text-center">
                                                    <div><p className="text-[8px] text-yellow-500 font-bold">1ST</p><p className="text-xs font-bold">₹{m.p1}</p></div>
                                                    <div><p className="text-[8px] text-slate-500 font-bold">2ND</p><p className="text-xs font-bold">₹{m.p2}</p></div>
                                                    <div><p className="text-[8px] text-slate-500 font-bold">3RD</p><p className="text-xs font-bold">₹{m.p3}</p></div>
                                                </div>
                                                {myRoom ? (
                                                    <div className="bg-green-500/10 border border-green-500/30 p-3 rounded-xl text-center">
                                                        <p className="text-green-500 text-[10px] font-bold">JOINED ROOM {myRoom.id}</p>
                                                        {myRoom.roomId ? <p className="text-white text-xs font-mono mt-1">{myRoom.roomId} / {myRoom.roomPass}</p> : <p className="text-[9px] text-slate-500">Wait for ID/Pass...</p>}
                                                    </div>
                                                ) : <button onClick={()=>setJoiningMatch(m)} className="w-full btn-primary py-3 text-xs uppercase">Join Match (₹{m.entry})</button>}
                                            </div>
                                        );
                                    })}
                                </section>
                            </div>
                        )}

                        {view === 'social' && (
                            <div className="p-6 space-y-6">
                                <div className="space-y-3">
                                    <div className="flex gap-2">
                                        <input className="input-app flex-1" placeholder="Search Player UID" value={searchUid} onChange={e=>setSearchUid(e.target.value)}/>
                                        <button onClick={searchPlayer} className="btn-primary w-14 h-14"><i className="fa-solid fa-magnifying-glass"></i></button>
                                    </div>
                                    {foundUser && (
                                        <div className="app-card p-4 flex justify-between items-center animate-pulse">
                                            <div className="flex items-center gap-3"><div className="w-10 h-10 bg-blue-500/20 rounded-full flex items-center justify-center font-bold">{foundUser.name[0]}</div><p className="font-bold text-sm">{foundUser.name}</p></div>
                                            <button onClick={sendRequest} className="text-blue-400 text-xs font-bold"><i className="fa-solid fa-user-plus mr-2"></i>ADD</button>
                                        </div>
                                    )}
                                </div>

                                {friendRequests.length > 0 && (
                                    <div className="space-y-3">
                                        <h3 className="text-[10px] font-bold text-slate-500 uppercase">Requests</h3>
                                        {friendRequests.map(req => (
                                            <div key={req.id} className="app-card p-4 flex justify-between items-center">
                                                <p className="text-sm font-bold">{req.senderName}</p>
                                                <button onClick={()=>acceptRequest(req)} className="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold">ACCEPT</button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-bold text-slate-500 uppercase">Friend List</h3>
                                    {friends.map(f => {
                                        const fid = f.participants.find(p => p !== userData.uid);
                                        const name = f.names[f.participants.indexOf(fid)];
                                        return (
                                            <div key={f.id} className="app-card p-4 flex justify-between items-center">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center font-bold text-blue-500">{name[0]}</div>
                                                    <div><p className="text-sm font-bold">{name}</p><p className="text-[9px] text-green-500">Online</p></div>
                                                </div>
                                                <div className="flex gap-5">
                                                    <button onClick={()=>{setActiveChat({fid, name}); setView('chat');}} className="text-blue-400"><i className="fa-solid fa-comment-dots text-xl"></i></button>
                                                    <button onClick={()=>setIsCalling({fid, name})} className="text-green-500"><i className="fa-solid fa-phone text-xl"></i></button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'chat' && activeChat && (
                            <div className="h-full flex flex-col bg-slate-950">
                                <div className="p-4 flex items-center gap-4 bg-slate-900 border-b border-white/5">
                                    <button onClick={()=>setView('social')}><i className="fa-solid fa-arrow-left"></i></button>
                                    <div className="flex-1">
                                        <p className="font-bold text-sm">{activeChat.name}</p>
                                        <p className="text-[9px] text-green-500">Active Now</p>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
                                    <p className="text-center text-[10px] text-slate-600">Start of Private Conversation</p>
                                </div>
                                <div className="p-4 flex gap-2">
                                    <input className="input-app flex-1" placeholder="Type message..."/>
                                    <button className="btn-primary px-5"><i className="fa-solid fa-paper-plane"></i></button>
                                </div>
                            </div>
                        )}

                        {view === 'wallet' && (
                            <div className="p-6 space-y-6">
                                <div className="app-card p-10 text-center bg-gradient-to-br from-blue-600 to-indigo-700 border-none shadow-2xl">
                                    <p className="text-blue-100 text-[10px] font-bold uppercase tracking-widest mb-1">Total Credits</p>
                                    <h2 className="text-5xl font-black">₹{userData.balance}</h2>
                                    <div className="flex gap-3 mt-8">
                                        <button onClick={()=>setWalletTab('deposit')} className={`flex-1 py-3.5 rounded-xl font-bold text-xs ${walletTab==='deposit'?'bg-white text-blue-700':'bg-white/20'}`}>DEPOSIT</button>
                                        <button onClick={()=>setWalletTab('withdraw')} className={`flex-1 py-3.5 rounded-xl font-bold text-xs ${walletTab==='withdraw'?'bg-white text-blue-700':'bg-white/20'}`}>WITHDRAW</button>
                                    </div>
                                </div>

                                {walletTab === 'deposit' ? (
                                    <div className="space-y-4">
                                        {depositStep === 1 ? (
                                            <div className="space-y-4">
                                                <div className="grid grid-cols-4 gap-2">{[50, 100, 300, 500].map(a => <button onClick={()=>setDepositAmount(a)} className={`py-3 rounded-xl border text-xs font-bold ${depositAmount===a?'bg-blue-600 border-blue-600':'border-slate-800'}`}>₹{a}</button>)}</div>
                                                <input className="input-app text-center" placeholder="Custom Amount" value={depositAmount} onChange={e=>setDepositAmount(e.target.value)}/>
                                                <button onClick={()=>setDepositStep(2)} className="w-full btn-primary py-4 font-bold">NEXT</button>
                                            </div>
                                        ) : (
                                            <div className="space-y-5 text-center">
                                                <div className="bg-white p-3 w-44 h-44 mx-auto rounded-3xl"><img src={paymentConfig.qr} className="w-full h-full object-contain"/></div>
                                                <p className="text-xs text-slate-400">UPI: <span className="text-white font-bold select-all">{paymentConfig.upi}</span></p>
                                                <input className="input-app" id="utr_final" placeholder="Enter 12 Digit UTR"/>
                                                <button onClick={async ()=>{
                                                    const utr = document.getElementById('utr_final').value;
                                                    await db.collection('artifacts').doc('mksport').collection('transactions').add({ uid: userData.uid, amount: Number(depositAmount), utr, status: 'pending', type: 'deposit', time: new Date().toISOString() });
                                                    alert("Request Sent!"); setDepositStep(1);
                                                }} className="w-full btn-primary py-4 font-bold">SUBMIT DEPOSIT</button>
                                                <button onClick={()=>setDepositStep(1)} className="text-xs text-slate-500">Go Back</button>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <input className="input-app" placeholder="Amount (Min ₹100)"/>
                                        <input className="input-app" placeholder="UPI ID / Bank Details"/>
                                        <button className="w-full btn-primary py-4 bg-red-600 border-none shadow-red-500/20">REQUEST WITHDRAWAL</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="p-6 space-y-6">
                                <div className="app-card p-6 flex flex-col items-center">
                                    <div onClick={handleSecretTap} className="w-20 h-20 rounded-full bg-slate-800 border-2 border-blue-500 p-1 mb-4 shadow-lg active:scale-95 transition">
                                        <img src={ASSETS.logo} className="w-full h-full rounded-full"/>
                                    </div>
                                    <h2 className="text-xl font-bold">{userData.name}</h2>
                                    <p className="text-[10px] text-slate-500 mt-1 uppercase tracking-widest">UID: {userData.uid}</p>
                                </div>

                                <div className="app-card p-4 border border-purple-500/20 bg-purple-500/5">
                                    <div className="flex justify-between items-center mb-2"><span className="text-[10px] font-bold text-purple-400 uppercase">Loser Bonus Streak</span><span className="text-xs font-bold">{userData.lossStreak || 0}/10</span></div>
                                    <div className="w-full bg-slate-950 h-1.5 rounded-full"><div className="bg-purple-500 h-full rounded-full" style={{width:`${(userData.lossStreak||0)*10}%`}}></div></div>
                                </div>

                                <div className="app-card divide-y divide-white/5 overflow-hidden">
                                    <div className="p-4 flex items-center justify-between active:bg-white/5" onClick={()=>navigator.clipboard.writeText(userData.uid)}>
                                        <div className="flex items-center gap-3"><i className="fa-solid fa-fingerprint text-blue-500"></i><span className="text-sm font-semibold">Copy My UID</span></div>
                                        <i className="fa-solid fa-chevron-right text-slate-800 text-xs"></i>
                                    </div>
                                    <div className="p-4 flex items-center justify-between active:bg-white/5" onClick={()=>window.open(`https://wa.me/${WHATSAPP_NUMBER}`)}>
                                        <div className="flex items-center gap-3"><i className="fa-solid fa-headset text-blue-500"></i><span className="text-sm font-semibold">Support Center</span></div>
                                        <i className="fa-solid fa-chevron-right text-slate-800 text-xs"></i>
                                    </div>
                                    <div className="p-4 flex items-center gap-3 text-red-500 active:bg-white/5" onClick={()=>auth.signOut()}>
                                        <i className="fa-solid fa-power-off"></i><span className="text-sm font-bold">Logout Session</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ORIGINAL PANELS RESTORED */}
                        {view === 'admin' && (
                            <div className="p-6 space-y-6">
                                <h2 className="text-xl font-bold text-red-500 uppercase">Admin Panel</h2>
                                <div className="app-card p-6 space-y-3">
                                    <input id="m_title" placeholder="Match Title" className="input-app"/>
                                    <div className="flex gap-2"><input id="m_entry" placeholder="Entry" className="input-app"/><input id="m_kill" placeholder="Kill" className="input-app"/></div>
                                    <input id="m_time" type="datetime-local" className="input-app"/>
                                    <button onClick={async ()=>{
                                        const t = document.getElementById('m_title').value;
                                        const e = document.getElementById('m_entry').value;
                                        const k = document.getElementById('m_kill').value;
                                        const tm = document.getElementById('m_time').value;
                                        await db.collection('artifacts').doc('mksport').collection('matches').add({
                                            title: t, entry: Number(e), kill: Number(k), time: tm, createdAt: new Date().toISOString(), rooms: [{id:1, players:[], roomId:'', roomPass:''}], isPreReg: false
                                        });
                                        alert("Match Published!");
                                    }} className="w-full btn-primary py-4 bg-red-600 border-none shadow-none">PUBLISH MATCH</button>
                                </div>
                                <h3 className="text-xs font-bold text-slate-500 uppercase">Deposit Requests</h3>
                                {deposits.map(d => (
                                    <div key={d.id} className="app-card p-4 flex justify-between items-center">
                                        <div><p className="font-bold">₹{d.amount}</p><p className="text-[10px] text-slate-500">UTR: {d.utr}</p></div>
                                        <button onClick={async ()=>{
                                            const uRef = db.collection('artifacts').doc('mksport').collection('users').doc(d.uid);
                                            const uDoc = await uRef.get();
                                            await uRef.update({balance: (uDoc.data().balance||0) + Number(d.amount)});
                                            await db.collection('artifacts').doc('mksport').collection('transactions').doc(d.id).update({status:'approved'});
                                            alert("Approved!");
                                        }} className="bg-green-600 px-4 py-2 rounded-lg text-xs font-bold">APPROVE</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 w-full bg-slate-900 border-t border-white/5 px-10 pt-4 pb-10 flex justify-between items-center z-50">
                        <button onClick={()=>setView('home')} className={`nav-item ${view==='home'?'active':''}`}><i className="fa-solid fa-gamepad text-xl"></i><span className="text-[10px] font-bold uppercase">PLAY</span></button>
                        <button onClick={()=>setView('social')} className={`nav-item ${view==='social'?'active':''}`}><i className="fa-solid fa-users text-xl"></i><span className="text-[10px] font-bold uppercase">SOCIAL</span></button>
                        <button onClick={()=>setView('wallet')} className={`nav-item ${view==='wallet'?'active':''}`}><i className="fa-solid fa-wallet text-xl"></i><span className="text-[10px] font-bold uppercase">CASH</span></button>
                        <button onClick={()=>setView('profile')} className={`nav-item ${view==='profile'?'active':''}`}><i className="fa-solid fa-user-circle text-xl"></i><span className="text-[10px] font-bold uppercase">ME</span></button>
                    </nav>

                    <div className="safe-bottom bg-slate-900"></div>

                    {/* Join Match Modal */}
                    {joiningMatch && (
                        <div className="fixed inset-0 z-[100] flex items-end">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={()=>setJoiningMatch(null)}></div>
                            <div className="relative w-full app-card rounded-t-[40px] p-8 animate-[slideUp_0.4s_ease-out]">
                                <h3 className="text-xl font-bold mb-6 text-center">Confirm Registration</h3>
                                <input className="input-app mb-4" placeholder="Free Fire In-Game Name" onChange={e=>setJoinFormData({ign: e.target.value})}/>
                                <button onClick={async ()=>{
                                    if(!joinFormData.ign) return alert("Enter IGN");
                                    const m = joiningMatch;
                                    try {
                                        await db.runTransaction(async (t) => {
                                            const mRef = db.collection('artifacts').doc('mksport').collection('matches').doc(m.id);
                                            const uRef = db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid);
                                            const mDoc = await t.get(mRef);
                                            const uDoc = await t.get(uRef);
                                            if(uDoc.data().balance < m.entry) throw "Low Balance";
                                            let rooms = mDoc.data().rooms;
                                            rooms[0].players.push({ uid: userData.uid, ign: joinFormData.ign, name: userData.name });
                                            t.update(uRef, { balance: uDoc.data().balance - m.entry });
                                            t.update(mRef, { rooms: rooms });
                                        });
                                        alert("Joined!"); setJoiningMatch(null);
                                    } catch(e) { alert(e); }
                                }} className="w-full btn-primary py-5 uppercase text-sm font-black shadow-xl">Join Now (₹{joiningMatch.entry})</button>
                                <div className="safe-bottom"></div>
                            </div>
                        </div>
                    )}
                    <style> @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } } </style>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
