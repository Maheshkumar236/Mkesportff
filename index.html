<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MK ESPORT - OFFICIAL APP</title>
    
    <!-- PWA & App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Firebase Compat SDKs (As per original) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root { --neon-cyan: #06b6d4; --neon-gold: #fbbf24; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            margin: 0; background-color: #000; color: white; 
            font-family: 'Rajdhani', sans-serif; height: 100vh; width: 100vw; 
            overflow: hidden; position: fixed;
        }
        
        #root { height: 100%; overflow: hidden; display: flex; flex-direction: column; }
        .main-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        #canvas-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* Splash Screen */
        .splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* Original Styles Integrated */
        .glass-panel {
            background: rgba(10, 10, 25, 0.9); backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        
        .btn-3d-cyan {
            background: linear-gradient(180deg, #06b6d4 0%, #0891b2 100%);
            color: white; border-radius: 8px;
            box-shadow: 0px 4px 0px #155e75;
            transition: all 0.1s; position: relative; top: 0;
            text-transform: uppercase; font-family: 'Orbitron'; font-size: 12px;
            clip-path: polygon(5% 0, 100% 0, 100% 70%, 95% 100%, 0 100%, 0 30%);
        }
        .btn-3d-cyan:active { top: 4px; box-shadow: 0px 0px 0px #155e75; }

        .btn-3d-gold {
            background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
            color: black; border-radius: 8px;
            box-shadow: 0px 4px 0px #b45309;
            transition: all 0.1s; position: relative; top: 0; font-weight: 900;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
        }
        .btn-3d-gold:active { top: 4px; box-shadow: none; }
        
        .input-tech {
            background: rgba(0,0,0,0.6); border: 1px solid #334155; color: #fff; padding: 14px;
            width: 100%; outline: none; clip-path: polygon(0 0, 100% 0, 100% 85%, 97% 100%, 0 100%);
            font-family: 'Orbitron'; font-size: 14px;
        }

        .nav-btn { color: #555; transition: 0.3s; }
        .nav-btn.active { color: var(--neon-cyan); filter: drop-shadow(0 0 8px var(--neon-cyan)); transform: scale(1.1); }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; border: 1px solid #06b6d4; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .chip-btn {
            background: rgba(0,0,0,0.6); border: 1px solid #333; padding: 8px 16px; border-radius: 20px; color: #aaa; font-size: 12px; font-weight: bold;
        }
        .chip-btn.selected { background: #06b6d4; color: black; box-shadow: 0 0 10px #06b6d4; }

        .safe-top { height: env(safe-area-inset-top, 20px); }
        .safe-bottom { height: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="app-splash" class="splash-screen">
        <img src="https://i.ibb.co/7dLY0XrF/logo.png" class="w-24 h-24 animate-pulse mb-4">
        <h1 class="font-orbitron text-xl font-black tracking-widest text-white">MK ESPORT</h1>
        <div class="mt-8 flex gap-2">
            <div class="w-2 h-2 bg-cyan-500 rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-cyan-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
            <div class="w-2 h-2 bg-cyan-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
        </div>
    </div>

    <div id="root"></div>
    <div id="canvas-container"></div>

    <script type="text/babel">
        // --- ORIGINAL CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBJWklGdsRM_XNo2_4AUceUZsiIyIjbUBA",
            authDomain: "mk-esports-60429.firebaseapp.com",
            projectId: "mk-esports-60429",
            storageBucket: "mk-esports-60429.firebasestorage.app",
            messagingSenderId: "663019221754",
            appId: "1:663019221754:web:d75e59277feb0ac12a8f43",
            measurementId: "G-QJHXYR70RG"
        };
        const ASSETS = {
            logo: "https://i.ibb.co/7dLY0XrF/logo.png", 
            defaultQr: "https://i.ibb.co/qFVjTWLK/qr.png" 
        };
        const WHATSAPP_NUMBER = "916394562344"; 

        const { useState, useEffect } = React;

        // --- FIREBASE INIT ---
        let app, auth, db;
        try {
            if (!firebase.apps.length) app = firebase.initializeApp(firebaseConfig);
            else app = firebase.app();
            auth = firebase.auth();
            db = firebase.firestore();
            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        } catch (e) { console.error("Firebase Init Error", e); }

        // --- 3D BACKGROUND ---
        const Background3D = () => {
            useEffect(() => {
                const container = document.getElementById('canvas-container');
                if (!container || container.children.length > 0) return;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                camera.position.z = 100; camera.position.y = 50; camera.rotation.x = -0.2;
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000, 40, 40), new THREE.MeshBasicMaterial({ color: 0x06b6d4, wireframe: true, transparent: true, opacity: 0.1 }));
                plane.rotation.x = -Math.PI / 2; plane.position.y = -50; scene.add(plane);
                const cubes = [];
                for (let i = 0; i < 25; i++) {
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), new THREE.MeshBasicMaterial({ color: 0xfbbf24, wireframe: true }));
                    mesh.position.set((Math.random()-0.5)*400, Math.random()*200-50, (Math.random()-0.5)*600-100);
                    mesh.userData = { speed: Math.random()*0.2+0.1 };
                    scene.add(mesh); cubes.push(mesh);
                }
                const animate = () => {
                    requestAnimationFrame(animate);
                    cubes.forEach(c => { c.position.y -= c.userData.speed; if(c.position.y < -60) c.position.y = 100; });
                    renderer.render(scene, camera);
                };
                animate();
            }, []);
            return null;
        };

        const App = () => {
            const [view, setView] = useState('splash');
            const [userData, setUserData] = useState(null);
            
            // --- ALL ORIGINAL STATE RESTORED ---
            const [matches, setMatches] = useState([]);
            const [preRegEvents, setPreRegEvents] = useState([]); 
            const [paymentConfig, setPaymentConfig] = useState({ upi: "mksport@upi", qr: ASSETS.defaultQr });
            const [chatMessages, setChatMessages] = useState([]);
            const [deposits, setDeposits] = useState([]);
            const [totalUsers, setTotalUsers] = useState(0);
            const [isRegister, setIsRegister] = useState(false);
            const [authForm, setAuthForm] = useState({ name: '', mobile: '', email: '', password: '', confirm: '', refer: '' });
            const [loading, setLoading] = useState(false);
            const [joiningMatch, setJoiningMatch] = useState(null);
            const [joinFormData, setJoinFormData] = useState({});
            const [depositStep, setDepositStep] = useState(1);
            const [depositAmount, setDepositAmount] = useState('');
            const [withdrawAmount, setWithdrawAmount] = useState('');
            const [withdrawUPI, setWithdrawUPI] = useState('');
            const [walletTab, setWalletTab] = useState('deposit');
            const [showTerms, setShowTerms] = useState(false);
            const [tapCount, setTapCount] = useState(0); 
            const [depositSuccess, setDepositSuccess] = useState(false);
            const [mySquad, setMySquad] = useState(null);

            // Auth Check
            useEffect(() => {
                if(!auth) return;
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        try {
                            const doc = await db.collection('artifacts').doc('mksport').collection('users').doc(u.uid).get();
                            if (doc.exists) {
                                setUserData(doc.data());
                                if(doc.data().squadId) {
                                    const sq = await db.collection('artifacts').doc('mksport').collection('squads').doc(doc.data().squadId).get();
                                    if(sq.exists) setMySquad(sq.data());
                                }
                            }
                            setView('home');
                        } catch(e) { console.error(e); }
                    } else { setView('auth'); }
                    setTimeout(() => document.getElementById('app-splash')?.classList.add('splash-hidden'), 1000);
                });
                return () => unsub();
            }, []);

            // Real-time Listeners (ORIGINAL)
            useEffect(() => {
                if(db && userData) {
                    db.collection('artifacts').doc('mksport').collection('matches').orderBy('createdAt', 'desc').onSnapshot(s => {
                        const all = s.docs.map(d => ({id: d.id, ...d.data()}));
                        setMatches(all.filter(m => !m.isPreReg));
                        setPreRegEvents(all.filter(m => m.isPreReg));
                    });
                    db.collection('artifacts').doc('mksport').collection('chat').orderBy('time', 'desc').limit(50).onSnapshot(s => setChatMessages(s.docs.map(d => ({id: d.id, ...d.data()})).reverse()));
                    db.collection('artifacts').doc('mksport').collection('config').doc('payment').onSnapshot(s => { if(s.exists) setPaymentConfig(s.data()); });
                    if(userData.role === 'admin') {
                        db.collection('artifacts').doc('mksport').collection('transactions').where('status', '==', 'pending').onSnapshot(s => setDeposits(s.docs.map(d => ({id: d.id, ...d.data()}))));
                        db.collection('artifacts').doc('mksport').collection('users').get().then(s => setTotalUsers(s.size));
                    }
                }
            }, [userData]);

            // --- ALL ORIGINAL LOGIC FUNCTIONS RESTORED ---
            const createSquad = async () => {
                const name = prompt("Squad Name:"); if(!name) return;
                const code = "SQ" + Math.floor(10000 + Math.random() * 90000);
                const squadData = { id: code, name: name, leader: userData.uid, members: [{uid: userData.uid, name: userData.name, ign: userData.name}] };
                await db.collection('artifacts').doc('mksport').collection('squads').doc(code).set(squadData);
                await db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid).update({squadId: code});
                setMySquad(squadData); setUserData({...userData, squadId: code});
            };

            const joinSquad = async () => {
                const code = prompt("Enter Squad Code:"); if(!code) return;
                const sqRef = db.collection('artifacts').doc('mksport').collection('squads').doc(code);
                const sqDoc = await sqRef.get();
                if(!sqDoc.exists) return alert("Invalid Code");
                const updatedMembers = [...sqDoc.data().members, {uid: userData.uid, name: userData.name, ign: userData.name}];
                await sqRef.update({members: updatedMembers});
                await db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid).update({squadId: code});
                setMySquad({...sqDoc.data(), members: updatedMembers}); setUserData({...userData, squadId: code});
            };

            const leaveSquad = async () => {
                if(!confirm("Leave Squad?")) return;
                const sqRef = db.collection('artifacts').doc('mksport').collection('squads').doc(userData.squadId);
                const sqDoc = await sqRef.get();
                if(sqDoc.exists) {
                    const newMembers = sqDoc.data().members.filter(m => m.uid !== userData.uid);
                    if(newMembers.length === 0) await sqRef.delete(); else await sqRef.update({members: newMembers});
                }
                await db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid).update({squadId: null});
                setMySquad(null); setUserData({...userData, squadId: null});
            };

            const handleAuth = async () => {
                setLoading(true); const email = `${authForm.mobile}@mkesport.com`; 
                try {
                    if(isRegister) {
                        const r = await auth.createUserWithEmailAndPassword(email, authForm.password);
                        const newUser = { 
                            uid: r.user.uid, name: authForm.name, phone: authForm.mobile, email: authForm.email, balance: 0, role: 'user',
                            referralCode: "MK"+Math.floor(1000+Math.random()*9000), referredBy: authForm.refer || null, createdAt: new Date().toISOString(), joinedMatches: 0, lossStreak: 0
                        };
                        await db.collection('artifacts').doc('mksport').collection('users').doc(r.user.uid).set(newUser);
                        setUserData(newUser);
                    } else { await auth.signInWithEmailAndPassword(email, authForm.password); }
                } catch(e) { alert(e.message); } setLoading(false);
            };

            const submitJoin = async () => {
                if(!joiningMatch) return;
                const m = joiningMatch;
                const isFree = (m.isPreReg && userData.joinedMatches >= 200) || userData.freeEntry;
                try {
                    await db.runTransaction(async (t) => {
                        const mRef = db.collection('artifacts').doc('mksport').collection('matches').doc(m.id);
                        const uRef = db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid);
                        const mDoc = await t.get(mRef);
                        const uDoc = await t.get(uRef);
                        if(!isFree && uDoc.data().balance < m.entry) throw "Low Balance";
                        let rooms = mDoc.data().rooms || Array.from({length:10}, (_,i)=>({id:i+1, players:[], roomId:'', roomPass:''}));
                        const roomIdx = rooms.findIndex(r => r.players.length < 48);
                        rooms[roomIdx].players.push({ uid: userData.uid, name: userData.name, ign: joinFormData.ign || joinFormData.teamName, details: joinFormData });
                        if(!isFree) t.update(uRef, {balance: uDoc.data().balance - m.entry});
                        t.update(uRef, {joinedMatches: (uDoc.data().joinedMatches || 0) + 1});
                        t.update(mRef, {rooms: rooms, totalJoined: (mDoc.data().totalJoined || 0) + 1});
                    });
                    setDepositSuccess(true); setJoiningMatch(null);
                } catch(e) { alert(e); }
            };

            const submitDeposit = async () => {
                const utr = document.getElementById('utr_app').value;
                await db.collection('artifacts').doc('mksport').collection('transactions').add({ uid: userData.uid, phone: userData.phone, amount: Number(depositAmount), utr, type: 'deposit', status: 'pending', timestamp: new Date().toISOString() });
                setDepositSuccess(true); setDepositStep(1);
            };

            const sendChat = async () => {
                const i = document.getElementById('chatInput_app');
                if(i.value) await db.collection('artifacts').doc('mksport').collection('chat').add({text:i.value, name:userData.name, uid:userData.uid, time:new Date().toISOString()});
                i.value='';
            };

            // Admin Logic
            const publishMatch = async () => {
                const fields = ['m_title', 'm_mode', 'm_type', 'm_entry', 'm_kill', 'm_p1', 'm_p2', 'm_p3', 'm_time', 'm_max'];
                const data = {}; fields.forEach(f => data[f] = document.getElementById(f).value);
                const rooms = Array.from({length:10}, (_,i)=>({id:i+1, players:[], roomId:'', roomPass:''}));
                await db.collection('artifacts').doc('mksport').collection('matches').add({ 
                    title: data.m_title, mode: data.m_mode, isPreReg: data.m_type === 'PREREG', entry: Number(data.m_entry), kill: Number(data.m_kill), 
                    p1: Number(data.m_p1), p2: Number(data.m_p2), p3: Number(data.m_p3), pool: Number(data.m_p1)+Number(data.m_p2)+Number(data.m_p3), 
                    time: data.m_time, maxPlayers: Number(data.m_max), map: 'BERMUDA', rooms, createdAt: new Date().toISOString(), imageUrl: `https://image.pollinations.ai/prompt/Free%20Fire%20${data.m_title}%20Gaming?width=600&height=300`
                }); alert("Match Published!");
            };

            if(view === 'splash') return null;

            if(view === 'auth') return (
                <div className="h-full flex flex-col items-center justify-center p-8">
                    <Background3D />
                    <img src={ASSETS.logo} className="w-20 h-20 mb-6 drop-shadow-[0_0_15px_cyan]"/>
                    <div className="w-full glass-panel p-8 rounded-3xl border border-white/10">
                        <div className="flex bg-gray-900/50 p-1 rounded mb-6">
                            <button onClick={()=>setIsRegister(false)} className={`flex-1 py-2 text-xs font-bold rounded ${!isRegister?'bg-cyan-600':'text-gray-500'}`}>LOGIN</button>
                            <button onClick={()=>setIsRegister(true)} className={`flex-1 py-2 text-xs font-bold rounded ${isRegister?'bg-cyan-600':'text-gray-500'}`}>JOIN</button>
                        </div>
                        <div className="space-y-3">
                            <input placeholder="Mobile" className="input-tech" onChange={e=>setAuthForm({...authForm, mobile: e.target.value})}/>
                            {isRegister && <><input placeholder="Name" className="input-tech" onChange={e=>setAuthForm({...authForm, name: e.target.value})}/><input placeholder="Ref Code" className="input-tech" onChange={e=>setAuthForm({...authForm, refer: e.target.value})}/></>}
                            <input placeholder="Password" type="password" className="input-tech" onChange={e=>setAuthForm({...authForm, password: e.target.value})}/>
                            <button onClick={handleAuth} className="w-full btn-3d-cyan py-4 font-bold mt-4">{loading?'...':(isRegister?'REGISTER':'LOGIN')}</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div id="root">
                    <Background3D />
                    <div className="safe-top"></div>
                    
                    {/* App Header */}
                    <header className="px-6 py-4 flex justify-between items-center glass-panel border-b border-white/5 z-50">
                        <div className="flex items-center gap-3">
                            <img src={ASSETS.logo} className="w-8 h-8 rounded-full border border-cyan-500"/>
                            <span className="font-orbitron font-black text-sm uppercase">MK <span className="text-cyan-500">SPORT</span></span>
                        </div>
                        <div onClick={()=>setView('wallet')} className="flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full border border-white/10 active:scale-90 transition">
                            <i className="fa-solid fa-wallet text-yellow-500 text-xs"></i>
                            <span className="font-orbitron font-bold text-xs">₹{userData?.balance}</span>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="main-scroll px-5 pt-4 no-scrollbar">
                        {view === 'home' && (
                            <div className="space-y-6">
                                <div className="video-wrapper shadow-2xl"><iframe src="https://www.youtube.com/embed/9iW-sL7Upt0?autoplay=1&mute=1&loop=1&playlist=9iW-sL7Upt0&controls=0"></iframe></div>
                                
                                {preRegEvents.length > 0 && (
                                    <div className="space-y-4">
                                        <h2 className="font-orbitron text-yellow-500 text-xs font-bold border-l-2 border-yellow-500 pl-2">MAJOR EVENTS</h2>
                                        {preRegEvents.map(m => (
                                            <div key={m.id} className="glass-panel rounded-2xl overflow-hidden border-2 border-yellow-500">
                                                <img src={m.imageUrl} className="h-32 w-full object-cover"/>
                                                <div className="p-4">
                                                    <h3 className="font-bold text-lg text-white">{m.title}</h3>
                                                    <div className="text-center my-3"><p className="text-[10px] text-yellow-500 uppercase font-bold">PRIZE POOL</p><p className="text-2xl font-black text-white">₹{m.pool}</p></div>
                                                    <button onClick={()=>setJoiningMatch(m)} className="w-full btn-3d-gold py-2">PRE-REGISTER (₹{m.entry})</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="space-y-4">
                                    <h2 className="font-orbitron text-cyan-400 text-xs font-bold border-l-2 border-cyan-500 pl-2">DAILY SCRIMS</h2>
                                    {matches.map(m => {
                                        const myRoom = (m.rooms || []).find(r => r.players.some(p => p.uid === userData.uid));
                                        return (
                                            <div key={m.id} className="glass-panel rounded-2xl overflow-hidden border border-white/10">
                                                <div className="h-24 bg-gray-900 relative">
                                                    <img src={m.imageUrl} className="w-full h-full object-cover opacity-40"/>
                                                    <div className="absolute inset-0 flex items-center justify-center"><h3 className="font-orbitron font-bold text-sm tracking-widest">{m.title}</h3></div>
                                                </div>
                                                <div className="p-4">
                                                    <div className="flex justify-between text-[10px] text-gray-400 mb-3"><span>{m.mode} • {m.map}</span><span>{m.time}</span></div>
                                                    <div className="grid grid-cols-3 gap-2 mb-4 bg-black/40 p-2 rounded-xl text-center">
                                                        <div><p className="text-[8px] text-yellow-500">1ST</p><p className="font-bold text-xs">₹{m.p1}</p></div>
                                                        <div><p className="text-[8px] text-gray-500">2ND</p><p className="font-bold text-xs">₹{m.p2}</p></div>
                                                        <div><p className="text-[8px] text-gray-500">3RD</p><p className="font-bold text-xs">₹{m.p3}</p></div>
                                                    </div>
                                                    {myRoom ? (
                                                        <div className="bg-green-600/20 p-2 rounded-xl border border-green-500 text-center">
                                                            <p className="text-green-500 text-[10px] font-bold">JOINED ROOM {myRoom.id}</p>
                                                            {myRoom.roomId ? <p className="text-white text-xs font-mono">{myRoom.roomId} / {myRoom.roomPass}</p> : <p className="text-[9px] text-gray-500">Waiting for ID/Pass...</p>}
                                                        </div>
                                                    ) : <button onClick={()=>setJoiningMatch(m)} className="w-full btn-3d-cyan py-2">JOIN NOW (₹{m.entry})</button>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'wallet' && (
                            <div className="space-y-6">
                                <div className="glass-panel p-8 text-center rounded-[40px] border-b-4 border-cyan-500">
                                    <h2 className="text-5xl font-orbitron font-black text-white">₹{userData.balance}</h2>
                                    <p className="text-xs text-cyan-400 tracking-widest mt-2 uppercase">Current Balance</p>
                                </div>
                                <div className="flex bg-black/50 p-1 rounded-2xl border border-white/5">
                                    <button onClick={()=>setWalletTab('deposit')} className={`flex-1 py-3 text-xs font-bold rounded-xl ${walletTab==='deposit'?'bg-cyan-600':'text-gray-500'}`}>DEPOSIT</button>
                                    <button onClick={()=>setWalletTab('withdraw')} className={`flex-1 py-3 text-xs font-bold rounded-xl ${walletTab==='withdraw'?'bg-red-600':'text-gray-500'}`}>WITHDRAW</button>
                                </div>
                                {walletTab === 'deposit' ? (
                                    <div className="space-y-4">
                                        {depositStep === 1 ? (
                                            <div className="space-y-4">
                                                <div className="grid grid-cols-2 gap-3">{[50, 100, 300, 500].map(amt => <button onClick={()=>setDepositAmount(amt)} className={`chip-btn ${depositAmount===amt?'selected':''}`}>₹{amt}</button>)}</div>
                                                <input type="number" placeholder="Custom Amount" value={depositAmount} onChange={e=>setDepositAmount(e.target.value)} className="input-tech text-center"/>
                                                <button onClick={()=>setDepositStep(2)} className="w-full btn-3d-cyan py-4 font-bold">NEXT STEP</button>
                                            </div>
                                        ) : (
                                            <div className="space-y-4 text-center">
                                                <div className="bg-white p-2 w-40 h-40 mx-auto rounded-2xl"><img src={paymentConfig.qr} className="w-full h-full object-contain"/></div>
                                                <p className="text-xs text-gray-400">UPI: <span className="text-white select-all">{paymentConfig.upi}</span></p>
                                                <input id="utr_app" placeholder="Enter 12 Digit UTR" className="input-tech"/>
                                                <button onClick={submitDeposit} className="w-full btn-3d-cyan py-4 font-bold">SUBMIT REQUEST</button>
                                                <button onClick={()=>setDepositStep(1)} className="text-xs text-gray-500 underline">GO BACK</button>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <input type="number" placeholder="Amount (Min ₹100)" className="input-tech" onChange={e=>setWithdrawAmount(e.target.value)}/>
                                        <input placeholder="UPI ID / Mobile" className="input-tech" onChange={e=>setWithdrawUPI(e.target.value)}/>
                                        <button onClick={async ()=>{
                                            if(userData.balance < Number(withdrawAmount)) return alert("Low Balance");
                                            await db.collection('artifacts').doc('mksport').collection('transactions').add({ uid: userData.uid, phone: userData.phone, amount: Number(withdrawAmount), upi: withdrawUPI, type: 'withdraw', status: 'pending', timestamp: new Date().toISOString() });
                                            alert("Withdrawal Requested!");
                                        }} className="w-full btn-3d-cyan py-4 font-bold bg-red-600">REQUEST WITHDRAW</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'chat' && (
                            <div className="h-[70vh] flex flex-col glass-panel rounded-3xl overflow-hidden border border-white/10">
                                <div className="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar">
                                    {chatMessages.map(msg => (
                                        <div key={msg.id} className={`flex flex-col ${msg.uid === userData.uid ? 'items-end' : 'items-start'}`}>
                                            <div className={`max-w-[80%] p-3 rounded-2xl text-xs ${msg.uid === userData.uid ? 'bg-cyan-600 text-white rounded-tr-none' : 'bg-white/5 text-gray-300 rounded-tl-none'}`}>
                                                <span className="block text-[8px] font-bold opacity-50 mb-1">{msg.name}</span>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-3 bg-black flex gap-2">
                                    <input id="chatInput_app" className="input-tech flex-1" placeholder="Type message..."/>
                                    <button onClick={sendChat} className="bg-cyan-600 w-12 h-12 rounded-xl flex items-center justify-center"><i className="fa-solid fa-paper-plane"></i></button>
                                </div>
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="space-y-6">
                                <div onClick={()=>{setTapCount(t=>t+1); if(tapCount===5) { const c=prompt("CODE:"); if(c==="admin123") db.collection('artifacts').doc('mksport').collection('users').doc(userData.uid).update({role:'admin'}); setTapCount(0); }}} className="glass-panel p-6 rounded-3xl flex items-center gap-4">
                                    <img src={ASSETS.logo} className="w-16 h-16 rounded-full border-2 border-cyan-500 p-1"/>
                                    <div><h2 className="text-xl font-orbitron font-bold">{userData.name}</h2><p className="text-xs text-gray-500">{userData.phone}</p></div>
                                </div>
                                <div className="glass-panel p-4 rounded-3xl border border-purple-500/30">
                                    <h3 className="font-orbitron text-[10px] text-purple-400 mb-2 font-bold">LOSER BONUS (Streak: {userData.lossStreak||0}/10)</h3>
                                    <div className="w-full bg-black h-1 rounded-full"><div className="bg-purple-500 h-full" style={{width:`${(userData.lossStreak||0)*10}%`}}></div></div>
                                </div>
                                <div className="glass-panel p-5 rounded-3xl border border-green-500/30">
                                    <p className="text-[10px] text-green-500 font-bold mb-2">REFER & EARN ₹75</p>
                                    <div className="flex justify-between items-center bg-black/50 p-3 rounded-xl border border-dashed border-white/20">
                                        <span className="font-mono text-lg font-bold">{userData.referralCode}</span>
                                        <button onClick={()=>{navigator.clipboard.writeText(userData.referralCode); alert("Copied!");}} className="text-xs text-green-400 font-bold">COPY</button>
                                    </div>
                                </div>
                                <div className="glass-panel p-5 rounded-3xl">
                                    <h3 className="font-orbitron text-xs font-bold mb-4">SQUAD SETTINGS</h3>
                                    {mySquad ? (
                                        <div className="flex justify-between items-center"><div><p className="text-sm font-bold">{mySquad.name}</p><p className="text-[10px] text-gray-500">ID: {mySquad.id}</p></div><button onClick={leaveSquad} className="text-xs text-red-500 font-bold">LEAVE</button></div>
                                    ) : (
                                        <div className="flex gap-2"><button onClick={createSquad} className="flex-1 bg-white/5 py-3 rounded-xl text-xs font-bold">CREATE</button><button onClick={joinSquad} className="flex-1 bg-white/5 py-3 rounded-xl text-xs font-bold">JOIN</button></div>
                                    )}
                                </div>
                                <button onClick={()=>auth.signOut()} className="w-full py-4 text-xs font-bold text-red-500 uppercase tracking-widest bg-red-900/10 rounded-3xl border border-red-900/30">LOGOUT SESSION</button>
                            </div>
                        )}

                        {/* --- ADMIN & STAFF VIEWS --- */}
                        {view === 'admin' && (
                            <div className="space-y-6">
                                <div className="glass-panel p-6 rounded-3xl border-red-500/30">
                                    <h2 className="font-orbitron text-sm font-bold text-red-500 mb-4 uppercase">Create Match</h2>
                                    <input id="m_title" placeholder="TITLE" className="input-tech mb-2"/>
                                    <div className="flex gap-2 mb-2"><select id="m_mode" className="input-tech flex-1 bg-black"><option value="SOLO">SOLO</option><option value="DUO">DUO</option><option value="SQUAD">SQUAD</option></select><select id="m_type" className="input-tech flex-1 bg-black"><option value="DAILY">DAILY</option><option value="PREREG">PRE-REG</option></select></div>
                                    <div className="grid grid-cols-2 gap-2 mb-2"><input id="m_entry" type="number" placeholder="ENTRY" className="input-tech"/><input id="m_kill" type="number" placeholder="KILL" className="input-tech"/></div>
                                    <div className="grid grid-cols-3 gap-2 mb-2"><input id="m_p1" type="number" placeholder="1ST" className="input-tech"/><input id="m_p2" type="number" placeholder="2ND" className="input-tech"/><input id="m_p3" type="number" placeholder="3RD" className="input-tech"/></div>
                                    <input id="m_time" type="datetime-local" className="input-tech mb-2"/>
                                    <input id="m_max" type="number" defaultValue="48" className="input-tech mb-4"/>
                                    <button onClick={publishMatch} className="w-full btn-3d-cyan py-3 bg-red-600 border-none">PUBLISH MATCH</button>
                                </div>
                                <div className="glass-panel p-6 rounded-3xl border-yellow-500/30">
                                    <h2 className="font-orbitron text-sm font-bold text-yellow-500 mb-4 uppercase">Pending Requests</h2>
                                    <div className="space-y-2">
                                        {deposits.map(d => (
                                            <div key={d.id} className="bg-white/5 p-3 rounded-xl flex justify-between items-center">
                                                <div><p className="text-xs font-bold">₹{d.amount} ({d.type})</p><p className="text-[8px] text-gray-500">{d.phone}</p></div>
                                                <div className="flex gap-2"><button onClick={async ()=>{
                                                    if(!confirm("Approve?")) return;
                                                    const uRef = db.collection('artifacts').doc('mksport').collection('users').doc(d.uid);
                                                    const uDoc = await uRef.get();
                                                    await uRef.update({balance: (uDoc.data().balance||0) + Number(d.amount)});
                                                    await db.collection('artifacts').doc('mksport').collection('transactions').doc(d.id).update({status: 'approved'});
                                                }} className="bg-green-600 px-3 py-1 rounded-lg text-xs font-bold">✔</button></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'staff' && (
                            <div className="space-y-4">
                                <h2 className="font-orbitron text-blue-500 font-bold mb-4">STAFF MANAGEMENT</h2>
                                {matches.map(m => (
                                    <div key={m.id} className="glass-panel p-4 rounded-2xl">
                                        <p className="font-bold text-sm mb-2">{m.title}</p>
                                        {m.rooms.map((r, i) => (
                                            <div key={i} className="flex gap-1 mb-2">
                                                <input id={`rid_${m.id}_${i}`} placeholder="ID" defaultValue={r.roomId} className="input-tech p-1 text-[10px]"/>
                                                <input id={`pass_${m.id}_${i}`} placeholder="Pass" defaultValue={r.roomPass} className="input-tech p-1 text-[10px]"/>
                                                <button onClick={async ()=>{
                                                    const updated = [...m.rooms];
                                                    updated[i] = {...updated[i], roomId: document.getElementById(`rid_${m.id}_${i}`).value, roomPass: document.getElementById(`pass_${m.id}_${i}`).value};
                                                    await db.collection('artifacts').doc('mksport').collection('matches').doc(m.id).update({rooms: updated}); alert("Saved!");
                                                }} className="bg-blue-600 px-2 rounded text-[10px]">SAVE</button>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* App Bottom Navigation */}
                    <nav className="fixed bottom-0 w-full glass-panel border-t border-white/10 px-6 pt-4 pb-8 flex justify-around items-center z-50">
                        <button onClick={()=>setView('home')} className={`nav-btn flex flex-col items-center gap-1 ${view==='home'?'active':''}`}><i className="fa-solid fa-gamepad text-xl"></i><span className="text-[10px] font-bold uppercase">PLAY</span></button>
                        <button onClick={()=>setView('wallet')} className={`nav-btn flex flex-col items-center gap-1 ${view==='wallet'?'active':''}`}><i className="fa-solid fa-wallet text-xl"></i><span className="text-[10px] font-bold uppercase">CASH</span></button>
                        <button onClick={()=>setView('chat')} className={`nav-btn flex flex-col items-center gap-1 ${view==='chat'?'active':''}`}><i className="fa-solid fa-comments text-xl"></i><span className="text-[10px] font-bold uppercase">CHAT</span></button>
                        <button onClick={()=>setView('profile')} className={`nav-btn flex flex-col items-center gap-1 ${view==='profile'?'active':''}`}><i className="fa-solid fa-user text-xl"></i><span className="text-[10px] font-bold uppercase">ME</span></button>
                        {userData?.role === 'admin' && <button onClick={()=>setView('admin')} className="nav-btn text-red-500"><i className="fa-solid fa-lock text-xl"></i></button>}
                        {userData?.role === 'staff' && <button onClick={()=>setView('staff')} className="nav-btn text-blue-500"><i className="fa-solid fa-user-shield text-xl"></i></button>}
                    </nav>

                    <div className="safe-bottom"></div>

                    {/* Modals restored from original */}
                    {joiningMatch && (
                        <div className="fixed inset-0 z-[100] flex items-end">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={()=>setJoiningMatch(null)}></div>
                            <div className="relative w-full glass-panel rounded-t-[40px] p-8 animate-[slideUp_0.4s_ease-out]">
                                <h3 className="font-orbitron text-xl font-bold mb-6 text-center">JOIN {joiningMatch.mode}</h3>
                                <div className="space-y-3 mb-6">
                                    <input placeholder="In-Game Name (IGN)" className="input-tech" onChange={e=>setJoinFormData({...joinFormData, ign: e.target.value})}/>
                                    {joiningMatch.mode !== 'SOLO' && <input placeholder="Team Name" className="input-tech" onChange={e=>setJoinFormData({...joinFormData, teamName: e.target.value})}/>}
                                </div>
                                <button onClick={submitJoin} className="w-full btn-3d-cyan py-5 font-black uppercase text-sm shadow-xl">CONFIRM ENTRY</button>
                                <div className="safe-bottom"></div>
                            </div>
                        </div>
                    )}
                    
                    {depositSuccess && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-6">
                            <div className="glass-panel p-8 rounded-[40px] border-2 border-green-500 text-center">
                                <i className="fa-solid fa-circle-check text-5xl text-green-500 mb-4"></i>
                                <h3 className="font-orbitron font-bold text-xl mb-2">SUCCESS!</h3>
                                <p className="text-gray-500 text-xs mb-6">Request has been sent for verification.</p>
                                <button onClick={()=>setDepositSuccess(false)} className="w-full btn-3d-cyan py-3 bg-green-600 border-none">AWESOME</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
