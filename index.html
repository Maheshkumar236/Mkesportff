<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITESTAR - Secure Esports Engine</title>
    
    <!-- Core Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root { --neon: #FF6B00; --bg: #050505; }
        
        body { 
            background: radial-gradient(circle at top right, #1a100a, #050505);
            color: white; font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .font-gaming { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
        
        /* 3D Glassmorphism */
        .glass-3d { 
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .neon-glow { filter: drop-shadow(0 0 10px rgba(255, 107, 0, 0.5)); }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(255, 107, 0, 0.5); }

        /* Splash Screen */
        #splash { 
            position: fixed; inset: 0; background: #000; z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s ease-in-out;
        }
        
        .loader-line { width: 180px; height: 2px; background: #111; margin-top: 30px; border-radius: 10px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: var(--neon); animation: fill 2.5s forwards; box-shadow: 0 0 15px var(--neon); }
        @keyframes fill { to { width: 100%; } }

        ::-webkit-scrollbar { width: 0px; }
        input { background: rgba(0,0,0,0.4) !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 16px; outline: none !important; color: white !important; }
        input:focus { border-color: var(--neon) !important; box-shadow: 0 0 15px rgba(255,107,0,0.2); }
        
        .btn-premium { 
            background: linear-gradient(to right, #FF6B00, #FF8E3C);
            color: black; font-weight: 900; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(255,107,0,0.4);
        }
        .btn-premium:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="neon-glow" style="animation: pulse 2s infinite">
            <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </div>
        <div class="mt-8 font-gaming text-3xl text-white italic tracking-[8px]">ELITESTAR</div>
        <div class="loader-line"><div class="loader-fill"></div></div>
        <div class="mt-4 text-[9px] text-gray-500 uppercase tracking-[4px] font-bold">Verifying Encrypted Session...</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- MASTER CONFIG ---
        const RAZORPAY_KEY = "rzp_test_SP3kbkcpNZf8Zl";
        const GEMINI_API_KEY = "AIzaSyDuO-mZyPg0wrOodjBrJRS7fqSDsvW4SUk";
        const firebaseConfig = {
  apiKey: "AIzaSyBEaZAroIG78Q00DGqiV5p0bM-AdFx8Dzo",
  authDomain: "elitestar-with.firebaseapp.com",
  projectId: "elitestar-with",
  storageBucket: "elitestar-with.firebasestorage.app",
  messagingSenderId: "160838578850",
  appId: "1:160838578850:web:5e697f018bf29c3b3f9dfb",
  measurementId: "G-SMSGSCYRBW"
};

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "elitestar-v1";

        // --- STABLE ICONS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const paths = {
                Trophy: `<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 2a5 5 0 0 0-5 5v2c0 2.2 1.8 4 4 4h2c2.2 0 4-1.8 4-4V7a5 5 0 0 0-5-5z"/>`,
                Home: `<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`,
                Play: `<path d="M14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/>`,
                Chat: `<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`,
                Users: `<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>`,
                Wallet: `<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M22 12h-4a2 2 0 0 0 0 4h4"/>`,
                Shield: `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>`,
                Bot: `<rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/>`,
                Send: `<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>`,
                Lock: `<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>`,
                Mail: `<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>`,
                User: `<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
                Zap: `<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>`,
                X: `<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: paths[name] || '' }} />
            );
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [matches, setMatches] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isBotOpen, setIsBotOpen] = useState(false);
            const [activeJoin, setActiveJoin] = useState(null);

            useEffect(() => {
                // Splash Timer
                setTimeout(() => {
                    const sp = document.getElementById('splash');
                    sp.style.opacity = '0';
                    setTimeout(() => sp.style.display = 'none', 800);
                }, 3000);

                // Auth Listener
                const unsubAuth = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        syncProfile(u.uid);
                    } else {
                        setUser(null);
                        setProfile(null);
                        setLoading(false);
                    }
                });

                const unsubMatches = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches')
                    .onSnapshot(snap => setMatches(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubAuth(); unsubMatches(); };
            }, []);

            const syncProfile = (uid) => {
                const ref = db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('profile').doc('data');
                ref.onSnapshot(snap => {
                    if (snap.exists) setProfile(snap.data());
                    setLoading(false);
                });
            };

            const handleDeposit = (amt) => {
                const opt = {
                    key: RAZORPAY_KEY, amount: amt * 100, currency: "INR", name: "ELITESTAR",
                    handler: async (res) => {
                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('profile').doc('data').update({ balance: firebase.firestore.FieldValue.increment(parseInt(amt)) });
                        alert("Deposit Successful!");
                    },
                    prefill: { name: profile?.username }, theme: { color: "#FF6B00" }
                };
                new Razorpay(opt).open();
            };

            const askBot = async (q) => {
                try {
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: q }] }] })
                    });
                    const d = await r.json();
                    return d.candidates[0].content.parts[0].text;
                } catch(e) { return "Bot maintenance mein hai. Tournament dekhein!"; }
            };

            if (loading) return null;

            // --- 4. SHOW AUTH SCREEN IF NOT LOGGED IN ---
            if (!user) return <AuthView db={db} auth={auth} appId={appId} />;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32 relative shadow-2xl">
                    {/* Header */}
                    <header className="p-4 flex justify-between items-center sticky top-0 z-[500] backdrop-blur-3xl bg-black/60 border-b border-white/5">
                        <div className="flex items-center gap-3" onClick={() => setView('home')}>
                            <div className="bg-gradient-to-tr from-[#FF6B00] to-orange-500 p-2 rounded-2xl shadow-[0_0_20px_rgba(255,107,0,0.4)]">
                                <Icon name="Trophy" size={20} className="text-black" />
                            </div>
                            <span className="font-gaming text-xl italic font-black">ELITE<span className="neon-text">STAR</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest leading-none mb-1">Balance</p>
                                <p className="text-md font-black text-[#FF6B00]">₹{profile?.balance || 0}</p>
                            </div>
                            <div className="w-11 h-11 glass-3d p-[1px]" onClick={() => setView('profile')}>
                                <div className="w-full h-full bg-black rounded-[20px] flex items-center justify-center font-black text-[#FF6B00] border border-white/10">{profile?.username?.[0] || 'E'}</div>
                            </div>
                        </div>
                    </header>

                    {/* Views */}
                    <main className="p-5 space-y-8 animate-in slide-in-from-bottom-6 duration-700">
                        {view === 'home' && <HomeView profile={profile} matches={matches} setView={setView} />}
                        {view === 'play' && <ArenaView matches={matches} onJoin={setActiveJoin} />}
                        {view === 'chat' && <ChatView profile={profile} db={db} appId={appId} />}
                        {view === 'squad' && <SquadView profile={profile} />}
                        {view === 'wallet' && <WalletView profile={profile} onDep={handleDeposit} />}
                        {view === 'admin' && <AdminPanel matches={matches} db={db} appId={appId} />}
                        {view === 'staff' && <StaffPanel matches={matches} db={db} appId={appId} />}
                        {view === 'profile' && <ProfileView profile={profile} auth={auth} />}
                    </main>

                    {/* Bottom Navbar (Feature 17) */}
                    <nav className="fixed bottom-0 left-0 right-0 p-5 z-[1000] max-w-md mx-auto">
                        <div className="glass-3d p-2 flex justify-around items-center !bg-black/90 shadow-[0_-20px_50px_rgba(0,0,0,1)]">
                            <NavBtn active={view === 'home'} icon="Home" label="Hub" onClick={() => setView('home')} />
                            <NavBtn active={view === 'play'} icon="Play" label="Arena" onClick={() => setView('play')} />
                            <NavBtn active={view === 'chat'} icon="Chat" label="Comms" onClick={() => setView('chat')} />
                            <NavBtn active={view === 'squad'} icon="Users" label="Squad" onClick={() => setView('squad')} />
                            <NavBtn active={view === 'wallet'} icon="Wallet" label="Wallet" onClick={() => setView('wallet')} />
                            {(profile?.role === 'admin' || profile?.role === 'staff') && <NavBtn active={view === 'admin' || view === 'staff'} icon="Shield" label="Admin" onClick={() => setView(profile.role)} />}
                        </div>
                    </nav>

                    {activeJoin && <JoinModal match={activeJoin} profile={profile} close={() => setActiveJoin(null)} db={db} appId={appId} />}
                    
                    {/* Bot (Feature 13) */}
                    <div className="fixed bottom-28 right-6 z-[2000]">
                        <button onClick={() => setIsBotOpen(!isBotOpen)} className="w-14 h-14 bg-[#FF6B00] rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all"><Icon name="Bot" size={28} className="text-black" /></button>
                        {isBotOpen && <EliteBot close={() => setIsBotOpen(false)} onAsk={askBot} />}
                    </div>
                </div>
            );
        };

        const NavBtn = ({ active, icon, label, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center gap-1 p-2.5 px-4 rounded-2xl transition-all ${active ? 'bg-[#FF6B00]/10 text-[#FF6B00]' : 'text-gray-500'}`}>
                <Icon name={icon} size={22} className={active ? 'neon-glow' : ''} />
                <span className="text-[8px] font-black uppercase tracking-widest">{label}</span>
            </button>
        );

        // --- AUTH VIEW (Login/Register) ---
        const AuthView = ({ db, auth, appId }) => {
            const [isRegister, setIsRegister] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [userN, setUserN] = useState('');

            const handleAuth = async () => {
                try {
                    if (isRegister) {
                        const res = await auth.createUserWithEmailAndPassword(email, pass);
                        await db.collection('artifacts').doc(appId).collection('users').doc(res.user.uid).collection('profile').doc('data').set({
                            uid: res.user.uid, username: userN, starId: "STAR-"+Math.floor(1000+Math.random()*8000), balance: 100, role: 'user', wins: 0, ffId: ''
                        });
                        alert("Account Created!");
                    } else {
                        await auth.signInWithEmailAndPassword(email, pass);
                    }
                } catch(e) { alert(e.message); }
            };

            return (
                <div className="min-h-screen p-6 flex flex-col justify-center items-center animate-in zoom-in-95 duration-700">
                    <div className="w-full max-w-sm p-10 glass-3d border-[#FF6B00]/20 border-2 space-y-8 shadow-[0_0_80px_rgba(255,107,0,0.1)]">
                        <div className="text-center space-y-2">
                            <Icon name="Lock" size={48} className="text-[#FF6B00] mx-auto mb-4 neon-glow" />
                            <h2 className="text-3xl font-gaming italic text-white leading-none">Access Console</h2>
                            <p className="text-[10px] text-gray-500 uppercase font-black tracking-widest">{isRegister ? 'New Pilot Registration' : 'Commander Login Required'}</p>
                        </div>
                        <div className="space-y-4">
                            {isRegister && <div className="space-y-1"><Icon name="User" size={12} className="text-gray-600 mb-1" /><input value={userN} onChange={e=>setUserN(e.target.value)} className="w-full p-4 text-sm font-bold uppercase" placeholder="CHOOSE USERNAME" /></div>}
                            <div className="space-y-1"><Icon name="Mail" size={12} className="text-gray-600 mb-1" /><input value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-4 text-sm font-bold uppercase" placeholder="EMAIL IDENTITY" /></div>
                            <div className="space-y-1"><Icon name="Lock" size={12} className="text-gray-600 mb-1" /><input type="password" value={pass} onChange={e=>setPass(e.target.value)} className="w-full p-4 text-sm font-bold uppercase" placeholder="SECURITY CODE" /></div>
                        </div>
                        <button onClick={handleAuth} className="w-full btn-premium p-5 uppercase tracking-widest text-xs">{isRegister ? 'INITIALIZE SYSTEM' : 'AUTHORIZE ACCESS'}</button>
                        <p onClick={()=>setIsRegister(!isRegister)} className="text-center text-[10px] text-gray-500 font-bold uppercase tracking-widest hover:text-[#FF6B00] transition-all cursor-pointer">{isRegister ? 'Already have access? LOGIN' : 'New Commander? REGISTER HERE'}</p>
                    </div>
                </div>
            );
        };

        // --- SUB VIEWS ---
        const HomeView = ({ profile, matches, setView }) => (
            <div className="space-y-8 animate-in slide-up">
                <div className="glass-3d p-8 border-l-4 border-[#FF6B00] relative overflow-hidden">
                    <p className="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em] mb-2">Master Rank Account</p>
                    <h2 className="text-3xl font-gaming italic text-white leading-tight">{profile?.username}</h2>
                    <p className="text-[#FF6B00] text-sm font-black uppercase mt-2 tracking-widest">{profile?.starId}</p>
                    <div className="mt-8 flex gap-6">
                        <div className="flex-1 bg-white/5 p-4 rounded-2xl border border-white/5 shadow-inner">
                            <span className="text-[9px] text-gray-500 uppercase font-black">Wins</span>
                            <p className="text-xl font-black text-green-500 mt-1">{profile?.wins}</p>
                        </div>
                        <div className="flex-1 bg-white/5 p-4 rounded-2xl border border-white/5">
                            <span className="text-[9px] text-gray-500 uppercase font-black">Rank</span>
                            <p className="text-[10px] font-black text-[#FF6B00] uppercase mt-2">{profile?.role}</p>
                        </div>
                    </div>
                </div>
                <div className="flex justify-between items-center px-1"><h4 className="font-gaming text-sm italic border-l-2 border-[#FF6B00] pl-3 uppercase">Arena Missions</h4><button onClick={()=>setView('play')} className="text-[#FF6B00] font-black uppercase text-[10px]">ALL</button></div>
                <div className="space-y-5">
                    {matches.filter(m=>m.status==='open').slice(0,3).map(m=>(<div key={m.id} className="glass-3d p-5 flex gap-5 items-center btn-active border-white/5"><div className="w-14 h-14 bg-white/5 rounded-[20px] flex items-center justify-center font-gaming text-[#FF6B00] text-[10px] border border-white/10">{m.mode}</div><div className="flex-grow space-y-1"><h5 className="font-black text-md uppercase text-white">{m.title}</h5><p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Prize ₹{m.prize}</p><div className="mt-3 w-full h-1 bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-[#FF6B00] to-orange-400" style={{width: `${(m.joined/m.maxPlayers)*100}%`}}></div></div></div><button onClick={()=>setView('play')} className="bg-[#FF6B00] text-black px-5 py-3 rounded-2xl text-[9px] font-black uppercase">JOIN</button></div>))}
                </div>
            </div>
        );

        const ArenaView = ({ matches, onJoin }) => (
            <div className="space-y-6">
                <h2 className="text-2xl font-gaming italic text-[#FF6B00] uppercase tracking-tighter text-center neon-text">Mission Board</h2>
                {matches.map(m => (
                    <div key={m.id} className="glass-3d p-6 border border-white/5 flex gap-6 items-center">
                        <div className="w-16 h-16 bg-[#111] rounded-[2rem] border border-white/10 flex items-center justify-center font-gaming text-[#FF6B00] text-xs shadow-xl">{m.mode}</div>
                        <div className="flex-grow space-y-2">
                            <h5 className="font-black text-md uppercase text-white">{m.title}</h5>
                            <p className="text-[11px] text-gray-500 font-bold uppercase tracking-widest">Entry ₹{m.entry} | ₹{m.prize} POOL</p>
                            <div className="mt-3 w-full h-1.5 bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-[#FF6B00] neon-shadow" style={{width: `${(m.joined/m.maxPlayers)*100}%`}}></div></div>
                        </div>
                        <button onClick={() => onJoin(m)} className="bg-[#FF6B00] text-black px-5 py-3 rounded-2xl text-[10px] font-black uppercase btn-active shadow-xl">JOIN</button>
                    </div>
                ))}
            </div>
        );

        const ChatView = ({ profile, db, appId }) => {
            const [ch, setCh] = useState('general');
            const [ms, setMs] = useState([]);
            const [inp, setInp] = useState('');
            const endRef = useRef();
            useEffect(() => {
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(`chats_${ch}`).orderBy('timestamp','desc').limit(40)
                    .onSnapshot(s => { setMs(s.docs.map(d => d.data()).reverse()); setTimeout(()=>endRef.current?.scrollIntoView(), 100); });
                return () => unsub();
            }, [ch]);
            const send = async () => { if(!inp.trim())return; await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(`chats_${ch}`).add({ sender: profile.username, text: inp, timestamp: Date.now(), uid: profile.uid, role: profile.role }); setInp(''); };
            return (
                <div className="h-[75vh] flex flex-col glass-3d overflow-hidden border-[#FF6B00]/10">
                    <div className="flex border-b border-white/5 p-2 bg-black/40">
                        {['general','squads','news'].map(c => <button key={c} onClick={()=>setCh(c)} className={`flex-1 p-3 rounded-2xl text-[9px] font-black uppercase transition-all ${ch===c?'bg-[#FF6B00] text-black shadow-xl':'text-gray-500'}`}>#{c}</button>)}
                    </div>
                    <div className="flex-1 overflow-y-auto p-5 space-y-6">
                        {ms.map((m,i)=>(<div key={i} className={`flex flex-col ${m.uid===profile.uid?'items-end':'items-start'}`}><div className="flex items-center gap-2 mb-2 px-2">{m.role==='admin'&&<Icon name="Crown" size={12} className="text-yellow-500" />}<span className="text-[10px] text-gray-500 uppercase font-black">{m.sender}</span></div><div className={`p-3 px-5 rounded-[22px] text-[13px] leading-relaxed shadow-xl ${m.uid===profile.uid?'bg-[#FF6B00] text-black font-bold':'bg-white/5 border border-white/10'}`}>{m.text}</div></div>))}
                        <div ref={endRef} />
                    </div>
                    <div className="p-4 bg-black/90 flex gap-3">
                        <input value={inp} onChange={e=>setInp(e.target.value)} className="flex-grow p-4 rounded-2xl text-xs bg-white/5 border border-white/10 outline-none" placeholder="Type mission info..." />
                        <button onClick={send} className="bg-[#FF6B00] p-4 rounded-2xl text-black btn-active"><Icon name="Send" size={24} /></button>
                    </div>
                </div>
            );
        };

        const JoinModal = ({ match, profile, db, appId, close }) => {
            const [ff, setFF] = useState('');
            const join = async () => {
                if(profile.balance < match.entry) return alert("Paisa low hai!");
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches').doc(match.id).update({ joined: firebase.firestore.FieldValue.increment(1) });
                await db.collection('artifacts').doc(appId).collection('users').doc(profile.uid).collection('profile').doc('data').update({ balance: firebase.firestore.FieldValue.increment(-match.entry) });
                alert("Deployed!"); close();
            };
            return (
                <div className="fixed inset-0 z-[2000] bg-black/95 p-6 flex items-center justify-center backdrop-blur-xl">
                    <div className="p-10 glass-3d border border-white/10 w-full max-w-sm space-y-8 animate-in zoom-in-95">
                        <h3 className="text-2xl font-gaming italic text-[#FF6B00] uppercase text-center leading-none">Arena Entry</h3>
                        <div className="space-y-5">
                            <input value={ff} onChange={e=>setFF(e.target.value)} className="w-full p-5 rounded-2xl text-md bg-black border border-white/10 uppercase font-black" placeholder="FREE FIRE UID" />
                        </div>
                        <div className="p-5 bg-[#FF6B00]/10 rounded-[2rem] flex justify-between items-center border border-[#FF6B00]/20"><span className="text-[10px] font-black uppercase text-gray-400 tracking-widest">Entry Fee</span><span className="text-xl font-black text-[#FF6B00]">₹{match.entry}</span></div>
                        <button onClick={join} className="w-full bg-[#FF6B00] text-black p-6 rounded-[2rem] font-black uppercase text-sm btn-active shadow-2xl">CONFIRM & PAY</button>
                        <button onClick={close} className="w-full text-xs text-gray-600 uppercase font-black tracking-widest">Cancel</button>
                    </div>
                </div>
            );
        };

        const SquadView = () => (
            <div className="p-16 text-center glass-3d border-dashed border-2 border-white/10 relative overflow-hidden">
                <Icon name="Users" size={70} className="mx-auto text-[#FF6B00] mb-6 neon-glow" />
                <h3 className="text-2xl font-gaming italic uppercase tracking-widest text-white leading-none">Elite Squads</h3>
                <p className="text-xs text-gray-500 uppercase mt-4 tracking-widest font-bold">Create team for auto-fill entry</p>
                <div className="mt-12 space-y-4">
                    <button className="w-full bg-[#FF6B00] text-black p-5 rounded-[2rem] font-black uppercase text-xs tracking-widest btn-active">CREATE NEW SQUAD</button>
                </div>
            </div>
        );

        const WalletView = ({ profile, onDep }) => {
            const [amt, setAmt] = useState('');
            return (
                <div className="space-y-10">
                    <div className="p-16 text-center glass-3d border-2 border-[#FF6B00]/20 relative overflow-hidden shadow-[0_0_80px_rgba(255,107,0,0.15)]">
                        <div className="absolute top-0 left-0 w-full h-1 bg-[#FF6B00]"></div>
                        <p className="text-[11px] text-gray-500 font-bold uppercase mb-4 tracking-[0.4em]">Combat Balance</p>
                        <h2 className="text-8xl font-gaming italic text-[#FF6B00] leading-none">₹{profile?.balance}</h2>
                    </div>
                    <div className="glass-3d p-10 space-y-8 border-white/10">
                        <input value={amt} onChange={e=>setAmt(e.target.value)} type="number" className="w-full p-8 bg-transparent border-b-2 border-white/10 text-center text-6xl font-black outline-none focus:border-[#FF6B00]" placeholder="₹ 0" />
                        <button onClick={()=>onDep(amt)} className="w-full bg-[#FF6B00] text-black p-8 rounded-[3rem] font-black uppercase text-xs tracking-widest btn-active shadow-2xl">ADD CASH (RAZORPAY)</button>
                    </div>
                </div>
            );
        };

        const AdminPanel = ({ matches, db, appId }) => (
            <div className="space-y-8 animate-in zoom-in">
                <h2 className="text-2xl font-gaming italic text-[#FF6B00] uppercase text-center neon-text">Admin Console</h2>
                <div className="p-10 glass-3d space-y-8 border-[#FF6B00]/20 border">
                    <button onClick={async()=>{ 
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches').add({ title: "MEGASHOT SOLO", prize: 1000, entry: 50, mode: 'Solo', joined: 0, maxPlayers: 48, status: 'open', createdAt: Date.now() });
                        alert("Tournament Live!");
                    }} className="w-full bg-[#FF6B00] text-black p-6 rounded-[2rem] font-black uppercase text-sm btn-active shadow-2xl">DEPLOY NEW MATCH</button>
                </div>
            </div>
        );

        const StaffPanel = ({ matches, db, appId }) => (
            <div className="space-y-6">
                <h2 className="text-2xl font-gaming italic text-red-500 uppercase text-center">Ops Monitor</h2>
                {matches.filter(m=>m.status==='open').map(m => (
                    <div key={m.id} className="p-8 glass-3d border-l-4 border-l-red-500 space-y-6">
                        <h4 className="font-black text-xl uppercase text-white">{m.title}</h4>
                        <div className="grid grid-cols-2 gap-4">
                            <input id={`r-${m.id}`} className="p-4 bg-black rounded-2xl text-xs uppercase font-black" placeholder="ROOM ID" defaultValue={m.roomId} />
                            <input id={`p-${m.id}`} className="p-4 bg-black rounded-2xl text-xs uppercase font-black" placeholder="PASSWORD" defaultValue={m.roomPass} />
                        </div>
                        <div className="flex gap-4">
                            <button onClick={async ()=> { 
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches').doc(m.id).update({ roomId: document.getElementById(`r-${m.id}`).value, roomPass: document.getElementById(`p-${m.id}`).value });
                                alert("Link Updated!");
                            }} className="flex-1 bg-white/10 p-5 rounded-2xl text-[10px] font-black uppercase btn-active">UPDATE</button>
                            <button onClick={async ()=> { 
                                if(!confirm("Cancel Match?"))return;
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('matches').doc(m.id).update({ status: 'cancelled' });
                                alert("Terminated!");
                            }} className="bg-red-500/20 text-red-500 p-5 rounded-2xl text-[10px] font-black uppercase border border-red-500/20 btn-active">HACKER ABORT</button>
                        </div>
                    </div>
                ))}
            </div>
        );

        const ProfileView = ({ profile, auth }) => (
            <div className="space-y-12 text-center pt-12 animate-in zoom-in-95 duration-500">
                <div className="relative inline-block">
                    <div className="w-40 h-40 bg-gradient-to-tr from-[#FF6B00] to-orange-300 rounded-[55px] p-1 rotate-[12deg] mx-auto shadow-2xl">
                        <div className="w-full h-full bg-black rounded-[52px] flex items-center justify-center -rotate-[12deg]">
                            <Icon name="Zap" size={70} className="text-[#FF6B00] neon-glow" />
                        </div>
                    </div>
                </div>
                <h2 className="text-5xl font-gaming italic tracking-tighter leading-none text-white">{profile?.username}</h2>
                <div className="text-left glass-3d divide-y divide-white/5 overflow-hidden shadow-2xl">
                    <div className="p-8 flex justify-between items-center hover:bg-white/5 transition-all"><span className="text-[12px] text-gray-500 font-black tracking-widest uppercase">STAR UID</span><span className="font-black text-lg text-white">{profile?.starId}</span></div>
                    <div className="p-8 flex justify-between items-center hover:bg-white/5 transition-all"><span className="text-[12px] text-gray-500 font-black tracking-widest uppercase">Combat Rank</span><span className="font-black text-[#FF6B00] uppercase text-[12px] tracking-widest">{profile?.role}</span></div>
                </div>
                <button onClick={()=>auth.signOut()} className="w-full glass-3d p-8 text-red-500 font-black text-sm uppercase tracking-[0.5em] border-red-500/10 btn-active">SIGN OUT DEVICE</button>
            </div>
        );

        const EliteBot = ({ close, onAsk }) => {
            const [ms, setMs] = useState([{ b: true, t: "Salute Commander Mahesh! Main ELITE Assistant hoon. Kya help chahiye?" }]);
            const [v, setV] = useState('');
            const [l, setL] = useState(false);
            const ask = async () => { if(!v.trim() || l) return; const ut=v; setV(''); setMs(p=>[...p,{b:false,t:ut}]); setL(true); const r = await onAsk(ut); setMs(p=>[...p,{b:true,t:r}]); setL(false); };
            return (
                <div className="absolute bottom-20 right-0 w-80 h-[500px] glass-3d !bg-black/95 border-2 border-[#FF6B00]/40 flex flex-col z-[3000] shadow-[0_20px_80px_rgba(0,0,0,1)] overflow-hidden animate-in slide-in-from-bottom-6">
                    <div className="p-6 bg-[#FF6B00] text-black font-black flex justify-between items-center text-[12px] uppercase">
                        <div className="flex items-center gap-4"><Icon name="Bot" size={24} /> <span>Elite Intel</span></div>
                        <Icon name="X" size={24} className="cursor-pointer" onClick={close} />
                    </div>
                    <div className="flex-1 p-5 overflow-y-auto space-y-6 text-[14px] leading-relaxed">
                        {ms.map((m,idx)=>(<div key={idx} className={`p-4 rounded-[2rem] shadow-2xl ${m.b?'bg-white/5 self-start mr-10 border border-white/5 shadow-inner':'bg-[#FF6B00] text-black font-bold self-end ml-10'}`}>{m.t}</div>))}
                        {l && <div className="text-[10px] text-[#FF6B00] animate-pulse uppercase font-black px-4 tracking-[0.4em]">Decoding Logic...</div>}
                    </div>
                    <div className="p-5 bg-black border-t border-white/10 flex gap-4">
                        <input value={v} onChange={e=>setV(e.target.value)} onKeyPress={e=>e.key==='Enter'&&ask()} className="flex-grow p-5 rounded-2xl text-xs bg-white/5 outline-none focus:border-[#FF6B00] border border-white/10 uppercase" placeholder="Enter Command..." />
                        <button onClick={ask} className="bg-[#FF6B00] p-4 rounded-2xl text-black btn-active shadow-orange-500/20 shadow-lg"><Icon name="Zap" size={24} /></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
